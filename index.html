<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>職業安全衛生 題庫練習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang HK","Microsoft JhengHei",sans-serif;background:#f0f2f5;min-height:100vh}
.banner{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white;padding:20px;text-align:center;border-radius:0 0 20px 20px;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative}
.banner h1{font-size:1.5rem;margin-bottom:4px}
.banner p{font-size:.85rem;opacity:.85}
.banner button{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:white;font-size:1.2rem;cursor:pointer;padding:8px 12px;border-radius:8px}
.container{max-width:900px;margin:0 auto;padding:16px}
.screen{display:none}
.screen.active{display:block}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:16px}
.chapter-card{background:white;border-radius:14px;padding:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;border:2px solid transparent}
.chapter-card:hover{transform:translateY(-2px);border-color:#e74c3c;box-shadow:0 6px 16px rgba(231,76,60,.2)}
.ch-card-num{font-size:.75rem;font-weight:700;color:#e74c3c;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ch-card-title{font-size:1rem;font-weight:600;color:#2c3e50;line-height:1.4}
.ch-card-q{font-size:.8rem;color:#7f8c8d;margin-top:6px}
.mode-card{background:white;border-radius:16px;padding:28px 24px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;border:2px solid transparent}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.mode-card h2{font-size:1.3rem;margin:12px 0 6px}
.mode-card p{font-size:.85rem;color:#7f8c8d}
.back-btn{background:#ecf0f1;color:#2c3e50;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:.9rem;margin-bottom:12px;font-weight:600;display:inline-block}
.back-btn:hover{background:#bdc3c7}
.progress-bar{height:6px;background:#ecf0f1;border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:3px;transition:width .3s}
.question-counter{text-align:center;font-size:.85rem;color:#7f8c8d;margin-bottom:14px}
.quiz-card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.question-text{font-size:1.05rem;font-weight:600;color:#2c3e50;line-height:1.6;margin-bottom:20px}
.option-btn{width:100%;padding:14px 18px;border:2px solid #ecf0f1;border-radius:12px;background:white;text-align:left;font-size:.95rem;cursor:pointer;transition:all .15s;margin-bottom:10px;color:#2c3e50}
.option-btn:hover{border-color:#e74c3c;background:#fdf2f1}
.option-btn.correct{border-color:#27ae60;background:#eafaf1;color:#27ae60;font-weight:600}
.option-btn.wrong{border-color:#e74c3c;background:#fdf2f1;color:#e74c3c}
.option-btn.selected{border-color:#3498db;background:#ebf5fb;color:#2980b9;font-weight:600}
.option-btn:disabled{cursor:default}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
.nav-btn{padding:12px 24px;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;flex:1;text-align:center}
.nav-btn.primary{background:#e74c3c;color:white}
.nav-btn.primary:hover{background:#c0392b}
.nav-btn.secondary{background:#ecf0f1;color:#2c3e50}
.nav-btn.secondary:hover{background:#bdc3c7}
.result-box{background:white;border-radius:16px;padding:28px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.result-title{font-size:1.4rem;font-weight:700;margin-bottom:8px;color:#2c3e50}
.result-score{font-size:2.5rem;font-weight:700;color:#e74c3c;margin:16px 0}
.result-detail{font-size:.9rem;color:#7f8c8d;margin-bottom:20px}
.mode-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;margin-bottom:10px}
.mode-badge.practice{background:#e8f8f5;color:#27ae60}
.mode-badge.quiz{background:#fef5e7;color:#d35400}
.mode-badge.exam{background:#eafafe;color:#2980b9}
.mode-badge.mistake{background:#fdebd0;color:#d35400}
.dark body{background:#1a1a2e;color:#eee}
.dark .banner{background:linear-gradient(135deg,#2c3e50,#1a252f)}
.dark .chapter-card,.dark .mode-card,.dark .quiz-card,.dark .result-box{background:#16213e;color:#eee}
.dark .ch-card-title{color:#fff}
.dark .question-text{color:#fff}
.dark .option-btn{color:#eee;border-color:#333}
.dark .option-btn:hover{border-color:#e74c3c;background:#1a1a2e}
.dark .nav-btn.secondary{background:#333;color:#eee}
.dark .nav-btn.secondary:hover{background:#444}
.dark .progress-bar{background:#333}
.dark .back-btn{background:#333;color:#eee}
.dark .back-btn:hover{background:#444}
.dark button{}
.home-btn{background:#bdc3c7;color:#2c3e50;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-bottom:12px;font-weight:600;display:inline-block}
.home-btn:hover{background:#95a5a6}
.dark .home-btn{background:#333;color:#ddd}
.dark .home-btn:hover{background:#444}
.dark .quiz-card{background:#1e2a3a}
</style>
</head>
<body>
<div class="banner">
  <h1>🏭 職業安全衛生 題庫練習</h1>
  <p>請選擇題庫</p>
  <button id="toggleTheme" onclick="toggleTheme()">☀️</button>
</div>
<div class="container">
  <div id="home" class="screen active">
    <div class="card-grid">
      <div class="mode-card" onclick="selectSource('luo')">
        <div style="font-size:2rem">📘</div>
        <h2>一般業職業安全衛生<br>業務主管精選</h2>
        <p>羅杰晟著 · 725 題</p>
      </div>
      <div class="mode-card" onclick="selectSource('jia')">
        <div style="font-size:2rem">📗</div>
        <h2>甲業題庫</h2>
        <p>1011 題（20 章）</p>
      </div>
      <div class="mode-card" onclick="openMistakeBook()" style="border-color:#f39c12">
        <div style="font-size:2rem">📕</div>
        <h2>錯題本</h2>
        <p id="mistake-count">0 題待加強</p>
      </div>
    </div>
  </div>
  
  <div id="mode-select" class="screen">
    <button class="back-btn" onclick="goHome()">← 返回題庫選擇</button>
    <div class="card-grid">
      <div class="mode-card" onclick="selectMode('practice')">
        <div style="font-size:2.5rem">📖</div>
        <h2>練習模式</h2>
        <p>選完馬上知道對錯，附詳細解析</p>
      </div>
      <div class="mode-card" onclick="selectMode('quiz')">
        <div style="font-size:2.5rem">📝</div>
        <h2>小考模式</h2>
        <p>每頁一題，題目與選項隨機排列</p>
      </div>
      <div class="mode-card" onclick="selectMode('exam')">
        <div style="font-size:2.5rem">🏆</div>
        <h2>大考模式</h2>
        <p>從全部題目隨機抽出 80 題</p>
      </div>
    </div>
  </div>

  <div id="chapter-select" class="screen">
    <button class="back-btn" onclick="goHome()">← 返回首頁</button>
    <div class="card-grid" id="chapter-list"></div>
  </div>
  <div id="quiz-screen" class="screen">
    <button class="home-btn" onclick="goHome()">🏠 回首頁</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-counter" id="question-counter"></div>
    <div class="quiz-card">
      <div id="question-area"></div>
      <div class="nav-row" id="nav-row" style="display:none">
        <button class="nav-btn secondary" id="btnPrev" onclick="prevQ()">← 上一題</button>
        <button class="nav-btn primary" id="btnNext" onclick="nextQ()">下一題 →</button>
      </div>
      <div id="result-area" style="display:none"></div>
    </div>
  </div>
</div>
<script>
var CHAPTERS = null;
var CURRENT_SOURCE = null;
var EXAM_HISTORY = JSON.parse(localStorage.getItem('examHistory') || '{}');
var MISTAKE_BOOK = JSON.parse(localStorage.getItem('mistakeBook') || '{}');
function saveMistakeBook() { localStorage.setItem('mistakeBook', JSON.stringify(MISTAKE_BOOK)); }
function saveExamHistory() { localStorage.setItem('examHistory', JSON.stringify(EXAM_HISTORY)); }
var SOURCE_NAMES = {"luo":"一般業題庫 · 725 題","jia":"甲業題庫 · 1011 題"};
var STATE = {screen:'home',mode:null,chId:null,questions:[],current:0,answers:[],done:false};
  CURRENT_SOURCE = null;
var NAMES = ["", "第一章 企業經營風險與安全衛生", "第二章 職業安全衛生相關法規", "第三章 職業安全衛生概論", "第四章 職業安全衛生管理系統", "第五章 風險評估", "第六章 承攬管理", "第七章 採購及變更管理", "第八章 緊急應變管理", "第九章 墜落危害預防管理實務", "第十章 機械安全管理實務", "第十一章 火災爆炸危害預防管理實務", "第十二章 感電危害預防管理實務", "第十三章 倒塌崩塌危害預防管理實務", "第十四章 化學性危害預防管理實務", "第十五章 物理性危害預防管理實務", "第十六章 職場健康管理實務", "第十七章 職業災害調查處理與統計"];

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function selectSource(src) {
  CURRENT_SOURCE = src;
  document.querySelector('.banner p').textContent = SOURCE_NAMES[src];
  // 重新載入正確的題庫數據
  if (src === 'luo') {
    var d = document.getElementById('quizData');
    CHAPTERS = JSON.parse(d.textContent);
  } else if (src === 'jia') {
    var d2 = document.getElementById('quizData2');
    CHAPTERS = JSON.parse(d2.textContent);
  }
  goScreen('mode-select');
}

function init() {
  var d = document.getElementById('quizData');
  if (!d) { document.getElementById('home').innerHTML='<p style="text-align:center;padding:40px">載入失敗</p>'; return; }
  try {
    CHAPTERS = JSON.parse(d.textContent);
    updateMistakeCount();
    renderHome();
  } catch(e) {
    document.getElementById('home').innerHTML='<p style="text-align:center;padding:40px;color:red">錯誤：'+e.message+'</p>';
  }
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  var btn = document.getElementById('toggleTheme');
  btn.textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

function goScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function renderHome() {
  goScreen('home');
}

function selectMode(mode) {
  STATE.mode = mode;
  // 如果還沒載入指定題庫，先 fetch 再繼續
  if (CURRENT_SOURCE === 'jia') {
    var d2 = document.getElementById('quizData2');
    CHAPTERS = JSON.parse(d2.textContent);
    proceedMode();
  } else {
    proceedMode();
  }
}

function proceedMode() {
  if (STATE.mode === 'exam') {
    // 大考模式：從全部題目抽 80 題
    var all = [];
    for (var k in CHAPTERS) {
      CHAPTERS[k].questions.forEach(function(q) { q._ch = k; all.push(q); });
    }
    shuffleArray(all);
    var src = CURRENT_SOURCE;
    var doneKeys = EXAM_HISTORY[src] || [];
    // Build unique key: chId + '_' + q.id (IDs are per-chapter, not global)
    var doneSet = {};
    doneKeys.forEach(function(k){ doneSet[k] = true; });
    var totalPool = src === 'luo' ? 725 : 1011;
    var remaining = doneKeys.length >= totalPool
      ? [] : all.filter(function(q){ return !doneSet[q._ch+'_'+q.id]; });
    if (remaining.length < 80) {
      // All questions done - reset
      EXAM_HISTORY[src] = [];
      doneSet = {};
      remaining = all;
    }
    var qs = remaining.slice(0, 80);
    STATE.questions = qs;
    STATE.current = 0;
    STATE.answers = [];
    STATE.done = false;
    STATE.chId = null;
    document.getElementById('nav-row').style.display = 'flex';
    document.getElementById('result-area').style.display = 'none';
    goScreen('quiz-screen');
    renderQuestion();
    return;
  }
  // 小考/練習模式：渲染章節選擇
  var src = CURRENT_SOURCE;
  var html = '';
  if (src === 'luo') {
    for (var i = 1; i <= 17; i++) {
      var ch = CHAPTERS[String(i)];
      html += '<div class="chapter-card" onclick="selectChapter(\''+i+'\')">' +
        '<div class="ch-card-num">第 '+i+' 章</div>' +
        '<div class="ch-card-title">'+escHtml(ch.chapter)+'</div>' +
        '<div class="ch-card-q">'+ch.total_questions+' 題'+(ch.note?' · '+escHtml(ch.note):'')+'</div>'+
        '</div>';
    }
  } else {
    // 甲業20章
    var keys = Object.keys(CHAPTERS).sort();
    keys.forEach(function(k) {
      var ch = CHAPTERS[k];
      html += '<div class="chapter-card" onclick="selectChapter(\''+k+'\')">' +
        '<div class="ch-card-num">'+escHtml(ch.chapter)+'</div>' +
        '<div class="ch-card-title">'+ch.total_questions+' 題</div>' +
        '</div>';
    });
  }
  document.getElementById('chapter-list').innerHTML = html;
  goScreen('chapter-select');
}

function selectChapter(id) {
  STATE.chId = id;
  var qs = CHAPTERS[String(id)].questions.slice();
  if (STATE.mode === 'quiz') { shuffleArray(qs); }
  STATE.questions = qs;
  STATE.current = 0;
  STATE.answers = [];
  STATE.done = false;
  document.getElementById('nav-row').style.display = 'flex';
  document.getElementById('result-area').style.display = 'none';
  goScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  var q = STATE.questions[STATE.current];
  var total = STATE.questions.length;
  document.getElementById('progress-fill').style.width = ((STATE.current+1)/total*100)+'%';
  document.getElementById('question-counter').textContent = (STATE.current+1)+' / '+total;

  var opts = ['A','B','C','D'];

  var html = '<div class="question-text">'+escHtml(q.question)+'</div>';
  
  // 錯題本模式顯示錯誤次數
  if (q._mistake) {
    html += '<div style="margin-bottom:12px;padding:8px;background:#fef5e7;border-radius:8px;font-size:.85rem;color:#d35400;display:inline-block">⚠️ 已答錯 '+q._wrongCount+' 次</div>';
  }
  
  var answered = STATE.answers[STATE.current];
  var showAnswer = (STATE.mode === 'practice' || STATE.mode === 'mistake') && answered !== undefined;
  opts.forEach(function(o) {
    var isSelected = answered === o;
    var optClass = '';
    if (showAnswer) {
      if (q.answer === o) optClass = ' correct';
      else if (isSelected) optClass = ' wrong';
    } else {
      if (isSelected) optClass = ' selected';
    }
    html += '<button class="option-btn'+optClass+'" onclick="selectOption(\''+o+'\')">' +
      '<strong>'+o+'. </strong>'+escHtml(q.options[o])+'</button>';
  });

  document.getElementById('question-area').innerHTML = html;
  document.getElementById('btnPrev').style.visibility = STATE.current > 0 ? 'visible' : 'hidden';
  document.getElementById('btnNext').textContent = STATE.current < total-1 ? '下一題 →' : '查看結果';
}

function selectOption(opt) {
  var q = STATE.questions[STATE.current];
  STATE.answers[STATE.current] = opt;
  
  // 記錄答錯的題目到錯題本
  if (opt !== q.answer) {
    var key = (q._ch || STATE.chId) + '_' + q.id;
    var src = CURRENT_SOURCE;
    if (!MISTAKE_BOOK[src]) MISTAKE_BOOK[src] = {};
    if (!MISTAKE_BOOK[src][key]) {
      MISTAKE_BOOK[src][key] = {
        ch: q._ch || STATE.chId,
        id: q.id,
        question: q.question,
        options: q.options,
        answer: q.answer,
        note: q.note || '',
        wrongCount: 0,
        lastWrong: new Date().toISOString()
      };
    }
    MISTAKE_BOOK[src][key].wrongCount++;
    MISTAKE_BOOK[src][key].lastWrong = new Date().toISOString();
    saveMistakeBook();
  }
  
  if (STATE.mode === 'practice') {
    renderQuestion();
    if (q.note) {
      var noteDiv = document.createElement('div');
      noteDiv.style.cssText = 'margin-top:14px;padding:12px;background:#fef9e7;border-radius:8px;font-size:.9rem;color:#7d6608';
      noteDiv.textContent = '📝 '+q.note;
      document.querySelector('.quiz-card').appendChild(noteDiv);
    }
    if (STATE.current < STATE.questions.length - 1) {
      setTimeout(function() { nextQ(); }, 1500);
    }
  } else {
    // 小考/大考：只 highlight 選項，不跳題，可回頭修改
    renderQuestion();
  }
}

function nextQ() {
  // 小考/大考：未作答的題目不得跳過
  if (STATE.mode !== 'practice' && STATE.answers[STATE.current] === undefined) {
    alert('請先選一個答案');
    return;
  }
  if (STATE.current < STATE.questions.length - 1) {
    STATE.current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (STATE.current > 0) {
    STATE.current--;
    renderQuestion();
  }
}

function showResult() {
  var total = STATE.questions.length;
  var correct = 0;
  STATE.questions.forEach(function(q, i) {
    if (STATE.answers[i] === q.answer) correct++;
  });
  var pct = Math.round(correct/total*100);
  goScreen('quiz-screen');
  document.getElementById('nav-row').style.display = 'none';
  document.getElementById('question-area').innerHTML = '';
  
  // 錯題本模式：移除已答對的題目
  var removeBtn = '';
  if (STATE.mode === 'mistake') {
    var wrongCount = total - correct;
    removeBtn = '<button class="nav-btn secondary" id="removeMasteredBtn" style="width:100%;margin-top:10px;background:#f39c12;color:white">移除 '+correct+' 題已掌握的題目</button>';
  }
  
  var res = '<div class="result-box"><div class="result-title">作答完成！</div>' +
    '<div class="mode-badge '+(STATE.mode==='practice'?'practice':STATE.mode==='quiz'?'quiz':STATE.mode==='mistake'?'mistake':'exam')+'">'+(STATE.mode==='practice'?'📖 練習':STATE.mode==='quiz'?'📝 小考':STATE.mode==='mistake'?'📕 錯題本':'🏆 大考')+'</div>' +
    '<div class="result-score">'+pct+'%</div>' +
    '<div class="result-detail">答對 '+correct+' / '+total+' 題</div>' +
    '<button class="nav-btn primary" onclick="goHome()" style="width:100%;margin-top:8px">返回首頁</button>'+
    '<button class="nav-btn secondary" id="retakeBtn" style="width:100%;margin-top:10px">再考一次</button>'+
    removeBtn +
    '</div>';
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').innerHTML = res;
  
  // 錯題本模式：移除已掌握的題目
  if (STATE.mode === 'mistake') {
    var removeBtn = document.getElementById('removeMasteredBtn');
    if (removeBtn) {
      removeBtn.onclick = function() {
        var src = CURRENT_SOURCE;
        var removed = 0;
        STATE.questions.forEach(function(q, i) {
          if (STATE.answers[i] === q.answer) {
            var key = q._ch + '_' + q.id;
            if (MISTAKE_BOOK[src] && MISTAKE_BOOK[src][key]) {
              delete MISTAKE_BOOK[src][key];
              removed++;
            }
          }
        });
        // 清理空的題庫
        if (MISTAKE_BOOK[src] && Object.keys(MISTAKE_BOOK[src]).length === 0) {
          delete MISTAKE_BOOK[src];
        }
        saveMistakeBook();
        alert('已移除 '+removed+' 題已掌握的題目！');
        goHome();
      };
    }
  }
  
  // Record answered question IDs for exam mode
  if (STATE.mode === 'exam') {
    var src = CURRENT_SOURCE;
    if (!EXAM_HISTORY[src]) EXAM_HISTORY[src] = [];
    STATE.questions.forEach(function(q){
      var key = q._ch+'_'+q.id;
      if (EXAM_HISTORY[src].indexOf(key) < 0) EXAM_HISTORY[src].push(key);
    });
    saveExamHistory();
    var done = EXAM_HISTORY[src].length;
    var total = src === 'luo' ? 725 : 1011;
    var retakeBtn = document.getElementById('retakeBtn');
    if (retakeBtn) {
      retakeBtn.textContent = '再考一次 ('+done+'/'+total+' 已做過)';
      retakeBtn.onclick = function() {
        STATE.mode = 'exam';
        proceedMode();
      };
    }
  }
  // For non-exam modes: override retake to re-run same chapter
  var normRetake = document.querySelector('#result-area .secondary');
  if (normRetake && normRetake.id !== 'removeMasteredBtn') normRetake.onclick = function() { 
    if (STATE.mode === 'mistake') {
      startMistakePractice(CURRENT_SOURCE);
    } else {
      selectChapter(STATE.chId); 
    }
  };
