ptions":{"A":"奈米","B":"微米","C":"毫米","D":"釐米"}},{"id":714,"question":"依勞工健康保護規則之規定，雇主對於從事特別危害健康之勞工應 實施特殊健康，並依規定實施分級健康管理，試問共分為幾級？","answer":"3","options":{"A":"2","B":"3","C":"4","D":"5"}},{"id":715,"question":"下列何者不是乾粉滅火系統所用之滅火原理？","answer":"1","options":{"A":"冷卻","B":"窒息","C":"抑制","D":"隔離"}},{"id":716,"question":"依危險性機械及設備安全檢查規則規定，雇主於鍋爐設置完成時， 應向檢查機構申請何種檢查；未經檢查合格，不得使用？","answer":"2","options":{"A":"構造檢查","B":"竣工檢查","C":"使用檢查","D":"型式檢查"}},{"id":717,"question":"下列敘述何者錯誤？","answer":"3","options":{"A":"乾燥皮膚之電阻較潮 濕者為高","B":"電擊之傷害程度與 電流大小成正相關","C":"電擊之傷害程度與 電流之流經路徑無 關","D":"電擊之傷害程度與 接觸電壓成正相關"}},{"id":718,"question":"為落實採購管理，下列何者非財物採購可要求之安全衛生規格？","answer":"1","options":{"A":"回饋措施","B":"保固及售後服務","C":"機械設備零件材質 之安全","D":"運輸、裝卸及搬運 之安全"}},{"id":719,"question":"依職業安全衛生法施行細則之規定，指勞動場所中，接受雇主或代 理雇主指示處理有關勞工事務之人所能支配管理之場所，稱為下列 何者？","answer":"2","options":{"A":"就業場所","B":"工作場所","C":"作業場所","D":"公共場所"}},{"id":720,"question":"在災害防止基本對策中，下列何者非屬去除不安全環境之方式？","answer":"1","options":{"A":"遵守安全標準作業程 序","B":"設備更新","C":"改善作業環境","D":"設備安全化"}},{"id":721,"question":"依職業安全衛生設施規則規定，氯酸鉀屬於下列何者？","answer":"4","options":{"A":"爆炸性物質","B":"著火性物質","C":"易燃液體","D":"氧化性物質"}},{"id":722,"question":"有關OHSAS18001與TOSHMS的差異比較，下列何者正確？","answer":"2","options":{"A":"OHSAS18001已包含 TOSHMS之所有規定","B":"兩者均非ISO國際 標準","C":"兩者均向勞動部申 請驗證","D":"兩者之驗證內容完 全一致"}},{"id":723,"question":"為提高鋼材儲存的安全性，下列何者有誤？","answer":"2","options":{"A":"應預防傾斜、滾落， 必要時應用纜索等加 以適當捆紮","B":"各堆鋼材之距離應 儘量縮小","C":"儲存之場地應為堅 固之地面","D":"置放地點應避免在 電線下方或上方"}},{"id":724,"question":"下列何種作用方式可形成燻煙？","answer":"2","options":{"A":"經由噴霧作用產生","B":"高溫氣態分子冷凝","C":"機械力產生","D":"完全燃燒"}},{"id":725,"question":"職業安全衛生法施行細則規定協議組織應協議之事項，不包括下列 何者？","answer":"2","options":{"A":"從事動火、高架、開 挖、爆破、高壓電活 線等危險作業之管制","B":"施工成本之管制","C":"作業人員進場管制","D":"電氣機具入廠管制"}},{"id":726,"question":"依職業災害勞工保護法之規定，事業單位、職業訓練機構及相關團 體辦理加強職業災害預防及職業災害勞工之重建事項，得向下列何 單位申請補助？","answer":"4","options":{"A":"當地勞工主管機關","B":"勞動檢查機構","C":"直轄市、縣(市)政 府","D":"勞工保險局"}},{"id":727,"question":"依職業安全衛生設施規則規定，下列何者非屬可燃性氣體？","answer":"2","options":{"A":"氫","B":"乙醚","C":"乙炔","D":"丙烷"}},{"id":728,"question":"依職業安全衛生設施規則規定，下列何者非為著火性物質？","answer":"2","options":{"A":"易燃固體","B":"易燃液體","C":"自燃物質","D":"禁水性物質"}},{"id":729,"question":"依職業安全衛生法施行細則規定，下列何者係指於勞動契約存續中 ，由雇主所提示，使勞工履行契約提供勞務之場所？","answer":"3","options":{"A":"工作場所","B":"作業場所","C":"勞動場所","D":"公共場所"}},{"id":730,"question":"依臺灣職業安全衛生管理系統（TOSHMS）驗證指導要點之定義， 執行稽核及驗證之機構，稱為下列何者？","answer":"3","options":{"A":"認證機構","B":"驗證管理機構","C":"認可驗證機構","D":"認可稽核機構"}},{"id":731,"question":"依採購管理技術指引規定之作業流程，在辦理勞務或工程請購之前 應進行下列何種作業？","answer":"3","options":{"A":"品質稽核","B":"環境影響評估","C":"供應商之評核","D":"性別影響評估"}},{"id":732,"question":"職業病最根本的預防措施為下列何者？","answer":"4","options":{"A":"實施僱用前體格檢查","B":"實施定期健康檢查","C":"實施特殊健康檢查","D":"實施作業環境改善"}},{"id":733,"question":"下列何者為交流電焊機較不易發生感電之處？","answer":"4","options":{"A":"待機中，接於電焊柄 之焊條端","B":"一次側線路端子","C":"二次側線路端子","D":"絕緣良好之握把"}},{"id":734,"question":"在都會區，常利用輸送管線，將天然氣運送到各用戶端的家用燃料 ，其主要成分為下列何者？","answer":"1","options":{"A":"甲烷","B":"丙烷","C":"丁烷","D":"戊烷"}},{"id":735,"question":"為預防捲揚機吊運物料時，造成的物體飛落職業災害，下列何者不 正確？","answer":"3","options":{"A":"吊掛之重量不得超過 該設備所能承受之最 高負荷","B":"吊鉤或吊具應有防 止吊舉中所吊物體 脫落之裝置","C":"吊運作業中應有人 員在吊掛物下方監 視","D":"應設防止過捲裝置"}},{"id":736,"question":"雇主對勞工之健康管理屬於第3級管理以上者，或屬於管理2以上者 ，應於檢查分級後，於幾日內報請勞工及衛生主管機關備查，並副 知勞動檢查機構？","answer":"1","options":{"A":"30","B":"45","C":"60","D":"90"}},{"id":737,"question":"依職業安全衛生法規定，二個以上之事業單位分別出資共同承攬時 ，防止職業災害之雇主責任應由誰負責？","answer":"1","options":{"A":"此二事業單位互推一 人為代表人","B":"二事業單位一起負 責","C":"出資較多的事業單 位","D":"勞工人數較多的事 業單位"}},{"id":738,"question":"金屬鋰、金屬鈉與金屬鉀均屬下列何者？","answer":"4","options":{"A":"氧化性物質","B":"爆炸性物質","C":"易燃液體","D":"禁水性物質"}},{"id":739,"question":"依職業安全衛生設施規則規定，高壓氣體容器外表顏色可否擅自變 更或擦掉？","answer":"2","options":{"A":"可","B":"不可","C":"可擅自變更但不可 擦掉","D":"未有限制"}},{"id":740,"question":"去漬油所引起之火災，不適用下列何種滅火劑？","answer":"3","options":{"A":"泡沫","B":"二氧化碳","C":"水","D":"乾粉"}},{"id":741,"question":"依有機溶劑中毒預防規則之規定，作業場所設置以動力吸引排出已 發散之有機溶劑蒸氣之設備為下列何者？","answer":"3","options":{"A":"密閉設備","B":"整體換氣裝置","C":"局部排氣裝置","D":"送風機"}},{"id":742,"question":"下列何者屬有害物質作業？","answer":"1","options":{"A":"特定化學物質作業","B":"噪音作業","C":"高溫作業","D":"潛水作業"}},{"id":743,"question":"下列何者為中央主管機關指定之機械、設備或器具，其構造、性能 及防護非符合安全標準者，不得產製運出廠場、輸入、租賃、供應 或設置？","answer":"3","options":{"A":"鍋爐","B":"升降機","C":"動力堆高機","D":"電焊機"}},{"id":744,"question":"下列何者非屬失能傷害？","answer":"1","options":{"A":"損失未滿一日者","B":"損失一日者","C":"損失二日者","D":"損失三日者"}},{"id":745,"question":"下列何者非屬職業安全衛生管理計畫所涵蓋的事項？","answer":"3","options":{"A":"安全衛生教育訓練","B":"緊急應變措施","C":"損益平衡分析","D":"機械、設備或器具 之管理"}},{"id":746,"question":"風險評估的嚴重度判斷時，骨折住院3天，屬於下列何種傷害程度？","answer":"2","options":{"A":"輕傷害","B":"中度傷害","C":"重度傷害","D":"虛驚事故"}},{"id":747,"question":"依職業安全衛生法規定，在高溫場所工作之勞工，雇主不得使其每 日工作時間超過幾小時？","answer":"1","options":{"A":"6","B":"7","C":"8","D":"10"}},{"id":748,"question":"依職業安全衛生管理辦法規定，下列何種機械應每月實施定期檢","answer":"3","options":{"A":"研磨機","B":"抽水機","C":"高空工作車","D":"數位加工機"}},{"id":749,"question":"失能傷害頻率公式中之分母為下列何者？","answer":"1","options":{"A":"總經歷工時","B":"總損失日數","C":"失能日數","D":"傷害損失日數"}},{"id":750,"question":"氧乙炔焊接作業完畢時，其正確關機程序為何？","answer":"1","options":{"A":"先關乙炔，再關氧氣","B":"先收輸氣管後關氣 瓶開關","C":"兩者一起關","D":"先關氧氣，再關乙 炔"}}]},"A16":{"chapter":"甲業第16章","total_questions":50,"questions":[{"id":751,"question":"依職業安全衛生設施規則規定，下列何者非屬著火性物質？","answer":"2","options":{"A":"鎂粉","B":"硝化乙二醇","C":"賽璐珞類","D":"黃磷"}},{"id":752,"question":"針對職業安全衛生管理系統稽核所發現不符合事項，應採取何種措 施？","answer":"4","options":{"A":"控制措施","B":"防護措施","C":"鑑別措施","D":"矯正措施"}},{"id":753,"question":"進入醬菜醃漬槽作業時，未實施有效通風，較會產生下列何種危","answer":"2","options":{"A":"爆炸","B":"缺氧","C":"感電","D":"被夾、被捲"}},{"id":754,"question":"工作場所噪音超過90分貝時，應採取工程控制、減少勞工噪音暴露 時間，使勞工噪音暴露工作日8小時日時量平均不得超過多少分貝？","answer":"3","options":{"A":"80","B":"85","C":"90","D":"100"}},{"id":755,"question":"從事水泥製造廠輸送帶尾輪之清潔作業時，較常發生下列何種危","answer":"2","options":{"A":"被切","B":"被夾、被捲","C":"感電","D":"墜落"}},{"id":756,"question":"在建立健康工作環境時，下列何者較屬於健康服務層面？","answer":"3","options":{"A":"工作姿勢","B":"領導風格","C":"預防注射","D":"團隊互助"}},{"id":757,"question":"依職業安全衛生設施規則規定，「低壓」係指多少伏特以下之電","answer":"1","options":{"A":"600","B":"6,000","C":"11,000","D":"161,000"}},{"id":758,"question":"防止事故發生之安全作業要領，通常不包括下列何者？","answer":"1","options":{"A":"長時間集會討論","B":"實施自動檢查","C":"推行廠場整潔、美 化","D":"徹底做好安全確認"}},{"id":759,"question":"有關危害辨識及風險評估之功能，下列何者錯誤？","answer":"4","options":{"A":"可協助事業單位建置 良好的職業安全衛生 管理系統","B":"有效控制危害及風 險，預防與削減災 害","C":"提昇職業安全衛生 管理績效，進而達 到永續經營之目的","D":"精確計算事故發生 的可能性，作為無 須保險之依據"}},{"id":760,"question":"就安全管理而言，下列敘述何者有誤？","answer":"3","options":{"A":"經常性交付承攬之作 業，宜事先依據危害 辨識及風險評估相關 程序，辨識出潛在之 危害及相關控制措施","B":"臨時性交付之承攬 作業，在正式施工 前亦應先完成危害 辨識及風險評估","C":"工作交付承攬後係 屬承攬人責任，原 事業單位事前不須 對該項工作實施危 害辨識","D":"對於運輸作業之承 攬，除須評估在本 身廠(場)內之危害 及風險外，也應評 估運送至客戶期間 交通上之危害及風 險"}},{"id":761,"question":"於主要道路進行交通號誌維護作業時，下列何者有誤？","answer":"1","options":{"A":"於貨車上架設一字梯","B":"使用高空工作車","C":"搭設施工架","D":"搭設工作平台"}},{"id":762,"question":"下列何者非屬勞工健康保護規則所稱之特別危害健康作業？","answer":"3","options":{"A":"噪音作業","B":"游離輻射作業","C":"高架作業","D":"高溫作業"}},{"id":763,"question":"事業單位以其事業交付承攬，且有共同作業時，依職業安全衛生法 施行細則規定，其協議組織應由何者召集之？","answer":"3","options":{"A":"承攬人","B":"再承攬人","C":"原事業單位","D":"各單位會商決定"}},{"id":764,"question":"危險性工作場所非經勞動檢查機構審查或檢查合格，事業單位不得 使勞工在該場所作業，係屬何種法令所規範？","answer":"2","options":{"A":"勞動基準法","B":"勞動檢查法","C":"職業安全衛生法","D":"職業災害勞工保護 法"}},{"id":765,"question":"有關緊急應變資訊之提供及保存，下列敘述何者有誤？","answer":"4","options":{"A":"提供關於廠區位置配 置圖","B":"提供廠區消防設備 配置情形及其能量","C":"廠區有害物的種類 及數量","D":"相關資料已保存於 電腦，無須保留紙 本備份"}},{"id":766,"question":"有關緊急狀況之分級，下列敘述何者有誤？","answer":"3","options":{"A":"應依事故之損害特性 及後果嚴重度，加以 分級","B":"應依緊急狀況之分 級，規劃後續應變 處理程序與對策","C":"不論分級為何，緊 急應變指揮官都是 同一人","D":"大型災害自己無法 控制時，必須迅速 連絡外界支援"}},{"id":767,"question":"依職業安全衛生設施規則規定，雇主對作業中有物體飛落或飛散， 致危害勞工之虞時，應置備有下列何種個人防護具，供勞工使用？","answer":"2","options":{"A":"防毒口罩","B":"安全帽","C":"呼吸防護具","D":"絕緣手套"}},{"id":768,"question":"依職業安全衛生設施規則規定，雇主對於使用多少伏特以上之移動 式電動機具，為防止因漏電造成感電危害，應設置適當之漏電斷路","answer":"2","options":{"A":"110","B":"150","C":"220","D":"600"}},{"id":769,"question":"依職業安全衛生法之規定，雇主未提供必要安全衛生設備致發生勞 工死亡之職業災害，最高可處幾年以下有期徒刑？","answer":"2","options":{"A":"1","B":"3","C":"5","D":"7"}},{"id":770,"question":"依職業安全衛生設施規則規定，雇主對於在高度至少幾公尺以上之 高處作業，勞工有墜落之虞者，應使勞工確實使用安全帶、安全帽 及其他必要之防護具？","answer":"4","options":{"A":"1","B":"1.2","C":"1.5","D":"2"}},{"id":771,"question":"下列何者為職業安全衛生法規定原事業單位應盡之義務？","answer":"1","options":{"A":"協助承攬人遵守職業 安全衛生相關法令","B":"承攬人就承攬部分 負雇主責任，原事 業單位不應介入承 攬人之管理","C":"接受專業承攬人之 工作指示作業","D":"掩護承攬人通過勞 動檢查"}},{"id":772,"question":"依勞工作業環境監測實施辦法之規定，下列何者為雇主應依中央主 管機關公告之方式實施通報之項目？","answer":"1","options":{"A":"作業環境監測計畫","B":"作業環境監測儀器 設備","C":"作業環境監測行程","D":"作業環境控制設備"}},{"id":773,"question":"當燈具之輝度遠高於室內平均輝度時，可能造成下列何種現象？","answer":"1","options":{"A":"眩光","B":"散光","C":"螢光","D":"偏光"}},{"id":774,"question":"在各類災害防止基本對策中，下列何者非屬於去除不安全環境之方 式？","answer":"1","options":{"A":"遵守作業步驟","B":"設備安全化","C":"改善作業環境","D":"改善通風條件"}},{"id":775,"question":"依職業安全衛生設施規則之規定，下列何者不是著火性物質？","answer":"4","options":{"A":"金屬鉀","B":"碳化鈣","C":"硫化磷","D":"硝化甘油"}},{"id":776,"question":"下列何者不屬於木材加工用圓盤鋸之安全裝置？","answer":"4","options":{"A":"反撥防止裝置","B":"撐縫片","C":"鋸齒接觸防止裝置","D":"安全閘門"}},{"id":777,"question":"發生白指症或白手病係導因於長期從事下列何種作業之危害？","answer":"2","options":{"A":"受黴菌污染之作業","B":"振動作業","C":"異常氣壓作業","D":"有機溶劑作業"}},{"id":778,"question":"下列何者不是著火性物質？","answer":"4","options":{"A":"金屬鉀","B":"金屬鈉","C":"鋁粉","D":"煤油"}},{"id":779,"question":"依職業安全衛生管理辦法規定，事業單位設職業安全衛生委員會時 ，應製作名冊並如何處理？","answer":"1","options":{"A":"自行留存備查","B":"報檢查機構備查","C":"報主管機關備查","D":"未有明定"}},{"id":780,"question":"下列何者非屬危險物？","answer":"4","options":{"A":"爆炸性物質","B":"著火性物質","C":"可燃性氣體","D":"致癌物"}},{"id":781,"question":"依有機溶劑中毒預防規則之規定，有機溶劑混存物係指有機溶劑混 存物中，含有之有機溶劑佔其重量多少百分比以上者？","answer":"3","options":{"A":"1","B":"3","C":"5","D":"10"}},{"id":782,"question":"事業單位應參照工作場所大小、分布、危險狀況及勞工人數，設置 合格急救人員，每1班次應至少1人，勞工人數超過50人者，每增加 50人應再設置幾人？","answer":"1","options":{"A":"1","B":"2","C":"3","D":"4"}},{"id":783,"question":"依職業安全衛生設施規則規定，下列何者屬爆炸性物質？","answer":"1","options":{"A":"過氧化丁酮","B":"金屬鋰","C":"過氧化鉀","D":"氯酸鈉"}},{"id":784,"question":"下列何種方法無法有效防止石材板倒塌？","answer":"4","options":{"A":"設置擋樁","B":"以繩索捆綁","C":"平躺橫放","D":"掛警示帶"}},{"id":785,"question":"為預防固定式起重機維修作業職業災害，關於墜落預防措施，下列 何者有誤？","answer":"1","options":{"A":"維修走道僅需於外側 一方設置單邊護欄","B":"應使用高空工作車","C":"應設置符合強度需 求的母索、中間杆 柱與錨錠裝置","D":"應組搭工作架來施 作"}},{"id":786,"question":"依職業安全衛生法施行細則規定，下列何種場所係指勞動場所中， 接受雇主或代理雇主指示處理有關勞工事務之人所能支配、管理之 場所？","answer":"1","options":{"A":"工作場所","B":"作業場所","C":"公共場所","D":"施工場所"}},{"id":787,"question":"粉塵爆炸界限與下列何種粉塵特性無關？","answer":"3","options":{"A":"粒徑大小","B":"形狀","C":"顏色","D":"化學成分"}},{"id":788,"question":"緊急應變計畫檢討修訂之目的在使計畫更能符合事業單位實際狀況 之需求，除定期檢討修正外，亦應考量不定期檢討修正之時機，有 關修正時機之敘述，下列何者有誤？","answer":"2","options":{"A":"緊急狀況發生後","B":"人口、道路、醫院 等客觀環境改變時 ，因與廠內運作無 關，無須修改計畫","C":"設計、製程、設 備、物料、作業等 變更時","D":"演練檢討結果確認 必須修正時"}},{"id":789,"question":"一般噪音作業勞工聽力損失會先發生於下列何種聲音頻率(Hz)？","answer":"3","options":{"A":"40","B":"400","C":"4,000","D":"40,000"}},{"id":790,"question":"下列何者不是體外輻射防護的原則？","answer":"4","options":{"A":"距離","B":"時間","C":"屏蔽","D":"照明"}},{"id":791,"question":"在災害防止基本對策中，下列何者屬於去除不安全狀態之方式？","answer":"3","options":{"A":"遵守作業步驟","B":"建立安全管理體制","C":"改善作業環境","D":"教育訓練"}},{"id":792,"question":"有關緊急應變之搶救，下列敘述何者有誤？","answer":"4","options":{"A":"進行搶救前應先考量 自己之安全不可貿然 進行","B":"對於感電災害應先 設法切斷電源再行 搶救","C":"對於局限空間災害 之搶救應先做好個 人防護","D":"救人第一，搶救時 應不顧一切全力搶 救"}},{"id":793,"question":"有關風險之敘述，下列何者正確？","answer":"1","options":{"A":"為危害嚴重度及危害 發生可能性之組合","B":"評估時一定需依據 精確數值之量化分 析","C":"事業單位不可自行 設計風險等級判定 基準","D":"只須辨識潛在危害 ，無須分別評估其 風險等級"}},{"id":794,"question":"作業人員欲瞭解化學品之危害預防措施，可由下列何者獲得相關資 訊？","answer":"2","options":{"A":"法規","B":"安全資料表","C":"工作守則","D":"作業程序"}},{"id":795,"question":"下列何者於火災爆炸時，會妨礙視線，影響人員的逃生？","answer":"1","options":{"A":"濃煙","B":"有毒氣體","C":"高溫","D":"爆炸之高壓"}},{"id":796,"question":"下列何者為「化學品分類及標示全球調和制度」之簡稱？","answer":"4","options":{"A":"MSDS","B":"GLP","C":"CLA","D":"GHS"}},{"id":797,"question":"某家電子工廠勞工人數未滿30人，依法至少應設置之職業安全衛生 人員為下列何者？","answer":"4","options":{"A":"職業安全衛生管理員","B":"甲種職業安全衛生 業務主管","C":"乙種職業安全衛生 業務主管","D":"丙種職業安全衛生 業務主管"}},{"id":798,"question":"事業單位分別交付二個以上承攬人共同作業而未參與共同作業時， 下列敘述何者正確？","answer":"2","options":{"A":"仍應依規定負原事業 單位之承攬管理責任", ","C":"15","D":"20"}},{"id":867,"question":"依職業安全衛生設施規則規定，雇主對於勞工從事載貨台裝卸貨物 其高差至少在幾公尺以上者，應提供勞工安全上下之設備？","answer":"4","options":{"A":"0.5","B":"1","C":"1.2","D":"1.5"}},{"id":868,"question":"依職業安全衛生管理辦法規定，雇主對固定式起重機應每隔多久就 該機械之整體定期實施檢查一次？","answer":"1","options":{"A":"每年","B":"每2年","C":"每3年","D":"每4年"}},{"id":869,"question":"依職業安全衛生管理辦法規定，雇主對移動式起重機，應於每日作 業前對過捲預防裝置、過負荷警報裝置、制動器、離合器 、控制裝 置及其他警報裝置之性能，實施下列何種檢查？","answer":"3","options":{"A":"重點檢查","B":"重新檢查","C":"檢點","D":"作業環境測定"}},{"id":870,"question":"依職業安全衛生法規定，下列何者非屬勞工之安全衛生義務？","answer":"1","options":{"A":"參加工會","B":"接受健康檢查","C":"接受勞工安全衛生 教育訓練","D":"遵守安全衛生工作 守則"}},{"id":871,"question":"有關職業安全衛生管理計畫之敘述，下列何者正確？","answer":"3","options":{"A":"計畫之內容應一致， 無須考量規模、性質","B":"安全衛生目標，應 交由專業團體協助 訂定","C":"須應用規劃、實 施、查核及改進等 管理手法，提升改 善績效","D":"應藉由持續不斷的 稽核制度發現問題 ，並等有經費再行 採取糾正措施"}},{"id":872,"question":"下列何者是由氣態凝結而成懸浮空氣中的固體微粒？","answer":"1","options":{"A":"燻煙","B":"粉塵","C":"霧滴","D":"煙霧"}},{"id":873,"question":"事業單位設置危險性工作場所，應於使勞工作業前組成評估小組實 施製程安全評估，下列何者非必要成員？","answer":"3","options":{"A":"工作場所負責人","B":"曾受國內外製程安 全評估專業訓練， 並有證明文件，且 經中央主管機關認 可者","C":"急救人員","D":"熟悉該場所作業之 勞工"}},{"id":874,"question":"閃絡係指下列何者？","answer":"2","options":{"A":"雷擊放電量","B":"高壓帶電導體與接 近物體所產生之火 花放電","C":"人體接觸低壓帶電 體","D":"靜電放電量"}},{"id":875,"question":"氧乙炔焊接時，若發生回火，應如何緊急處置？","answer":"4","options":{"A":"先關乙炔，再關氧氣","B":"以水滅火","C":"兩者一起關","D":"先關氧氣，再關乙 炔"}},{"id":876,"question":"有關職業安全衛生管理系統的敘述，下列何者正確？","answer":"4","options":{"A":"是由ISO 14001轉型發 展而成","B":"已有ISO國際標準","C":"國際上由美國優先 推動","D":"OHSAS 18001在國 內係由民間事業單 位優先導入推動"}},{"id":877,"question":"下列何者非電弧焊接作業之必要個人防護具？","answer":"4","options":{"A":"護目鏡","B":"安全胸圍","C":"防護手套","D":"耳塞"}},{"id":878,"question":"下列何種電氣設備需要接地？","answer":"1","options":{"A":"所有電氣設備","B":"電動工具","C":"會被雷打中者","D":"易漏電者"}},{"id":879,"question":"製程變更之目的，通常不包括下列何者？","answer":"1","options":{"A":"提高風險","B":"提高產品品質","C":"降低生產成本","D":"提高生產效率"}},{"id":880,"question":"關於橋梁混凝土作業施工安全注意事項，下列敘述何者正確？","answer":"4","options":{"A":"為掌握施工工期，應 儘量集中澆置混凝土","B":"如為趕工作業，可 於安全評估後免設 A公司應告知B公 司有關施工架搭設 之相關危害事項"}},{"id":952,"question":"依職業安全衛生設施規則規定，雇主架設之通道，如用漏空格條製 成，其縫間隙不得超過多少公厘？","answer":"4","options":{"A":"80","B":"60","C":"50","D":"30"}},{"id":953,"question":"下列何者非進行職業災害調查之目的？","answer":"2","options":{"A":"找出發生原因","B":"應付主管機關","C":"防止災害再度發生","D":"瞭解災害特性"}},{"id":954,"question":"依有機溶劑中毒預防規則之規定，所稱有機溶劑混存物係指有機溶 劑混存物中，含有之有機溶劑占其重量百分比多少以上者？","answer":"3","options":{"A":"1","B":"3","C":"5","D":"10"}},{"id":955,"question":"下列何者非屬職業疾病診斷所考量之因素？","answer":"1","options":{"A":"勞工薪資","B":"時序性","C":"危害暴露","D":"家族病史"}},{"id":956,"question":"勞工發生一氧化碳中毒時，應立即供給下列何種氣體呼吸？","answer":"2","options":{"A":"二氧化碳","B":"氧氣","C":"空氣","D":"稀釋氨氧給予刺激"}},{"id":957,"question":"將燃燒中的物質移開或斷絕供應，以削弱火勢或阻止火勢延燒，此 種滅火方法為下列何者？","answer":"1","options":{"A":"隔離法","B":"冷卻法","C":"窒息法","D":"抑制法"}},{"id":958,"question":"人體接近特高壓電路時，雖未接觸線路本體，但因空氣的絕緣被高 電壓所破壞，發生火花放電，人體感應電流，此種現象稱為何？","answer":"2","options":{"A":"閃燃","B":"閃絡","C":"打穿","D":"放電"}},{"id":959,"question":"下列何者不屬於鍋爐常用之安全裝置？","answer":"4","options":{"A":"安全閥","B":"水位高低警報器","C":"吹洩閥","D":"過負荷預防裝置"}},{"id":960,"question":"職業災害發生之原因可分為直接原因、間接原因及基本原因，下列 何者係屬「直接原因」？","answer":"1","options":{"A":"能量","B":"不安全行為","C":"不安全狀況","D":"管理上的缺陷"}},{"id":961,"question":"依職業安全衛生法規定，中央主管機關指定之事業，雇主應每隔多 久依規定填載職業災害統計，報請勞動檢查機構備查？","answer":"1","options":{"A":"每月","B":"每3個月","C":"每6個月","D":"每年"}},{"id":962,"question":"操作鑽床時，不可穿戴下列何種個人防護具？","answer":"3","options":{"A":"安全眼鏡","B":"口罩","C":"棉手套","D":"安全鞋"}},{"id":963,"question":"工業火災的發生火源中，以下列何者比例最高？","answer":"4","options":{"A":"人為明火","B":"車輛火花","C":"自燃","D":"電氣火花"}},{"id":964,"question":"使用合梯時，下列何者有誤？","answer":"4","options":{"A":"有安全之梯面","B":"腳部需撐開與地面 成75度","C":"單人使用時，禁止 登上最上一層頂板","D":"5公尺以上仍應使 用合梯作業"}},{"id":965,"question":"依勞工健康保護規則規定，雇主對年滿65歲之在職勞工，應每隔多 久定期實施一般健康檢查？","answer":"1","options":{"A":"每年","B":"每2年","C":"每3年","D":"每5年"}},{"id":966,"question":"雇主使勞工從事製造、處置或使用危害性化學品時，除應實施3小時 的一般安全衛生教育訓練外，應增加多少時數之危害通識訓練課","answer":"2","options":{"A":"2","B":"3","C":"4","D":"8"}},{"id":967,"question":"易燃液體如酒精等，該燃燒方式係屬下列何者？","answer":"3","options":{"A":"擴散燃燒","B":"分解燃燒","C":"蒸發燃燒","D":"表面燃燒"}},{"id":968,"question":"下列何者屬於「承攬管理」規章？","answer":"4","options":{"A":"推行安全衛生績效優 良單位各級主管人員 獎勵要點","B":"無職業災害單位獎 勵要點","C":"安全衛生績效競賽 實施要點","D":"承攬商安全衛生輔 導要點"}},{"id":969,"question":"依職業安全衛生設施規則規定，對於作業場所之走道照明，其照度 至少應為多少米燭光以上？","answer":"2","options":{"A":"10","B":"50","C":"100","D":"300"}},{"id":970,"question":"下列何種職業安全衛生法規主要適用於從事營造作業之有關事業？","answer":"4","options":{"A":"林場安全衛生設施規 則","B":"碼頭裝卸安全衛生 設施標準","C":"危險性機械及設備 安全檢查規則","D":"營造安全衛生設施 標準"}},{"id":971,"question":"事業單位僱用勞工人數多少人以上，依規定設職業安全衛生管理單 位或人員時，應於事業開始之日填具「職業安全衛生管理單位(人員) 設置報備書」陳報當地勞動檢查機構備查？","answer":"1","options":{"A":"30","B":"60","C":"100","D":"300"}},{"id":972,"question":"健康飲食為促進健康之要件，下列何種食物含鈣質量較少？","answer":"4","options":{"A":"牛奶","B":"小魚乾","C":"乳酪","D":"檳榔"}},{"id":973,"question":"下列何者是執行風險評估的時機？","answer":"3","options":{"A":"建立ISO 9000系統時","B":"僅針對變更使用既 有化學物質時","C":"作業方法變更時","D":"為因應驗證機構稽 核時"}},{"id":974,"question":"發生重大職業災害時，報告檢查機構之責任屬於下列何者？","answer":"1","options":{"A":"雇主","B":"消防人員","C":"警察","D":"領班"}},{"id":975,"question":"下列何者不屬於職業安全衛生管理規章中之「政策與組織」規定？","answer":"3","options":{"A":"安全衛生政策及目標","B":"安全衛生權責劃分 標準","C":"安全衛生績效競賽 實施要點","D":"職業安全衛生委員 會組織規程"}},{"id":976,"question":"一般而言，在風險評估時，當可能性為極可能、嚴重度屬重大，其 風險等級為何？","answer":"4","options":{"A":"可忽略風險","B":"低度風險","C":"可接受風險","D":"高度風險或重大風 險"}},{"id":977,"question":"有關臺灣職業安全衛生管理系統指引中之敘述，下列何者有誤？","answer":"3","options":{"A":"事前應實施風險評估","B":"與變更有關人員均 須被告知或訓練","C":"僅涉及設備或材料 等硬體變更事項， 未必須再實施風險 評估","D":"與變更有關文件均 須被檢討修正"}},{"id":978,"question":"依職業安全衛生法規定之特殊危害作業，應減少勞工工作時間，下 列何者非屬該作業？","answer":"4","options":{"A":"高溫作業","B":"精密作業","C":"高架作業","D":"廢棄物處理作業"}},{"id":979,"question":"電氣迴路中，接地線外圍絕緣皮之顏色為下列何者？","answer":"2","options":{"A":"紅","B":"綠","C":"藍","D":"黑"}},{"id":980,"question":"依職業安全衛生管理辦法規定，下列何者係指某些特殊機械設備， 於其完成設置開始使用前；或拆卸、改裝、修理後，就其部分重要 處實施檢查？","answer":"2","options":{"A":"竣工檢查","B":"重點檢查","C":"熔接檢查","D":"型式檢查"}},{"id":981,"question":"有關臺灣職業安全衛生管理系統指引之主要架構及依據，除了 OHSAS 18001之外，尚包括下列何者？","answer":"1","options":{"A":"ILO-OSH 2001","B":"ISO 9001","C":"ISO 18002","D":"ISO 14001"}},{"id":982,"question":"勞工作業環境監測實施辦法規定之高溫作業場所，應每隔多久測定 綜合溫度熱指數一次以上？","answer":"1","options":{"A":"3個月","B":"6個月","C":"1年","D":"2年"}},{"id":983,"question":"職業災害統計中對於暫時全失能定義為下列何者？","answer":"3","options":{"A":"死亡","B":"部分永久全失能","C":"暫時不能恢復工作 1日以上","D":"輕傷害"}},{"id":984,"question":"下列何者不屬職場健康促進主要推行工作範圍？","answer":"4","options":{"A":"健康生活","B":"友善職場","C":"舒適環境","D":"疾病治療"}},{"id":985,"question":"有關職業安全衛生管理規章之敘述，下列何者有誤？","answer":"4","options":{"A":"屬事業單位內部管理 程序等文件","B":"目的在要求執行職 業安全衛生有關事 項","C":"用以要求各級主管 及管理、指揮、監 督等有關人員","D":"對員工不具有強制 的規範"}},{"id":986,"question":"下列關於安全網之設置，下列何者有誤？","answer":"2","options":{"A":"安全網之材料及張掛 方式應符合國家標準 之規定","B":"發現安全網有破損 時，應即刻以防塵 網修補後才能繼續 使用","C":"為防止勞工墜落時 之拋物線效應，使 用於結構物四周之 安全網，於攔截高 度在1.5公尺以下者 ，至少應延伸2.5公 尺","D":"工作面至安全網架 設平面之攔截高度 ，不得超過7公尺"}},{"id":987,"question":"職業安全衛生法之立法意旨為保障工作者安全與健康，防止下列何 種災害？","answer":"1","options":{"A":"職業災害","B":"交通災害","C":"公共災害","D":"天然災害"}},{"id":988,"question":"依勞動檢查法施行細則規定，下列何者之洩漏，發生勞工中毒1人需 住院治療者，係屬重大職業災害？","answer":"3","options":{"A":"氯化氫","B":"瓦斯","C":"氯氣","D":"甲烷"}},{"id":989,"question":"依危險性工作場所審查暨檢查辦法規定，長度1000公尺以上或需開 挖15公尺以上之豎坑之隧道工程是屬於何類危險性工作場所？","answer":"4","options":{"A":"甲","B":"乙","C":"丙","D":"丁"}},{"id":990,"question":"依勞工健康保護規則之規定，下列何者不是特別危害健康之作業？","answer":"3","options":{"A":"粉塵作業","B":"噪音作業","C":"高架作業","D":"高溫作業"}},{"id":991,"question":"機械操作時若發生安全裝置失效或損壞，較適當之處置為下列何 者？","answer":"2","options":{"A":"該機器應只能視情況 偶爾使用","B":"應予維修完成再使 用","C":"在管理人員同意下 使用","D":"自行先確認無安全 顧慮時才可使用"}},{"id":992,"question":"對於局限空間場所作業，未實施通風換氣時，作業人員以佩戴下列 何種防護具較佳？","answer":"3","options":{"A":"N95口罩","B":"防毒面具","C":"供氣式呼吸防護具","D":"活性碳口罩"}},{"id":993,"question":"一般而言，職業災害調查，下列何者應列為優先？","answer":"4","options":{"A":"決定根本問題","B":"發現問題點","C":"樹立對策","D":"確認事實"}},{"id":994,"question":"堆高機操作人員未依速限行駛而肇災，其災害之間接原因為下列何 者？","answer":"2","options":{"A":"不安全設備","B":"不安全動作","C":"不安全環境","D":"天災"}},{"id":995,"question":"下列何者不易造成累積性肌肉骨骼傷害？","answer":"2","options":{"A":"重覆性作業","B":"低作業頻率","C":"長時間作業","D":"不自然的姿勢"}},{"id":996,"question":"依職業災害勞工保護法規定，勞工保險之被保險人，在保險有效期 間，罹患職業疾病，喪失部分或全部工作能力，經請領勞工保險各 項職業災害給付後，得向勞工保險局請領生活津貼之補助，合計以 幾年為限？","answer":"3","options":{"A":"2","B":"3","C":"5","D":"7"}},{"id":997,"question":"為防止施工人員墜落，以下做法何者錯誤？","answer":"1","options":{"A":"在施工架上適當位置 設置合梯以作為上下 設備","B":"組搭施工架時使用 扶手先行工法","C":"使施工架工作台與 構造物間之開口寬 度小於20公分","D":"於施工架兩端立架 及轉角處設置護欄"}},{"id":998,"question":"物料夾在輸送帶的滾輪與皮帶間時，下列何者不是正確之故障排除 方式？","answer":"2","options":{"A":"停止運轉","B":"繼續運轉","C":"掛牌","D":"應有多重上鎖裝置"}},{"id":999,"question":"高風險事業單位已實施職業安全衛生管理系統，其所設置之職業安 全衛生管理單位如何才得以免除一級專責的限制？","answer":"2","options":{"A":"安全評估報告送檢查 機構審查","B":"管理績效報經中央 主管機關認可","C":"向當地主管機關申 請即可","D":"獲得國家工安獎者"}},{"id":1000,"question":"手工具之操作，下列敘述何者較適當？","answer":"4","options":{"A":"以刀片當螺絲起子旋 轉螺絲","B":"以鉗子敲打鐵釘","C":"用扳手敲打鐵釘","D":"選擇適合工作需要 之手工具"}},{"id":1001,"question":"下列有關感電災害防止措施，何者有誤？","answer":"1","options":{"A":"穿釘鞋直接碰觸電氣 設備，不會感電","B":"使用前，要確認電 動工具接地線是否 連接妥當","C":"電氣設備，要加裝 漏電斷路器","D":"不得擅自接用電源 插頭或電氣箱"}},{"id":1002,"question":"職業安全衛生管理系統中之「預防與控制措施」項目中，下列何者 為第一優先採行的措施？","answer":"3","options":{"A":"設置安衛組織人員","B":"實施教育訓練","C":"消除危害及風險","D":"提供適當個人防護 具"}},{"id":1003,"question":"下列何者為混凝土預拌車於清掃內部結塊或維修時，較不易發生之 危害？","answer":"1","options":{"A":"火災","B":"墜落","C":"缺氧","D":"捲夾"}},{"id":1004,"question":"使用過氧化二苯甲醯從事批式製程反應作業，下列敘述何者有誤？","answer":"4","options":{"A":"儲存場所之電氣設備 需具防爆功能","B":"有機過氧化物之領 料應先進先出","C":"儲存場所應與製程 區分開","D":"多批次作業所需的 過氧化二苯甲醯以 一次領取為最佳"}},{"id":1005,"question":"依職業安全衛生管理辦法規定，雇主對於高壓電氣設備及低壓電氣 設備，應每隔多久定期實施檢查一次？","answer":"1","options":{"A":"每年","B":"每2年","C":"每3年","D":"每4年"}},{"id":1006,"question":"甲公司將其事業交付乙公司承攬，並提供移動式起重機供該乙公司 使用，依職業安全衛生管理辦法規定，原則上該起重機應由下列何 者實施自動檢查？","answer":"2","options":{"A":"乙公司","B":"甲公司","C":"甲、乙公司推派代 表","D":"委託代檢機構"}},{"id":1007,"question":"依職業安全衛生法規定，勞工如拒不接受雇主提供之安全衛生教育 訓練，可處新臺幣多少元以下罰鍰？","answer":"1","options":{"A":"3,000","B":"10,000","C":"15,000","D":"30,000"}},{"id":1008,"question":"依職業安全衛生設施規則規定，雇主對室內工作場所應符合之規定 中，下列敘述何者錯誤？","answer":"4","options":{"A":"主要人行道不得小於 1公尺","B":"各機械間通道不得 小於80公分","C":"主要人行道及安全 門應有明顯標示","D":"自路面起算1公尺 高度範圍內，得有 障礙物"}},{"id":1009,"question":"下列何者屬不安全行為？","answer":"1","options":{"A":"不正確之提舉","B":"警報系統不良","C":"採光照明不良","D":"工具、機械或物料 有缺陷"}},{"id":1010,"question":"若電氣迴路中之過載電流越小，則斷路器可允許之操作時間為何？","answer":"1","options":{"A":"越長","B":"越短","C":"兩者無關","D":"不一定"}},{"id":1011,"question":"依職業安全衛生管理辦法規定，職業安全衛生委員會應每隔多久至 少開會1次？","answer":"1","options":{"A":"3個月","B":"6個月","C":"1年","D":"2個月"}}]}}</textarea>
