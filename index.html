 24, "question": "依職業安全衛生法規定，雇主對在職勞工應施行一般健康檢查，勞工對於該檢查應如何辦理？", "options": {"A": "應拒絕", "B": "有接受之義務", "C": "看勞工心情", "D": "可放棄檢查。"}, "answer": "B"}, {"id": 25, "question": "職業安全衛生法第所稱在職勞工應施行之健康檢查為何？", "options": {"A": "一般健康檢查", "B": "體格檢查", "C": "身體檢查", "D": "以上皆是。"}, "answer": "A"}, {"id": 26, "question": "依職業安全衛生法規定，勞工因職業上原因不能適應原有工作時，雇主應採取之措施，下列何者有誤？", "options": {"A": "予以解雇", "B": "縮短工時", "C": "變更作業場所", "D": "更換工作。"}, "answer": "A"}, {"id": 27, "question": "依職業安全衛生法規定，若勞工不接受雇主對其施以從事工作及預防腐災變所必要之勞工安全衛生教育、訓練，以下何者可對該勞工處以新臺幣3千元之罰鍰？", "options": {"A": "雇主", "B": "職業安全衛生法所稱之主管機關", "C": "工會", "D": "以上皆否。"}, "answer": "B"}, {"id": 28, "question": "勞工遭遇職業傷害或罹患職業病而死亡時，雇主應給付其喪葬費用及死亡補償，共計幾個月平均工資？", "options": {"A": "55個月", "B": "50個月", "C": "45個月", "D": "40個月。(死亡時3日給予5個月，15日給予40個月，共45個月)"}, "answer": "C"}, {"id": 29, "question": "雇主依職業安全衛生法有關規定，訂定適合其事業單位需要之安全衛生工作守則時，應會同何人訂定？", "options": {"A": "勞動部", "B": "檢查機構", "C": "勞工代表", "D": "家屬。"}, "answer": "C"}, {"id": 30, "question": "自營作業者，是否準用危險性機械及設備安全檢查規則內之有關雇主義務之規定？", "options": {"A": "準用", "B": "不準用", "C": "另有法規規定", "D": "準用，但不會被罰緩。"}, "answer": "A"}, {"id": 31, "question": "工程施工物料進場堆積放置時，除應放置於穩固及平坦處外，其高度不得超過多少公尺？", "options": {"A": "1.2", "B": "1.5", "C": "1.8", "D": "2.0 公尺。"}, "answer": "C"}, {"id": 32, "question": "依職業安全衛生法規定，事業單位有發生立即危險之虞時？", "options": {"A": "馬上逃離公司避免危害到自己", "B": "報告自己的好友即可", "C": "因應生產目標應繼續工作", "D": "應立即停工，報告主管後並將工作人員退避至安全處所。"}, "answer": "D"}, {"id": 33, "question": "經勞動檢查機構以書面通知之檢查結果，事業單位應於該違規場所顯明易見處公告幾日以上？", "options": {"A": "7", "B": "10", "C": "15", "D": "30 日。"}, "answer": "A"}, {"id": 34, "question": "對於事業單位有違反勞動法令規定之檢查結果，勞動檢查機構應於幾日內以書面通知立即改正或限期改善？", "options": {"A": "7", "B": "10", "C": "15", "D": "30 日。"}, "answer": "B"}, {"id": 35, "question": "職業安全衛生法於", "options": {"A": "101年7月3日", "B": "102年7月3日", "C": "103年7月3日", "D": "104年7月3日實施。(102年7月3日為公告)"}, "answer": "C"}, {"id": 36, "question": "乙類工作場所之申請期限為幾日內？", "options": {"A": "作業60日前", "B": "作業75日前", "C": "作業90日前", "D": "以上皆非。（甲類丁類30天，乙類丙類45天）"}, "answer": "D"}, {"id": 37, "question": "依勞動基準法規定，勞工遭受職業災害後，雇主之職業災害補償原則為下列何者？", "options": {"A": "不論雇主有無過失責任，均應予以補償", "B": "視雇主有無過失決定補償與否", "C": "視勞工有無過失決定補償與否", "D": "視勞工是否提出要求決定補償與否。"}, "answer": "A"}, {"id": 38, "question": "依職業安全衛生設施規則規定，室內工作場所之通道，自路面起算多少公尺高度範圍內不得有障礙物？", "options": {"A": "1.8", "B": "2", "C": "2.1", "D": "3 公尺"}, "answer": "B"}, {"id": 39, "question": "依職業安全衛生法規定，非屬於雇主不得使分娩後未滿1年女性勞工從事下列何種危險性或有害性工作？", "options": {"A": "礦坑工作", "B": "異常氣壓工作", "C": "起重機、人字臂起重桿之運轉工作。", "D": "鉛及其化合物散布場所之工作。"}, "answer": "C"}, {"id": 40, "question": "依職業安全衛生設施規則規定，多少公斤以上之物品宜以人力車輛或工具搬運為原則？", "options": {"A": "20", "B": "30", "C": "40", "D": "50 公斤。"}, "answer": "C"}, {"id": 41, "question": "依職業安全衛生設施規則規定，多少公斤以上之物品宜以動力車輛或機械式搬運為原則？", "options": {"A": "100", "B": "300", "C": "500", "D": "1000 公斤。"}, "answer": "C"}, {"id": 42, "question": "依職業安全衛生設施規則規定，雇主對室內工作場所通道之設置，下列何者正確？", "options": {"A": "主要人行道寬度不得小於1公尺", "B": "各機械間或其他設備通道寬度不得小於60公分", "C": "自路面算起3公尺範圍內不得有障礙物", "D": "高低差2公尺以上應提供上下設備。"}, "answer": "A"}, {"id": 43, "question": "依職業安全衛生教育訓練規則規定，操作下列何種機具不必接受具有危險性機械或設備操作人員訓練？", "options": {"A": "鍋爐（小型鍋爐除外）", "B": "第一種壓力容器", "C": "吊升荷重在3公噸以上之起重機", "D": "荷重1公噸以上堆高機。"}, "answer": "D"}, {"id": 44, "question": "依職業安全衛生管理辦法規定，事業單位勞工在多少人以上時，雇主應訂定職業安全衛生管理規章？", "options": {"A": "30", "B": "50", "C": "100", "D": "300 人。"}, "answer": "C"}, {"id": 45, "question": "勞工從事作業時，於各項職業安全衛生管理措施中，應報請勞動檢查機構備查者為何？", "options": {"A": "職業安全衛生管理計畫", "B": "勞工體格檢查結果", "C": "勞工之安全衛生教育訓練", "D": "職業安全衛生工作守則。"}, "answer": "D"}, {"id": 46, "question": "護欄前方幾公尺內之樓板、地板，嚴禁堆放任何物料、設備？", "options": {"A": "0.5", "B": "1", "C": "1.5", "D": "2 公尺"}, "answer": "D"}, {"id": 47, "question": "使用移動梯，應符合下列規定？", "options": {"A": "移動梯踏面小於3公分", "B": "任何材料與結構皆可，不須考慮其堅固性", "C": "採取防止滑溜或轉動之必要措施", "D": "梯面寬度大小無礙。"}, "answer": "C"}, {"id": 48, "question": "高度2 公尺以上開口護欄設置下列敘述何者為非？", "options": {"A": "上欄杆應有90公分以上", "B": "中欄杆應有55公分以上", "C": "腳趾板至少5公分以上並有1公分厚度", "D": "桿柱強度及錨錠，應使整個護欄具有抵抗上欄桿任一點任何方向加以75公斤之荷重而不變型。"}, "answer": "C"}, {"id": 49, "question": "依職業安全衛生法施行細則規定，會同訂定安全衛生工作守則及參與實施職業災害調查分析之勞工代表的推派或推選，下列何者不得為推派或推選人？", "options": {"A": "由勞資會議之勞方代表推選", "B": "由工會推派", "C": "由全體員工推選", "D": "由雇主派任。"}, "answer": "D"}, {"id": 50, "question": "固定梯子頂端應突出樓板地面多少公分以上？", "options": {"A": "30", "B": "60", "C": "80", "D": "100 公分。"}, "answer": "B"}, {"id": 51, "question": "移動梯每一寬度至少有多少公分以上？", "options": {"A": "20", "B": "30", "C": "40", "D": "50 公分。"}, "answer": "B"}, {"id": 52, "question": "雇主對於使用之移動梯，應符合那些規定？", "options": {"A": "具有堅固之構造", "B": "其材質.不得有顯著之損傷、腐蝕等現象", "C": "寬度應在30公分以上且應採取防止滑溜或其他防止轉動之必要措施", "D": "以上皆是。"}, "answer": "D"}, {"id": 53, "question": "下列何者非使用安全合梯規範？", "options": {"A": "堅固構造", "B": "中間可使用麻繩繫材扣牢", "C": "梯腳與地面角度75°內", "D": "無明顯損傷、腐蝕。"}, "answer": "B"}, {"id": 54, "question": "何者為安全合梯使用方式？", "options": {"A": "可夾著合梯移動", "B": "高度2公尺以上使用", "C": "可兩人同時站立於各梯面側", "D": "不可站立於頂梯面上。"}, "answer": "D"}, {"id": 55, "question": "依職業安全衛生法規定，下列何者場所系指工作場所中，為特定之工作目所設場所？", "options": {"A": "公共場所", "B": "就業場所", "C": "施工場所", "D": "作業場所。"}, "answer": "D"}, {"id": 56, "question": "依職業安全衛生法規定之特殊危害作業具有特殊危害之作業，應減少勞工作業時間，下列何者非屬該作業？", "options": {"A": "精密作業", "B": "高架作業", "C": "高溫作業", "D": "堆高機操作作業。"}, "answer": "D"}, {"id": 57, "question": "依職業安全衛生法規定之特殊危害作業具有特殊危害之作業，在高溫場所工作之勞工，雇主不得使其每日工作時間超幾小時？", "options": {"A": "1", "B": "2", "C": "3", "D": "6 小時。"}, "answer": "D"}, {"id": 58, "question": "某科技公司之職業安全衛生管理員，最近因家庭因素暫時無法執行職務，依職業安全衛生管理辦法規定，下列敘述何者有誤？", "options": {"A": "無須代理人，但必須報當地主管機關備查", "B": "雇主可找職業安全管理之暫時代理之", "C": "雇主應指定適當代理人", "D": "雇主應指定之代理人，代理期間不得超過3個月。"}, "answer": "A"}, {"id": 59, "question": "勞工正常工作以外之作業，其作業期間不超過3個月且1年內不再重複，屬為何者？", "options": {"A": "臨時性作業", "B": "作業時間短暫", "C": "作業期間短暫", "D": "正常作業。"}, "answer": "A"}, {"id": 60, "question": "依職業安全衛生法之規定，雇用勞工從事工作之機構稱為？", "options": {"A": "工廠", "B": "事業單位", "C": "公司", "D": "企業。"}, "answer": "B"}, {"id": 61, "question": "事業單位之職業安全衛生管理，依職業安全衛生法施行細則規定， 下列何者應負責辦理？", "options": {"A": "雇主", "B": "安全衛生業務主管", "C": "勞工", "D": "領班。"}, "answer": "A"}, {"id": 62, "question": "職業災害的定義，指因下列何種場所之建築物、機械等或作業活動及其他職業上原因引起之工作者疾病、傷害、失能或死亡？", "options": {"A": "公共場所", "B": "工作場所", "C": "勞動場所", "D": "作業場所。"}, "answer": "C"}, {"id": 63, "question": "依職業安全衛生法規定，中央主管機關指定之機械、設備或器具，其構造性能及防護非符合安全標準者，下列何者非指定之對象？", "options": {"A": "動力衝剪機械", "B": "動力推高機", "C": "防爆電器設備", "D": "移動式起重機。"}, "answer": "D"}, {"id": 64, "question": "依職業安全衛生法規定，中央主管機關指定之機械、設備或器具，其構造性能及防護非符合安全標準者，不得產製運出廠、輸入、租貸、供應或設置，此規定不適用何者？", "options": {"A": "製造者", "B": "輸入者", "C": "勞工", "D": "供應者。"}, "answer": "C"}, {"id": 65, "question": "依勞動檢查法規定，下列何者為中央主管機關指定為辦理危險性機械或設備檢查之行政機關、學術機構、公營事業機構或非營利法人？", "options": {"A": "代行檢查機構", "B": "學術機構", "C": "研究機構", "D": "慈善機構。"}, "answer": "A"}, {"id": 66, "question": "依勞動檢查法規定，事業單位對於未持勞動檢查證者，得否拒絕檢查？", "options": {"A": "不得拒絕", "B": "得拒絕", "C": "無明文規定", "D": "得免派員陪同檢查。"}, "answer": "B"}, {"id": 67, "question": "除經勞動機構或主管機關核准者外，勞動檢查員執行下列何種職務，不得事先通知事業單位？", "options": {"A": "危險或工作場所審查或檢查", "B": "危險性機械或設備檢查", "C": "專案檢查", "D": "職業災害檢查。"}, "answer": "C"}, {"id": 68, "question": "依職業安全衛生法規定，勞工如發現事業單位違反職業安全衛生法之規定時，得向何者申訴？", "options": {"A": "檢察機關", "B": "鄉鎮公所", "C": "主管機關", "D": "工商協會。"}, "answer": "C"}, {"id": 69, "question": "捲揚裝置於開始使用、拆卸、捲揚、改裝或修理時，應實施下列何種檢查？", "options": {"A": "型式檢查", "B": "竣工檢查", "C": "重點檢查", "D": "熔接檢查。"}, "answer": "C"}, {"id": 70, "question": "職業安全衛生法所稱具有危害性化學品，係指符合下列何種國家標準之危險物或有害物？", "options": {"A": "CNS14253-1", "B": "CNS15030", "C": "CNS45001", "D": "CNS4750"}, "answer": "B"}, {"id": 71, "question": "雇主使勞工從事製造、處置、或使用危害性化學品時，除應實施多少小時的一般安全衛生教育訓練外，應增加多少時數之危害通識訓練課程？", "options": {"A": "1", "B": "2", "C": "3", "D": "5 小時。"}, "answer": "C"}, {"id": 72, "question": "高壓氣體容器於搬運時，依職業安全衛生設施規則規定，下列事項何者為非？", "options": {"A": "溫度保持攝氏50度以下", "B": "儘量使用專用手推車", "C": "避免與其他氣體混載", "D": "應有警戒標誌。"}, "answer": "A"}, {"id": 73, "question": "下列何處為較佳之手推車搬運物料之裝載重心？", "options": {"A": "上部", "B": "下部", "C": "中部", "D": "任意部位。"}, "answer": "B"}, {"id": 74, "question": "固定梯之踏條應與牆壁間保持多少公分以上淨距？", "options": {"A": "13.5", "B": "14.5", "C": "15.5", "D": "16.5 公分。"}, "answer": "D"}, {"id": 75, "question": "依職業安全衛生設施規則規定，雇主對於升降機之升降路各樓出入口門，應有連鎖裝置，使搬器地板與樓板相差幾公分以上時，升降路出入口門不得開啟？", "options": {"A": "3.5", "B": "5.5", "C": "7.5", "D": "10 公分。"}, "answer": "C"}, {"id": 76, "question": "依職業安全衛生設施規則規定，雇主對於使用多少伏特以上之移動式電動機具，為防止因漏電造成感電危害，應設置適當之漏電斷路器？", "options": {"A": "110", "B": "150", "C": "220", "D": "600 伏特。"}, "answer": "B"}, {"id": 77, "question": "依職業安全衛生設施規則規定，雇主對於研磨機之使用，下列敘述何者錯誤？", "options": {"A": "研磨輪更換時應先檢驗有無裂痕，並在防護罩下試轉3分鐘以上", "B": "規定研磨輪使用，除該研磨輪為側用外，不得使用側面", "C": "規定研磨機之使用，得超過規定最高使用周速度", "D": "規定研磨機使用，應於每日作業開始前試轉1分鐘以上。"}, "answer": "C"}, {"id": 78, "question": "有關職業安全衛生委員會辦理方式，下列何者有誤？", "options": {"A": "委員會置委員7人以上", "B": "應每個月至少開會一次以上", "C": "勞工代表不可為雇主指派", "D": "委員任期為二年，並以雇主為主任委員，綜理會務。"}, "answer": "B"}, {"id": 79, "question": "依法令規定，職業安全衛生委員會中由工會或勞工選舉之代表應占委員人數之多少以上？", "options": {"A": "1/2", "B": "1/3", "C": "1/4", "D": "無規定。"}, "answer": "B"}, {"id": 80, "question": "依職業安全衛生管理辦法規定，事業單位勞工在多少人以上時，雇主應訂定職業安全衛生管理規章？", "options": {"A": "30", "B": "50", "C": "100", "D": "300 人。"}, "answer": "C"}, {"id": 81, "question": "依職業安全衛生管理辦法規定，勞工人數至少在多少人以上之事業單位，應指人員參加並取得甲種職業安全衛生業務主管衛生教育訓練？", "options": {"A": "30", "B": "70", "C": "100", "D": "300 人。"}, "answer": "C"}]}, "3": {"chapter": "第三章 職業安全衛生概論", "total_questions": 65, "questions": [{"id": 1, "question": "下列何者不屬於局限空間作業之危害防止計畫應訂定事項?", "options": {"A": "作業工期及費用", "B": "人員進入作業許可程序", "C": "通風換氣實施方式", "D": "氧氣、危險物、有害物濃度測定。"}, "answer": "A"}, {"id": 2, "question": "依勞工作業環境監測實施辦法定義，指作業期間不超過1個月，且確知自該作業終了日起6個月，不再實施該作業者，為下列何者？", "options": {"A": "非例行性作業", "B": "假設性作業", "C": "作業期間短暫", "D": "異常性作業。"}, "answer": "C"}, {"id": 3, "question": "依勞工健康保護規則之規定，下列何者不是特別危害健康之作業?", "options": {"A": "噪音作業", "B": "粉塵作業", "C": "高溫作業", "D": "高架作業。(特殊危害作業：精密、異常氣壓、高架、高溫、重體力等作業)"}, "answer": "D"}, {"id": 4, "question": "有關公司員工健康檢查結果之處理，下列敘述何者錯誤?", "options": {"A": "健康檢查結果應彙整成健康檢查手冊", "B": "健康檢查結果之處理應考量勞工隱私權", "C": "兩家公司共同承攬之工程，員工健康檢查結果保存期限至該工程完工為止", "D": "健康檢查結果應發給受檢勞工。"}, "answer": "C"}, {"id": 5, "question": "異常氣壓作業之檢點，不包括下列何者?", "options": {"A": "高壓室內作業", "B": "動火作業場所", "C": "沈箱作業", "D": "潛水作業。"}, "answer": "B"}, {"id": 6, "question": "依職業安全衛生管理辦法規定下列何者非屬自動檢查之內容?", "options": {"A": "機械之定期檢查", "B": "機械、設備之重點檢查", "C": "勞工健康檢查", "D": "機械、設備作業檢點。"}, "answer": "C"}, {"id": 7, "question": "依職業安全衛生法施行細則規定，下列何者非屬安全衛生工作守則之內容?", "options": {"A": "事業之勞工安全衛生管理及各級之權責", "B": "工作安全及衛生標準", "C": "環境汙染預防", "D": "設備之維護及檢查。"}, "answer": "C"}, {"id": 8, "question": "依職業安全衛生設施規則規定，雇主對於扇風機之葉片，如有危害勞工手指之處時，應設何種安全設備?", "options": {"A": "防滑舌片", "B": "自動電擊防止裝置", "C": "護網或護圍", "D": "防爆電器設備。"}, "answer": "C"}, {"id": 9, "question": "依職業安全衛生設施規則規定，雇主對物料堆放應符合之規定中，下列敘述何者錯誤?", "options": {"A": "不得妨礙機械設備之操作", "B": "不得影響照明", "C": "不得超过堆放地最大安全負荷", "D": "為便於作業得堆置於開口邊緣。"}, "answer": "D"}, {"id": 10, "question": "安全衛生教育訓練是勞工應盡義務，若勞工若不接受，可處新臺幣多少以下罰鍰?", "options": {"A": "1千", "B": "2千", "C": "3千", "D": "5千。"}, "answer": "C"}, {"id": 11, "question": "工作場所空氣中含氧量應在多少以上？", "options": {"A": "21％", "B": "20％", "C": "19％", "D": "18％ 。"}, "answer": "D"}, {"id": 12, "question": "工作電燈不亮可能原因？", "options": {"A": "燈泡壞了", "B": "沒接電", "C": "漏電斷路器跳脫", "D": "以上皆是。"}, "answer": "D"}, {"id": 13, "question": "油漆作業潛在危害為何?", "options": {"A": "有機溶劑中毒", "B": "火災", "C": "墜落", "D": "以上皆是。"}, "answer": "D"}, {"id": 14, "question": "排氣裝置故障時勞工須如何處置?", "options": {"A": "不理會繼續工作", "B": "退避至安全無虞之場所", "C": "與其他同仁更換作業場所", "D": "以上皆非。"}, "answer": "B"}, {"id": 15, "question": "要清理水箱要如何處理？", "options": {"A": "先把火柴點著丟進去", "B": "放隻小鳥進去", "C": "先通風", "D": "使用汽油引擎供電。"}, "answer": "C"}, {"id": 16, "question": "安全帽受到重大衝擊，外觀良好，應如何處理？", "options": {"A": "廢棄", "B": "繼續使用", "C": "送修", "D": "油漆。"}, "answer": "A"}, {"id": 17, "question": "安全帽使用前應符合?", "options": {"A": "帽殼沒有凹或击洞、裂痕", "B": "符合", "C": "邊緣用雙手往內壓然後放鬆，帽殼很快恢復至沒有壓縮前的形狀", "D": "以上皆是。"}, "answer": "D"}, {"id": 18, "question": "工作用電動器具突然不動時要如何處理？", "options": {"A": "自行拆開修理", "B": "報告主管", "C": "丟掉", "D": "休息。"}, "answer": "B"}, {"id": 19, "question": "下列何者非勞工義務?", "options": {"A": "接受健康檢查", "B": "接受安全衛生教育訓練", "C": "提供安全衛生設備及措施", "D": "遵守工作守則。"}, "answer": "C"}, {"id": 20, "question": "戴用安全帽要注意？", "options": {"A": "調整頭帶", "B": "使用頤帶", "C": "合格標籤", "D": "以上皆是。"}, "answer": "D"}, {"id": 21, "question": "使用電梯時下列敘述何者有誤?", "options": {"A": "注意荷重", "B": "撬開電梯門", "C": "注意被夾", "D": "注意安全連鎖裝置。"}, "answer": "B"}, {"id": 22, "question": "作業主管於作業現場監督勞工作業，應如何處理?", "options": {"A": "早上去現場，下午沒事即可離開", "B": "下午去即可", "C": "無特殊情況可不去", "D": "作業期間隨時監督。"}, "answer": "D"}, {"id": 23, "question": "依職業安全衛生管理辦法規定，定期檢查、重點檢查之紀錄應保存幾年以上？", "options": {"A": "1", "B": "2", "C": "3", "D": "4。"}, "answer": "C"}, {"id": 24, "question": "勞工如於職業災害期間不能工作，需請假就醫或治療，其請假期間薪資應如何計算？", "options": {"A": "不給薪", "B": "給全薪", "C": "給半薪", "D": "給1/3薪。"}, "answer": "B"}, {"id": 25, "question": "辦理新僱勞工一般安全衛生教育訓練時，其訓練時數依職業安全衛生教育訓練規則不得少於多少小時？", "options": {"A": "3", "B": "6", "C": "12", "D": "18。"}, "answer": "A"}, {"id": 26, "question": "下列有關職業安全衛生教育訓練之辦理方式，何者有誤？", "options": {"A": "事業單位不具辦理資格，應指派勞工至職業訓練機構受訓", "B": "對於已取得資格之不同職類勞工，應定期分別使其接受在職教育訓練", "C": "訓練單位辦理鍋爐操作人員教育訓練，應向當地主管機關報備", "D": "雇主對於小型鍋爐操作人員，應使其接受特殊作業安全衛生教育訓練。"}, "answer": "A"}, {"id": 27, "question": "依高壓氣體勞工安全規則規定，在常用溫度下，壓力達每平方公分多少公斤以上之壓縮乙炔氣，即是高壓氣體？", "options": {"A": "1", "B": "2", "C": "5", "D": "10。"}, "answer": "B"}, {"id": 28, "question": "短時間時量平均容許濃度之短時間係指多少分鐘？", "options": {"A": "5", "B": "10", "C": "15", "D": "20。"}, "answer": "C"}, {"id": 29, "question": "刺激性危害物質具高溶解度者，主要會作用於暴露者之何部位？", "options": {"A": "上呼吸道", "B": "上、下呼吸道", "C": "下呼吸道", "D": "下呼吸道及呼吸道末端。"}, "answer": "A"}, {"id": 30, "question": "二氧化矽作業勞工，因作業環境不良，較易罹患下列何種疾病？", "options": {"A": "痛痛病", "B": "塵肺症", "C": "白血症", "D": "多發性神經病變。"}, "answer": "B"}, {"id": 31, "question": "錳對人體之主要危害為下列何者？", "options": {"A": "神經", "B": "血液", "C": "皮膚", "D": "骨骼。"}, "answer": "A"}, {"id": 32, "question": "下列何種作業勞工可能會發生鼻中膈穿孔？", "options": {"A": "苯", "B": "硫酸", "C": "鉻酸", "D": "鎘。"}, "answer": "C"}, {"id": 33, "question": "勞工從事石綿作業且有抽菸習慣易造成肺癌，其暴露化學物質間之反應屬下列何種效應？", "options": {"A": "獨立", "B": "相乘", "C": "相減", "D": "相加。"}, "answer": "B"}, {"id": 34, "question": "依職業安全衛生設施規則規定，勞工在坑內、儲槽、隧道等自然換氣不充分之場所工作，不得使用下列何種機械，以避免排出廢氣危害勞工？", "options": {"A": "電氣機械", "B": "人力機械", "C": "具有內燃機之機械", "D": "手提電動機械。"}, "answer": "C"}, {"id": 35, "question": "依職業安全衛生設施規則規定，勞工經常作業之室內作業場所，除設備及自地面算起高度超過4公尺以上之空間不計外，每一勞工原則上應有多少立方公尺以上之空間？", "options": {"A": "3", "B": "5", "C": "7", "D": "10。"}, "answer": "D"}, {"id": 36, "question": "實施勞工個人作業環境空氣中有害物採樣時，採樣器(holder)佩戴位置於下列何者最適宜？", "options": {"A": "勞工衣領處", "B": "勞工前腹腰帶", "C": "勞工側邊腰帶", "D": "勞工背後腰帶。"}, "answer": "A"}, {"id": 37, "question": "一般情況下，起重機吊運物件時，吊物上最多可乘坐幾人？", "options": {"A": "無限制", "B": "不可載人", "C": "2人", "D": "1人。"}, "answer": "B"}, {"id": 38, "question": "一般統計分析過去職業災害原因，下列何者占比例最高？", "options": {"A": "不安全行為", "B": "天災", "C": "職業病", "D": "不安全設備。"}, "answer": "A"}, {"id": 39, "question": "下列何者是一般防止職業災害或職業病之原則？", "options": {"A": "成本重於一切", "B": "治療重於預防", "C": "預防重於治療", "D": "預防與治療並重。"}, "answer": "C"}, {"id": 40, "question": "下列何種職業災害類型導致之死亡率較高？", "options": {"A": "感電", "B": "火災、爆炸", "C": "墜落", "D": "被夾、被捲。"}, "answer": "C"}, {"id": 41, "question": "工作安全分析的第一個程序為何？", "options": {"A": "選定要分析的工作", "B": "找出危害及可能發生的事故", "C": "將工作分解成若干步驟", "D": "提出預防危害方法。"}, "answer": "A"}, {"id": 42, "question": "下列何者為製作安全作業標準首要步驟？", "options": {"A": "確認實際工作步驟", "B": "不安全因素", "C": "可能造成之傷害", "D": "事故處理之方法。"}, "answer": "A"}, {"id": 43, "question": "工作安全分析的最後一個程序為何？", "options": {"A": "決定要分析的工作", "B": "尋求避免危害及可能發生事故的方法", "C": "找出危害及可能發生的事故", "D": "將工作分解成若干步驟。"}, "answer": "B"}, {"id": 44, "question": "誰是負責執行工作安全分析？", "options": {"A": "廠長", "B": "外聘專家", "C": "保全人員", "D": "領班。"}, "answer": "D"}, {"id": 45, "question": "工作安全分析優先考慮的對象，下列何者為非？", "options": {"A": "傷害頻率高者", "B": "新工作", "C": "臨時性工作", "D": "低風險性工作。"}, "answer": "D"}, {"id": 46, "question": "工作安全分析的目的，下列何者為非？", "options": {"A": "發現並杜絕工作危害", "B": "確立工作安全所需工具與設備", "C": "作為員工在職訓練的參考", "D": "懲罰犯錯的員工。"}, "answer": "D"}, {"id": 47, "question": "下列何者為在工作安全分析應考慮的不安全主體？", "options": {"A": "材料", "B": "機械", "C": "環境", "D": "人。"}, "answer": "D"}, {"id": 48, "question": "為防止災害，應對下列何者採取適當對策或措施？", "options": {"A": "人員或設備一擇", "B": "設備優先", "C": "人員及設備皆優先", "D": "人員優先。"}, "answer": "C"}, {"id": 49, "question": "勞工因長期工作壓迫及重複性作業引起椎間盤突出，屬於下列何種危害因子？", "options": {"A": "物理性", "B": "化學性", "C": "生物性", "D": "人因性。"}, "answer": "D"}, {"id": 50, "question": "勞工因長期暴露於噪音過大之工作場所，可能造成永久聽力損失，噪音，屬於下列何種危害因子？", "options": {"A": "物理性", "B": "化學性", "C": "生物性", "D": "人因性。"}, "answer": "A"}, {"id": 51, "question": "下列何種危害係由於搬運化學品鋼瓶時不慎翻倒碰觸腳部受傷，屬於下列何種危害因子？", "options": {"A": "物理性", "B": "化學性", "C": "生物性", "D": "人因性。"}, "answer": "A"}, {"id": 52, "question": "為防止高溫爐前作業之輻射熱危害，宜使用下列何者保護手部？", "options": {"A": "隔熱手套", "B": "棉紗手套", "C": "橡膠手套", "D": "塑膠手套。"}, "answer": "A"}, {"id": 53, "question": "機臺作業面高度過高，會使作業動作不自然，若長期可能導致肌肉骨骼傷害，請問動作不自然，屬於下列何種危害因子？", "options": {"A": "物理性", "B": "化學性", "C": "生物性", "D": "人因工程。"}, "answer": "A"}, {"id": 54, "question": "勞工進入儲槽後因墜落死亡，在職業災害調查分析時，未施以從事工作及預防災害所必要之安全衛生教育及訓練屬下列何種原因？", "options": {"A": "特殊原因", "B": "直接原因", "C": "間接原因", "D": "基本原因。"}, "answer": "D"}, {"id": 55, "question": "職業災害發生，係因安全衛生管理不良所致，屬下列何種原因？", "options": {"A": "基本原因", "B": "直接原因", "C": "間接原因", "D": "天災 管理不良所致是基本原因。"}, "answer": "A"}, {"id": 56, "question": "下列何者非意外災害發生的間接原因？", "options": {"A": "未依標準作業程序操作", "B": "未提供安全設備", "C": "未提供安全護具", "D": "安全衛生管理不善。"}, "answer": "D"}, {"id": 57, "question": "下列何者非屬職業災害原因分析之基本原因？", "options": {"A": "未定期檢討安全衛生政策", "B": "因缺氧致死", "C": "未實施工作安全分析", "D": "未實施預防性保養。"}, "answer": "B"}, {"id": 58, "question": "下列何者非意外災害發生的基本原因？", "options": {"A": "承攬商管理不良", "B": "安全衛生管理不善", "C": "未提供安全設備", "D": "危害認知不足。"}, "answer": "C"}, {"id": 59, "question": "下列何者非意外災害發生的直接原因", "options": {"A": "高處墜落", "B": "感電致死", "C": "未依標準作業程序操作", "D": "能量接觸。"}, "answer": "C"}, {"id": 60, "question": "某公司因管線破裂造成毒性氣體外洩事故，造成人員中毒，在職業災害調查分析時，暴露毒性氣體屬下列何者？", "options": {"A": "直接原因", "B": "基本原因", "C": "長期原因", "D": "間接原因。"}, "answer": "A"}, {"id": 61, "question": "不安全動作為造成災害的何種原因？", "options": {"A": "直接原因", "B": "間接原因", "C": "基本原因", "D": "長期原因。"}, "answer": "B"}, {"id": 62, "question": "當人或物體受到能量或危害物的襲擊而不能安全地予以吸收時而造成災害，此能量或危害物即為引起災害的何種原因？", "options": {"A": "長期原因", "B": "間接原因", "C": "直接原因", "D": "基本原因。"}, "answer": "C"}, {"id": 63, "question": "職業災害發生的間接原因可分為不安全環境及不安全行為，下列何者屬於不安全行為？", "options": {"A": "工作場所物料雜亂", "B": "未實施安全衛生自動檢查", "C": "於運轉中機械器具進料或取料", "D": "採光照明不良。"}, "answer": "C"}, {"id": 64, "question": "對於防止化學品之職業災害，下列何種措施應列為最優先考量？", "options": {"A": "尋求無害之替代物", "B": "作業檢點", "C": "工程改善", "D": "使用防護具。"}, "answer": "A"}, {"id": 65, "question": "職業病最根本的預防措施為下列何者？", "options": {"A": "實施定期健康檢查", "B": "實施特殊健康檢查", "C": "實施僱用前體格檢查", "D": "實施作業環境改善。"}, "answer": "D"}]}, "4": {"chapter": "第四章 職業安全衛生管理系統", "note": "", "total_questions": 47, "questions": [{"id": 1, "question": "依職業安全衛生管理辦法規定，職業安全衛生委員會應每個隔多久至少開會一次？", "answer": "D", "options": {"A": "6個月", "B": "1年", "C": "2個月", "D": "3個月"}}, {"id": 2, "question": "在職業安全衛生管理系統之項目中，下列何者係針對事故發生時，能提供作業現場人員必要的資訊，並採取急救、醫療救援、消防及疏散等措施與步驟？", "answer": "B", "options": {"A": "變更管理", "B": "緊急應變措施", "C": "調害調查與分析", "D": "稽核措施"}}, {"id": 3, "question": "下列有關職業安全衛生管理系統組織設計之敘述，何者錯誤?", "answer": "B", "options": {"A": "應建立安全衛生管理組織架構並製作組織編制體系圖表", "B": "安全衛生管理組織架構及各級管理人員之權責如有修訂、職務調整等，以書面通知當事人及所屬單位即可", "C": "安全衛生管理組織架構及各級管理人員之權責，應以書面通知勞工及各承攬商與相關人員", "D": "應設置相關組織，指派權責人員分別辦理相關工作"}}, {"id": 4, "question": "職業安全衛生管理系統稽核之目的為何?", "answer": "D", "options": {"A": "查核自動檢查工作項目", "B": "查核是否依規定實施職業災害調查", "C": "查核職業安全衛生管理計畫是否符合規定", "D": "評估系統運作之適切性"}}, {"id": 5, "question": "事業單位訂定書面的職業安全衛生政策，不須傳達給下列何者？", "answer": "A", "options": {"A": "員工家屬", "B": "承攬人", "C": "利害相關者", "D": "勞工"}}, {"id": 6, "question": "下列何者非屬「職業安全衛生管理系統」中有關承攬管理績效評估之", "answer": "A", "options": {"A": "施工進度管理", "B": "安全衛生設施之設置及維護狀況", "C": "參與安全衛生協議會議狀況及決議事項辦理情形", "D": "分項工程計畫之訂定及執行情形"}}, {"id": 7, "question": "下列有關職業安全衛生政策之敘述，何者符合職業安全衛生管理系統之規定?", "answer": "B", "options": {"A": "應由職業安全衛生業務主管研擬，經管理審查會議核定", "B": "應由事業單位最高管理階層核定", "C": "事業單位應依據職業安全衛生主管機關頒行之年度檢查目標訂定職業安全衛生政策", "D": "事業單位訂定後應提報主管機關"}}, {"id": 8, "question": "職業安全衛生管理系統中之主要項目中，首先必須要有下列何者？", "answer": "D", "options": {"A": "稽核", "B": "組織", "C": "控制", "D": "政策"}}, {"id": 9, "question": "下列何者為職業安全衛生管理系統指導綱要之訂定目的?", "answer": "D", "options": {"A": "檢查機構審查事業單位提報職業安全衛生管理計畫之依據", "B": "主管機關提升職業安全衛生管理績效之政策綱領", "C": "公共工程主辦機關推動加強公共工程安全衛生之實施依據", "D": "說明職業安全衛生系統建置需求，以為事業單位建立及推動TOSHMS 之參考"}}, {"id": 10, "question": "下列有關職業安全衛生管理績效評估之敘述，何者正確?", "answer": "A", "options": {"A": "應建立績效監督與量測程序辦理", "B": "應由法定之安全衛生人員專責獨立辦理", "C": "應由檢查機構之績效認可單位實施", "D": "應由管理代表實施"}}, {"id": 11, "question": "下列何者非建立職業安全衛生管理系統?", "answer": "D", "options": {"A": "石化工程業", "B": "使用危害性化學品達管制標準", "C": "第一類勞工人數200人或第二類勞工人數500人之事業單位", "D": "丁類危險性工作場所"}}, {"id": 12, "question": "危險性工作場所審查暨檢查辦法規定，須執行製程安全評估的危險性工作場所，包括下列何者？", "answer": "A", "options": {"A": "甲類、乙類、丙類", "B": "甲類、乙類、丁類", "C": "乙類、丙類、丁類", "D": "甲類、丙類、丁類"}}, {"id": 13, "question": "下列有關職業安全衛生管理系統之敘述，何者正確?", "answer": "B", "options": {"A": "承攬甲類危險性工作場所之工程，應實施施工安全評估後，建立職業安全衛生管理系統", "B": "職業安全衛生管理系統應包括：政策、組織設計、規劃與實施、評估改善措施", "C": "職業安全衛生管理系統應包括：規劃、實施、檢查、改正行動、審查、變更", "D": "從業人數超過100 人以上者，應建立職業安全衛生管理系統"}}, {"id": 14, "question": "下列何者為ISO45001 所定義之管理階層職責?", "answer": "D", "options": {"A": "擬定職業安全衛生管理目標", "B": "辦理員工教育訓練", "C": "執行職業安全衛生稽核", "D": "督導系統運作並提供資源"}}, {"id": 15, "question": "下列有關職業安全衛生管理系統稽核之敘述，何者錯誤?", "answer": "B", "options": {"A": "業者應訂定稽核程序，實施定期稽核，以確認安全衛生管理系統實施狀況", "B": "為確保稽核作業契合施工專業及現場實際作業狀況，應由第一線工程師專責辦理", "C": "業者應訂定稽核計畫，詳列稽核實施方式", "D": "稽核結果應呈送管理代表後，通知被稽核單位，並追蹤辦理情形"}}, {"id": 16, "question": "依職業安全衛生法施行細則所定職業安全衛生管理計畫，包括幾款安全衛生事項？", "answer": "A", "options": {"A": "16", "B": "14", "C": "12", "D": "10"}}, {"id": 17, "question": "下列何者非屬企業推動職業安全衛生管理系統之風險管理之目的？", "answer": "B", "options": {"A": "辨識工作場所潛在之危害並予以消彌惑有效控制", "B": "需應法規要求及勞動檢查", "C": "持續改善安全衛生達到零災害", "D": "提升安全衛生自主管理能力"}}, {"id": 18, "question": "依職業安全衛生管理辦法規定，職業安全衛生委員會之委員中由工會推派或勞工推選之代表應佔委員人數之多少以上？", "answer": "B", "options": {"A": "二分之一", "B": "三分之一", "C": "四分之一", "D": "五分之一"}}, {"id": 19, "question": "依職業安全衛生管理辦法規定，第一類事業單位勞工人數在多少人以上者，應參照中央主管機關所定之職業安全衛生管理系統指引，建立適合該事業單位之職業安全衛生管理系統？", "answer": "B", "options": {"A": "100", "B": "200", "C": "300", "D": "500(第二類)"}}, {"id": 20, "question": "依臺灣職業安全衛生管理系統指引所定預防與控制措施，其排列第一優先的預防及控制措施為下列何者？", "answer": "D", "options": {"A": "設置護欄及護蓋", "B": "提供個人防護具", "C": "實施教育訓練", "D": "源頭消除危害及風險"}}, {"id": 21, "question": "職業安全衛生管理系統所強調的P-D-C-A管理循環，係指哪些管理功能？", "answer": "A", "options": {"A": "規劃－實施－檢查－改進", "B": "程序－執行－改進－考核", "C": "規劃－發展－確認－改進", "D": "計畫－檢討－執行－回饋"}}, {"id": 22, "question": "依職業安全衛生管理辦法規定，雇主應依其事業單位之規模及下列何者，以訂定職業安全衛生管理計畫？", "answer": "D", "options": {"A": "產品", "B": "範圍", "C": "行業", "D": "性質"}}, {"id": 23, "question": "依職業安全衛生管理辦法規定，勞工人數在多少人以下之事業單位，得以安全衛生管理執行紀錄或文件代替職業安全衛生管理計畫？", "answer": "A", "options": {"A": "30", "B": "50", "C": "100", "D": "300"}}, {"id": 24, "question": "下列何者為事業單位內審議、協調及建議職業安全衛生有關業務之組織？", "answer": "D", "options": {"A": "職業安全衛生管理單位", "B": "職業安全衛生協議組織", "C": "風險管理部門", "D": "職業安全衛生委員會"}}, {"id": 25, "question": "代表雇主從事管理、指揮或監督勞工從事工作之人員，於職業安全衛生法規中系指何人？", "answer": "C", "options": {"A": "實際經營負責人", "B": "各級業務主管", "C": "工作場所負責人", "D": "安全衛生業務主管"}}, {"id": 26, "question": "下列何者非台灣職業安全衛生管理系統指引所強調之主要項目？", "answer": "C", "options": {"A": "員工參與", "B": "採購管理", "C": "環境影響評估", "D": "承攬管理"}}, {"id": 27, "question": "依職業安全衛生管理辦法規定，下列何者非屬承攬管理計畫相關執行紀錄應登載之內容?", "answer": "B", "options": {"A": "危險作業管制", "B": "承攬商人員之薪水幅度表", "C": "緊急應變及安全衛生績效評估", "D": "職業災害通報"}}, {"id": 28, "question": "事業單位建置職業安全衛生管理系統之流程中，下列何者非系統架構建置期的工作？", "answer": "A", "options": {"A": "緊急應變演練", "B": "風險評估", "C": "先期審查", "D": "目標與方案"}}, {"id": 29, "question": "有關事業單位推動職業安全衛生管理系統可能直接帶來的好處，下列何者有誤？", "answer": "C", "options": {"A": "降低工作場所意外事故", "B": "達成永續經營目標", "C": "減少產品品質的不良率", "D": "減少不必要之災害善後支出"}}, {"id": 30, "question": "針對職業安全衛生管理系統稽核所發現不符合事項，應採取何種措施？", "answer": "D", "options": {"A": "鑑別措施", "B": "控制措施", "C": "防護措施", "D": "矯正措施"}}, {"id": 31, "question": "下列何者為台灣職業安全衛生管理系統之簡稱？", "answer": "D", "options": {"A": "OHSAS18001", "B": "VPP", "C": "TS", "D": "CNS 45001"}}, {"id": 32, "question": "職業安全衛生管理系統中之「預防與控制措施」項目中，下列何者為第一優先採行的措施？", "answer": "D", "options": {"A": "提供適當個人防護具", "B": "設置安衛組織人員", "C": "實施教育訓練", "D": "消除危害及風險"}}, {"id": 33, "question": "職業安全衛生管理系統之主要架構運作，職業安全衛生活動的最高指導原則為下列何者？", "answer": "C", "options": {"A": "職業安全衛生方案", "B": "職業安全衛生計畫", "C": "職業安全衛生政策", "D": "職業安全衛生指針"}}, {"id": 34, "question": "雇主應依組織的規模及性質，並諮詢員工及其代表意見，訂定書面的職業安全衛生政策，並應傳達給？", "answer": "D", "options": {"A": "員工", "B": "承攬商", "C": "利害相關者", "D": "以上皆是"}}, {"id": 35, "question": "下列有關職業安全衛生管理績效評估之敘述，何者正確", "answer": "A", "options": {"A": "應建立績效監督與量測程序辦理？", "B": "應由法定之安全衛生人員專責獨立辦理", "C": "應由檢查機構之績效認可單位實施", "D": "應由管理代表實施"}}, {"id": 36, "question": "組織所建立的職業安全衛生管理系統，主要要素包括", "answer": "D", "options": {"A": "政策、組織設計", "B": "規劃與實施", "C": "評估和改善措施", "D": "以上皆是"}}, {"id": 37, "question": "下列何者為作為說明管理系統各主要要素及彼此間的關聯，並應依其需求制定、管理和維持紀錄？", "answer": "A", "options": {"A": "系統文件化", "B": "管理階級審查", "C": "溝通", "D": "先期審查"}}, {"id": 38, "question": "依中央主管機關所訂之臺灣職業安全衛生管理系統指引，下列何者不包含於其他主要安全衛生項目中？", "answer": "A", "options": {"A": "產能目標", "B": "規劃與實施", "C": "政策", "D": "評估"}}, {"id": 39, "question": "第三類事業單位多少人以上應建置職業安全衛生管理系統？", "answer": "D", "options": {"A": "200人以上", "B": "300人以上", "C": "500人以上", "D": "無規定"}}, {"id": 40, "question": "依職業安全衛生管理辦法規定，下列何者不屬第三類事業（低度風30險者）？", "answer": "D", "options": {"A": "新聞業", "B": "金融及保險業", "C": "殯葬業", "D": "製造業 "}}, {"id": 41, "question": "有關職業安全衛生管理系統的績效與量測，下列何者非屬主動式指標？", "answer": "C", "options": {"A": "作業環境監測數據", "B": "教育訓練人數", "C": "職業傷病統計資料", "D": "機械設備自動檢查次數"}}, {"id": 42, "question": "達成失能傷害平均在0.13以下，是職業安全衛生管理計畫中哪一項？", "answer": "C", "options": {"A": "基本方針", "B": "實施細目", "C": "計畫目標", "D": "預定進度"}}, {"id": 43, "question": "依職業安全衛生管理系統指引規定，應如何實施職業安全衛生管理績效監督？", "answer": "D", "options": {"A": "於職業安全衛生管理組織及人員之職掌中明訂權責實施", "B": "由安全衛生人員提報管理審查", "C": "由作業主管實施以確保作業安全", "D": "依據公司性質及組織規模，設定主動式監督與被動式監督方式"}}, {"id": 44, "question": "依職業安全衛生管理辦法，事業單位職業安全衛生管理係由何者依職權指揮、監督所屬人員執行？", "answer": "B", "options": {"A": "品管人員", "B": "各級主管", "C": "職業安全衛生人員", "D": "職業安全衛生管理系統稽核人員"}}, {"id": 45, "question": "有關職業安全衛生管理規章之敘述，下列何者有誤？", "answer": "D", "options": {"A": "屬事業單位內部管理程序等文件", "B": "目的在要求執行職業安全衛生有關事項", "C": "用以要求各級主管及管理、指揮、監督等有關人員", "D": "對員工不具有強制的規範"}}, {"id": 46, "question": "有關事業單位推動職業安全衛生管理系統可能直接帶來的好處，下列何者有誤？", "answer": "D", "options": {"A": "達成永續經營目標", "B": "降低工作場所意外事故", "C": "減少不必要之災害善後支出", "D": "減少產品品質的不良率"}}, {"id": 47, "question": "有關職業安全衛生管理規章之敘述，下列何者正確？", "answer": "B", "options": {"A": "直接套用他廠規章，以方便管理", "B": "規章之結構應含制定目的、適用範圍結構", "C": "屬公司內部規則，無須頒布", "D": "一般組織管理經驗或文獻資料屬研究範圍不可作為依據"}}]}, "5": {"chapter": "第五章 風險評估", "note": "", "total_questions": 34, "questions": [{"id": 1, "question": "工作安全分析應注意事項，不包括下列何者?", "answer": "A", "options": {"A": "圍籬綠化程度", "B": "人及方法方面", "C": "材料及環境方面", "D": "機械方面"}}, {"id": 2, "question": "下列有關風險管理之敘述，何者錯誤?", "answer": "B", "options": {"A": "主辦機關辦理工程採購應合理設定工程功能需求及工期", "B": "機具設備設計製造以產能為導向，操作安全應由使用者依各自之工作內容進行風險評估，與製造者無關", "C": "施工規劃階段應實施風險評估", "D": "辦理工程設計採購，應要求設計階段實施風險評估"}}, {"id": 3, "question": "下列有關風險評估成果追蹤管制措施之敘述，何者錯誤?", "answer": "C", "options": {"A": "列入工地協議組織會議中列管追蹤", "B": "公司管理審查會議檢討實施成效", "C": "列入自主檢查缺失統計", "D": "應由相關部門主管追蹤對策處置人員辦理情形"}}, {"id": 4, "question": "下列何者不是執行風險評估的時機？", "answer": "D", "options": {"A": "作業方法變更時", "B": "使用新化學物質時", "C": "建立職業安全衛生管理系統時", "D": "因應驗證機構稽核時"}}, {"id": 5, "question": "工作場所風險安全評估的第一步驟", "answer": "D", "options": {"A": "決定控制方法", "B": "採取控制措施", "C": "計算風險等級", "D": "危害辨識"}}, {"id": 6, "question": "風險評估方法以簡單的公式描述為下列何者？", "answer": "C", "options": {"A": "風險x 暴露=危害", "B": "風險x 危害=評估", "C": "危害x 暴露=風險", "D": "危害x 風險=暴露"}}, {"id": 7, "question": "實施工作場所風險評估之方法，通常使用的方法不包括下列何者？", "answer": "B", "options": {"A": "腦力激盪", "B": "甘特圖", "C": "故障樹分析", "D": "初步危害分析"}}, {"id": 8, "question": "將災害發生要素有系統地以一定之順序、型態分析各要素間之關係的方法，為下列何者？", "answer": "B", "options": {"A": "檢核表", "B": "故障樹分析法", "C": "危害評估分析法", "D": "初步危害分析法"}}, {"id": 9, "question": "下列有關風險判定基準之敘述，何者錯誤？", "answer": "D", "options": {"A": "應依可用資源等因素，調整不可接受風險判定基準值", "B": "應訂定不可接受風險之判定基準", "C": "功能在作為優先決定風險控制措施之依據", "D": "不可接受風險之判定基準，應維持固定不變"}}, {"id": 10, "question": "下列有關風險評估結果之敘述，何者正確？", "answer": "A", "options": {"A": "新的安全衛生知識、技術產生時，即需檢討修正原有的風險評估結果", "B": "其結果已經過參與者充分討論，不得任意變更", "C": "功安全衛生法規修正與危害辨識有關，但與風險評估結果無關", "D": "風險評估結果涉及控制措施的採行，為持續通過驗證，非經驗證機構同意，不得變更之"}}, {"id": 11, "question": "下列有關危害辨識之敘述何者正確？", "answer": "D", "options": {"A": "無須參考作業環境監測之結果", "B": "應指定勞工單獨限時完成", "C": "以往事故已經發生過者無須再辨識", "D": "事業單位應依職業安全衛生法規要求，選擇適合方法執行危害辨識"}}, {"id": 12, "question": "危害辨識係指下列何者？", "answer": "A", "options": {"A": "辨識工作場所的潛在危害", "B": "考量危害後果的嚴重度與發生的可能性", "C": "評估其風險等級", "D": "採取降低風險的控制設施"}}, {"id": 13, "question": "事業單位要降低因機械、設備和物料等引起的安全衛生危害及風險，下列何者為最佳的控制時機？", "answer": "A", "options": {"A": "採購時", "B": "使用時", "C": "維修時", "D": "發生事故後"}}, {"id": 14, "question": "作業環境監測屬下列何者？", "answer": "B", "options": {"A": "危害認知", "B": "危害評估", "C": "危害控制", "D": "環境管理"}}, {"id": 15, "question": "主管人員藉觀察屬下工作步驟，分析作業實況，以發掘作業場所潛在的危險及可能的危害，經協商、討論、修正而建立安全的工作方法，稱為下列何者？", "answer": "D", "options": {"A": "安全作業標準", "B": "安全觀察", "C": "風險管理", "D": "工作安全分析"}}, {"id": 16, "question": "經由工作安全分析，建立正確工作程序，以消除工作時的不安全行為，設備與環境，確保工作安全的標準，稱為下列何者？", "answer": "A", "options": {"A": "安全作業標準", "B": "安全觀察", "C": "風險管理", "D": "工作安全分析"}}, {"id": 17, "question": "在降低風險的控制措施中，緊急應變屬下列何者？", "answer": "C", "options": {"A": "工程控制措施", "B": "消除", "C": "管理控制措施", "D": "取代"}}, {"id": 18, "question": "考量降低風險之控制措施時，下列順序何者正確？《A.工程控制B.管理控制C.消除D.取代》", "answer": "C", "options": {"A": "DCBA", "B": "ABCD", "C": "CDAB", "D": "ACDB"}}, {"id": 19, "question": "在降低風險控制措施中，以低電壓電氣設備取代高電壓電器設備，屬於下列何者？", "answer": "D", "options": {"A": "管理控制措施", "B": "工程控制措施", "C": "消除", "D": "取代"}}, {"id": 20, "question": "風險等級之分析方法不包刮下列何者？", "answer": "A", "options": {"A": "定時分析", "B": "定性分析", "C": "半定量分析", "D": "定量分析"}}, {"id": 21, "question": "輪班作業係針對下列何種暴露要件進行控制？", "answer": "A", "options": {"A": "接受者", "B": "輸送途徑", "C": "監督者", "D": "汙染源"}}, {"id": 22, "question": "下列有關風險管理之敘述，何者錯誤？", "answer": "B", "options": {"A": "主辦機關辦理工程採購應合理設定工程功能需求及工期機具設備", "B": "設置設計製造以產能為導向，操作安全應由使用者依個自己工作內容，進行風險評估與製造者無關", "C": "施工規劃階段應實施風險評估", "D": "辦理工程設計採購應要求設計階段實施風險評估"}}, {"id": 23, "question": "下列何者非屬雇主於製程安全評估應依操作特性建立之製程安全資訊？", "answer": "A", "options": {"A": "操作人員家庭財務及產險資訊", "B": "製程技術資訊", "C": "製程化學資訊", "D": "製程設備資訊"}}, {"id": 24, "question": "為下列何種評估方法？", "answer": "C", "options": {"A": "危害及可操作性分析", "B": "失誤模式與影響分析", "C": "初步危害分析", "D": "失誤樹分析"}}, {"id": 25, "question": "為下列何種評估法之縮寫？", "answer": "B", "options": {"A": "初步危害分析", "B": "失誤模式與影響分析", "C": "故障樹分析", "D": "危害及可操作性分析"}}, {"id": 26, "question": "為下列何種評估方法之縮寫？", "answer": "D", "options": {"A": "危害及可操作性分析", "B": "失誤 模式與影響分析", "C": "初步危害分析", "D": "故障樹分析"}}, {"id": 27, "question": "下列何者為「化學品分類及標示全球調和制度」之簡稱？", "answer": "A", "options": {"A": "GHS", "B": "PPE", "C": "GPS", "D": "SDS"}}, {"id": 28, "question": "風險評估下列何者錯誤？", "answer": "A", "options": {"A": "無需考量周遭居民", "B": "需考量風險控制的績效", "C": "需考量危害後果的嚴重度", "D": "需考量現有法規和相關指引"}}, {"id": 29, "question": "在降低風險的控制措施中，不使用危害物質，屬於下列何者？", "answer": "C", "options": {"A": "管理控制措施", "B": "工程控制措施", "C": "消除", "D": "取代"}}, {"id": 30, "question": "危害辨識及風險評估結果應予記錄存檔，其紀錄可不顯示下列何者？", "answer": "A", "options": {"A": "主管機關名稱", "B": "危害類型、危害原因及後果", "C": "風險程度或等級", "D": "既有控制措施"}}, {"id": 31, "question": "事業單位製程危害控制措施，依製程安全評估定期實施辦法規定不包括下列何者？", "answer": "C", "options": {"A": "變更管理", "B": "承攬管理", "C": "領導", "D": "機械完整性"}}, {"id": 32, "question": "下列操作方法之變更屬於變更管理的範圍？", "answer": "A", "options": {"A": "改變標準作業程序中的操作步驟", "B": "增加製程設備", "C": "修改消防系統", "D": "改變原物料種類"}}, {"id": 33, "question": "有關風險評估之作業流程，下列何者正確？ A. 依製程、活動或服務之流程辨識出所有的作業或工程 B 確認各項作業的相關條件 C.確認現有可降低之發生可能性及後果嚴重度的防護措施 D. 辨識出各項作業可能發生的危害類型，並描述發生危害因素及導致後果的情境", "answer": "B", "options": {"A": "D CBA", "B": "A BDC", "C": "CDAB", "D": "BACD"}}, {"id": 34, "question": "有關風險之敘述，列何者有誤？", "answer": "C", "options": {"A": "事業單位可自行設計風險等級判定基準", "B": "為危害嚴重度及危害發生可能性之組合", "C": "評估時一定需依據精確數值之量化分析", "D": "須辨識潛在危害，並分別評估其風險等級"}}]}, "6": {"chapter": "第六章 承攬管理", "note": "", "total_questions": 30, "questions": [{"id": 1, "question": "事業單位招人承攬時，其承攬人就承攬部份負雇主之責任，原事業單位就職業災害補償部分之責任為何?", "answer": "A", "options": {"A": "仍應與承攬人負連帶責任", "B": "依承攬契約決定責任", "C": "依災害性質決定責任", "D": "可不負責任"}}, {"id": 2, "question": "下列有關承攬商進廠區管制之敘述，何者正確?", "answer": "A", "options": {"A": "各承攬商應事先提報預定進場人員之名單，詳列姓名、年齡、住址、電話、投保資料、教育訓練資格等，以便進場時逐一核對確", "B": "吊掛荷重在三公噸以上之起重機須進場時檢附合格證，其餘機具經外觀檢視完整者即可進場", "C": "承攬商先行提報聘僱工程師名單，經確認符合資格，該等人員進場時不須再予檢視", "D": "承攬商預先提報採用符合CNS4750 規格之施工架，材料進場時可不需再予檢"}}, {"id": 3, "question": "兩個以上之事業單位分別出資共同承攬時，防止職業災害之雇主責任應由下列何者負責？", "answer": "A", "options": {"A": "此兩個事業單位互推1人為代表人", "B": "兩個事業單位一起負責", "C": "出資較多的事業單位", "D": "勞工人數較多的事業單位"}}, {"id": 4, "question": "下列何者不是職業安全衛生法規定協議組織應協議之事項？", "answer": "C", "options": {"A": "承攬人勞工薪資", "B": "從事動火、高架、開挖、爆破、高壓電活線等危險作業之管制", "C": "員工工作進度表", "D": "電氣機具入廠管制"}}, {"id": 5, "question": "下列何者為承攬人無法改善必須退場之時機?", "answer": "C", "options": {"A": "發生虛驚事故時", "B": "安全衛生缺失計點達罰款上限額度時", "C": "承攬人履約過程出現重大瑕，法繼續履行契約時", "D": "分項工程作業計畫於危險性工作場所審查時未通過"}}, {"id": 6, "question": "小邱營造公司將維修工程交由一定好工程公司承攬時，請問小邱營造公司應於何時告知一定好工程公司有關其事業工作環境、危害因素暨職業安全衛生法及有關安全衛生規定應採取之措施？", "answer": "A", "options": {"A": "事前告知", "B": "動工後", "C": "發生災害後", "D": "無須告知"}}, {"id": 7, "question": "下列何者為職業安全衛生法所稱之共同作業？", "answer": "A", "options": {"A": "事業單位與承攬人、在承攬人所僱用之勞工於同一時間、同一工作場所從事工作", "B": "事業單位於其工作場所內之空地，劃出一部分供承攬人使用無相關干擾", "C": "事業單位未參與施工，僅於完工後派員驗收", "D": "事業單位與承攬人各自獨自作業，相互間無危害相關連"}}, {"id": 8, "question": "下列有關進廠施工協議組織運作方式之敘述，何者正確?", "answer": "D", "options": {"A": "原事業單位得篩選參加協議組織之成員", "B": "起重吊掛作業應由原事業單位派員指揮，以統一作業方式、順序及安全防護設施，可不需納入協議組織管理", "C": "協議組織之運作由原事業單位事需要實施，無關乎工地運作", "D": "施工過程原事業單位應召集各承攬人及相關人員進行協議"}}, {"id": 9, "question": "有關危害告知，下列何者正確？", "answer": "D", "options": {"A": "可以口頭方式告知", "B": "得以承攬人承諾書替代危害告知", "C": "承攬人就其承攬之全部或一部分交付再承攬，承攬人無須告知再承攬人", "D": "需以書面召開協調會議並做成紀錄"}}, {"id": 10, "question": "依職業安全衛生法規定，事業單位以其事業之全部或一部分交付承攬時，下列何者不是應於事前告知該承攬人之事項？", "answer": "A", "options": {"A": "外勞雇用比例", "B": "危害因素", "C": "有關安全衛生規定應採取措施", "D": "事業工作環境"}}, {"id": 11, "question": "某工程由甲營造公司承建，甲營造公司再將其中之施工架組配及拆除交由乙公司施作，則甲公司就職業安全衛生法而言是何者？", "answer": "B", "options": {"A": "業主", "B": "原事業單位", "C": "承攬人", "D": "再承攬人"}}, {"id": 12, "question": "依職業安全衛生法規定，事業單位與承攬人、再承攬人分別僱用勞工共同作業時，應由何者指定工作場所負責人，擔任統一指揮及協調工作？", "answer": "C", "options": {"A": "承攬人", "B": "再承攬人", "C": "原事業單位", "D": "檢查機構"}}, {"id": 13, "question": "事業單位擬將事業一部分交付承攬，下列何者為選擇承攬人之優先考量條件？", "answer": "D", "options": {"A": "安全衛生教育訓練時數", "B": "安全衛生管理人數量", "C": "安全衛生經費比例", "D": "安全衛生績效"}}, {"id": 14, "question": "職業安全衛生法規定，事業單位以其事業交付承攬時，原事業單位仍應就下列何者與承攬人負連帶責任？", "answer": "D", "options": {"A": "刑事處分", "B": "職業災害補助", "C": "工時損失", "D": "職業災害補償"}}, {"id": 15, "question": "甲公司將其事業交由乙公司承攬，並提供移動式起重機供該乙公司使用，依職業安全衛生管理辦法規定，原則上該起重機自動檢查應由下列何者實施", "answer": "B", "options": {"A": "甲、乙公司推派代表", "B": "甲公司", "C": "委託代檢機構", "D": "乙公司"}}, {"id": 16, "question": "事業單位以其事業招人承攬時，下列何者有關承攬人之選擇及評估的敘述較為合適", "answer": "D", "options": {"A": "僅評估其對完工日期之執行力即可", "B": "考慮其施工品質即可", "C": "以承攬金額作為選擇之唯一標準", "D": "承攬人評估及選擇應包含安全衛生執行能力"}}, {"id": 17, "question": "依職業安全衛生法規定，原事業單位與承攬人分別僱用勞工共同作業時，有關工作場所負責人，應為下列何者？", "answer": "B", "options": {"A": "原事業單位之雇主", "B": "由原事業單位指定於工作場所代表雇主從事管理、指揮或監督勞工從事工作之人", "C": "共同作業工作場所之承攬工程金額最多之事業單位負責人", "D": "共同作業工作場所所有承攬人共推之安全衛生負責人"}}, {"id": 18, "question": "事業單位與承攬人、再承攬人分別僱用勞工共同作業時，為了防止何種目的，原事業單位應採取之必要措施？", "answer": "C", "options": {"A": "利潤", "B": "商業機密", "C": "職業災害", "D": "工程進度"}}, {"id": 19, "question": "事業單位分別交付二個人以上承攬人共同作業而未參與共同作業時，下列哪一項描述正確？", "answer": "B", "options": {"A": "由承攬人抽籤決定負原事業單位之承攬管理責任", "B": "應指定承攬人之ㄧ負原事業單位之責任", "C": "應由承攬人應互推一人為代表人負原事業單位之責任", "D": "仍應依規定負原事業單位之承攬管理責任"}}, {"id": 20, "question": "當有2個以上之事業單位分別出資並共同承攬時，應由下列何者負責防止職業災害之雇主責任？", "answer": "B", "options": {"A": "兩事業單位一起負責", "B": "互推一人為代表人", "C": "出资較多的事業單位", "D": "勞工人數較多的事業單位"}}, {"id": 21, "question": "事業單位以其事業之全部或部分交付承攬時，如該承攬人使用之機械、設備係由原事業單位提供者，該機械、設備應由何者實施自動檢查？", "answer": "C", "options": {"A": "承攬人", "B": "再承攬人", "C": "原事業單位", "D": "檢查機構"}}, {"id": 22, "question": "事業單位與承攬人、再承攬人分別僱用勞工共同作業時，為防止職業災害，原事業單位應設置下列何者單位或組織負責協調之工作？", "answer": "C", "options": {"A": "風險評估小組", "B": "醫療單位", "C": "協議組織", "D": "安全衛生委員會"}}, {"id": 23, "question": "下列何者為職業安全衛生法規定原事業單位應盡之義務？", "answer": "A", "options": {"A": "協助承攬人遵守職業安全衛生相關法令", "B": "承攬人就承攬部分負雇主責任，原事業單位不應介入承攬人之管理", "C": "接受專業承攬人之工作指示作業", "D": "掩護承攬人通過勞動檢查"}}, {"id": 24, "question": "依職業安全衛生管理辦法規定，事業單位勞工人數之計算，不包含下列哪一單位於同一期間、同一工作場所作業時之總人數之計算？", "answer": "D", "options": {"A": "原事業單位", "B": "其承攬人、再承攬人之勞工", "C": "受工作場所負責人指揮或監督從事勞動之人員", "D": "已解除承攬合約之承攬商之勞工"}}, {"id": 25, "question": "有關危害告知事項，下列何者正確？", "answer": "D", "options": {"A": "可以口頭方式告知", "B": "得以承攬人勞工之安全承諾書替代危害告知", "C": "承攬人就其承攬之全部或一部分交付再承攬時，承攬人無須告知再承攬人", "D": "得以書面或召開協"}}, {"id": 26, "question": "事業單位以其事業之全部或一部交付承攬時，依職業安全衛生法規定，應於事前告知的事項未包括下列何者？", "answer": "B", "options": {"A": "其事業工作環境", "B": "勞工的家族成員", "C": "危害因素", "D": "有關安全衛生規定應採取之措施"}}, {"id": 27, "question": "事業單位對承攬人有告知危害因素之義務，下列何種告知方式不符合此項規定？", "answer": "C", "options": {"A": "作業前已協議紀錄記載具體告知事項", "B": "就分項工程之危害及應採取措施以書面具體告知", "C": "僅於合約中載述「應依職業安全衛生法規定辦理」", "D": "合約中就作業環境危害列舉防範措施"}}, {"id": 28, "question": "事業單位以其事業之全部或一部分交付承攬時，依職業安全衛生法規定應於事前告知承攬人之事項不包括下列何者？", "answer": "A", "options": {"A": "事業經營概況", "B": "有關其事業工作環境", "C": "有關安全衛生規定應採取措施", "D": "有關其事業之危害因素"}}, {"id": 29, "question": "小秋營造公司將泥作工程交由一定好工程公司承攬時，請問小秋營造公司應於何時告知一定好工程公司有關其事業工作環境、危害因素及職業安全衛生法等，有關安全衛生規定應採取之措施？", "answer": "A", "options": {"A": "事前告知", "B": "動工後", "C": "災害發生後", "D": "無須告知"}}, {"id": 30, "question": "事業單位承攬管理之目的並未包含下列哪一項目？", "answer": "D", "options": {"A": "符合法規", "B": "善盡企業社會責任", "C": "照顧承攬商及其員工", "D": "處罰承攬商增加營收"}}]}, "7": {"chapter": "第七章 採購及變更管理", "note": "", "total_questions": 39, "questions": [{"id": 1, "question": "依職業安全衛生法規定，中央主管機關指定機械、設備或器具，其構造性、能及防護非符合安全標準者，不得產製運出廠場、輸入或供應，下列何者非指定之對象？", "answer": "A", "options": {"A": "移動式起重機", "B": "防爆電器設備", "C": "動力衝剪機械", "D": "動力堆高機"}}, {"id": 2, "question": "變更管理技術指引之要求，變更管理之作業流程中，下列何者應優先執行？", "answer": "B", "options": {"A": "成效確認", "B": "界定變更管制範圍", "C": "變更之申請", "D": "諮詢"}}, {"id": 3, "question": "下列有關工程監造單位應辦理事項之敘述，何者錯誤?", "answer": "A", "options": {"A": "於施工中、驗收或使用前，分別實施必要之查核，以確認其符合性，相關執行紀錄自查核日起保存一年", "B": "配合施工程序設定安全衛生查核點，據以執行", "C": "設置監督查核之管理組織、配置適當數量符合資格之查核人員", "D": "訂定工程監督查核計畫以於施工過程實施監督查核"}}, {"id": 4, "question": "下列有關施工機具採購之敘述，何者錯誤?", "answer": "C", "options": {"A": "採購契約中應規定供應商應提供機具組裝、測試所需之機具設備及專業人力", "B": "採購契約明訂廠商應提出機具組裝、測試之安全防護設施、應使用安全防護具等", "C": "得標廠商應自行考量機具設備送抵工地方式，採購規範中無需特別予以規定", "D": "隧道開挖機等特殊機具，應於採購規範中訂明應辦理試運轉及必要之功能驗證測試，以為驗收之依據"}}, {"id": 5, "question": "下列有關營造廠商辦理施工安全設施採購之敘述，何者錯誤?", "answer": "A", "options": {"A": "應由各分項工程承攬商採購設置以明全責", "B": "配合施工進度需要，分批採購符合法規規格之設施", "C": "事先估算所需各類設施數量，依規定開具詳細規格，訂定開口契約，配合工程進度進場安裝", "D": "依據施工方法、程序，選用安全設施之類型、數量，分批採購"}}, {"id": 6, "question": "下列有關施工機具採購之敘述，何者錯誤?", "answer": "C", "options": {"A": "隧道開挖機等特殊機具，應於採購規範中訂明應辦理試運轉及必要之功能驗證測試，以為驗收之依據", "B": "採購契約應自行考量機具組裝、測試之安全防護設施、應使用安全防護具等", "C": "得標廠商應自行考量機具設備送抵工地之方式，採購規範中無需特別予以規定", "D": "採購契約中應規定供應商提供機具組裝、測試所需之機具設備及專業人力"}}, {"id": 7, "question": "下列何者較不常是修繕管理之危害因素？", "answer": "C", "options": {"A": "對工作場所之熟悉度", "B": "多屬承攬性作業", "C": "對修繕技術之熟悉度", "D": "作業期間短暫"}}, {"id": 8, "question": "下列有關營造廠商辦理施工安全設施採購之敘述，何者錯誤?", "answer": "D", "options": {"A": "依據施工法、程序，選用安全設施之類型、數量，分批採購", "B": "配合施工進度需要，分批採購符合法規規格之設施", "C": "事先估算所需各類設施數量，依規定開具詳細規格，訂定開口契約，配合工程進度進場安裝", "D": "應由各分項工程承攬商採購設置以明權責"}}, {"id": 9, "question": "下列有關工程採購管理實施範圍之敘述，何者錯誤?", "answer": "D", "options": {"A": "工程採購實施前，應確實審核該標案之各項圖說、標單等招標文件是否詳實", "B": "編列採購預算應確實將各工作項目之作業內容、方法、數量等核算明確，編列合理費用", "C": "因應工程需要得定投標廠商資格要件，將廠商之相關工程經歷、履約紀錄等納入規定", "D": "工程採購管理應自招標受理廠商投標文件之審核開始"}}, {"id": 10, "question": "下列何者非訂定變更管理之主要考量項目？", "answer": "A", "options": {"A": "事業單位形象", "B": "本身實際需求", "C": "職業安全衛生管理系統相關規範", "D": "最新安全衛生法規"}}, {"id": 11, "question": "上包商參與工程競技標時，為壓低標價或便宜行事，往往將安全衛生經費的編列計算方式列計算方式?", "answer": "B", "options": {"A": "轉嫁下包商分攤", "B": "量化計量計價", "C": "一式計價", "D": "自行吸收"}}, {"id": 12, "question": "機關於工程規劃、設計時，應要求規劃、設計單位將安全衛生經費明細表等作為招標文件，納入契約執行，下列何者不包括在內?", "answer": "D", "options": {"A": "規劃安全衛生注意事項、圖說", "B": "施工安全衛生規範", "C": "職業安全衛生法規", "D": "逾期罰款"}}, {"id": 13, "question": "下列有關變更管理實施方式之敘述，何者錯誤？", "answer": "D", "options": {"A": "變更內容應通知施工人員並經啟用前檢查確認機具設備、設施等均已更設完成，方得施工", "B": "擬訂變更計劃後應實施風險評估", "C": "應評估變更後可出現之風險，擬訂適當對策", "D": "應將變更後之施工圖、施工計劃等文件發給施工團隊簽收後立即施工"}}, {"id": 14, "question": "依危險性工作場所審查及檢查辦法規定，事業單位對於經檢查機構審查合格之丁類工作場所，於施工過程有下列何種情況時，應重新評估後報經檢查機構審查？", "answer": "D", "options": {"A": "變更承攬人", "B": "變更主要分項工程施工方法", "C": "改變施工機具", "D": "變更施工人員"}}, {"id": 15, "question": "下列有關職業安全衛生變更管理之敘述，何者正確？", "answer": "A", "options": {"A": "在修改或引進新作業方法、材料、程序或設備之前，應進行工作場所危害鑑別和風險評估", "B": "管理部門應即時掌握勞動檢查機構人員異動狀況，及時因應不同人員檢查重點", "C": "實施吊掛作業時，承攬商租用機具額定吊重大於計畫所列者，無須風險鑑別和評估", "D": "作業內容變更時，應即時通知承攬商採用自行評估決定採用適當之工法及程序"}}, {"id": 16, "question": "辦理採購安全管理之稽核，通常為下列何者之權責？", "answer": "A", "options": {"A": "安全衛生部門", "B": "人事部門", "C": "環保部門", "D": "品管部門"}}, {"id": 17, "question": "一般而言，變更管理計畫通常不包括下列何種變更？", "answer": "A", "options": {"A": "組職架構", "B": "原物料", "C": "作業方法", "D": "作業條件"}}, {"id": 18, "question": "為落實採購管理，下列何者非財物採購可要求之安全衛生規格？", "answer": "A", "options": {"A": "回饋措施", "B": "保固及售後服務", "C": "機械設備零件材質之安全", "D": "運輸、裝卸及搬運之安全"}}, {"id": 19, "question": "為實施採購管理，事業單位辦理工程採購時，該工程經費中之何項費用應占有一定的比例？", "answer": "C", "options": {"A": "睦鄰支出", "B": "耗材", "C": "安全衛生項目", "D": "出工數"}}, {"id": 20, "question": "請問下列有關採購作業之敘述，何者符合正確的安全管理？", "answer": "C", "options": {"A": "請購過程係屬需求單位與採購部門之業務，成本越低最重要", "B": "供應商勞工到場交貨時，因非屬本廠員工，無須要求其遵守安全衛生規定", "C": "需求單位對於採購之物品應考量其安全衛生條件，並簽會安全衛生部門提供意見", "D": "有關請購之物品及安全衛生條件，由供應商自行注意無須於請購單中規定"}}, {"id": 21, "question": "下列何者非辦理勞務採購可要求之安全衛生規格？", "answer": "A", "options": {"A": "廠商創意表現", "B": "作業人員之安全衛生資格、技術", "C": "作業現場之安全衛生監督人力", "D": "使用器材及使用方法之安全性"}}, {"id": 22, "question": "依採購管理技術指引規定之作業流程，在辦理勞務或工程請購之前應進行下列何種作業？", "answer": "C", "options": {"A": "品質稽核", "B": "環境影響評估", "C": "供應商之評核", "D": "性別影響評估"}}, {"id": 23, "question": "請購之分類下述何者為錯誤？", "answer": "D", "options": {"A": "工程採購", "B": "財務採購", "C": "勞務採購", "D": "承租國有林地"}}, {"id": 24, "question": "有關採購之安全衛生規格擬定，下列何者有誤？", "answer": "C", "options": {"A": "安全衛生規格制定應考量法規及國家標準之要求", "B": "請購單位不清楚相關安全規範時，應主動尋求工安部門、供應商或外界專業機構之協助", "C": "安全衛生規格為本公司採購時內部規定，如法規有異動時，不需配合檢討更新", "D": "應先經由危害辨識及風險評估之結果，鑑別出關鍵性項目"}}, {"id": 25, "question": "事業單位辦理採購作業對於供應商安全衛生評核部分，下列敘述何者有誤？", "answer": "D", "options": {"A": "應考量供應商在廠 場 內卸貨及搬運等過程中之安全衛生表現", "B": "考量供應商在廠 場 內執行施工、安裝、測試及試驗等作業期間，遵守相關安全衛生管理", "C": "應考量供應商主動提供安全衛生相關資訊之狀況", "D": "屬採購業務只要考量價格問題即可，與安全衛生事務無關"}}, {"id": 26, "question": "下列何者非屬採購管理涵蓋之範圍？", "answer": "B", "options": {"A": "設備購買", "B": "社區服務", "C": "勞務採購", "D": "工程訂作"}}, {"id": 27, "question": "事業單位要降低因機械、設備和物料等引起的安全衛生危害及風險，下列何者為最佳的控制時機？", "answer": "A", "options": {"A": "採購時", "B": "使用時", "C": "維修時", "D": "發生事故後"}}, {"id": 28, "question": "依職業安全衛生管理辦法之規定，應實施採購管理的事業單位，於設備或物料完成採購驗收後，應將相關執行紀錄保存幾年？", "answer": "C", "options": {"A": "1", "B": "2", "C": "3", "D": "4 年"}}, {"id": 29, "question": "甲公司欲向外租賃堆高機時，為落實下列那項管理功能，其契約內容應參考法令訂有防止職業災害之具體規範，並於使用前確認其符合規定？", "answer": "D", "options": {"A": "施工管理", "B": "變更管理", "C": "承攬管理", "D": "採購管理"}}, {"id": 30, "question": "有關變更作業可能之後果，下列敘述何者有誤", "answer": "D", "options": {"A": "替代性方案，可能釀成重大災害事故", "B": "修改製程可能使作業條件偏離原有控制措施", "C": "變更活動可能使作業環境偏離原有安全範圍", "D": "暫時性變更可忽略應有的安全考量"}}, {"id": 31, "question": "依據台灣職業安全衛生管理系統指引規定，變更管理涵蓋內容不包括下列何者？", "answer": "A", "options": {"A": "訪客行程變更", "B": "製造緊急變更", "C": "設備永久變更", "D": "作業暫時性變更"}}, {"id": 32, "question": "依職業安全衛生管理辦法規定，變更管理應納入下列何項計畫中執行", "answer": "C", "options": {"A": "職業災害防止計畫", "B": "職業安全衛生管理規章", "C": "職業安全衛生管理計畫", "D": "風險控制計畫"}}, {"id": 33, "question": "採購契約應包括哪些文件？", "answer": "D", "options": {"A": "契約本文、附件及其變更或補充", "B": "決標文件及其變更或補充", "C": "依契約所提出之履約文件或資料", "D": "以上皆是"}}, {"id": 34, "question": "某家工廠對內部人員異動，導入新製程、新工作程序時，均會重新評估其對職業安全衛生管理產生的影響，並採取適當的預防措施，則該項管理措施稱為下列何者？", "answer": "C", "options": {"A": "自動檢查", "B": "採購管理", "C": "變更管理", "D": "承攬管理"}}, {"id": 35, "question": "就安全管理而言，下列有關請購作業之敘述何者正確？", "answer": "A", "options": {"A": "需求單位對於採購之物品考量其安全衛生條件，並簽會安全衛生部門提供意見", "B": "請購過程係屬需求單位與採購部門之業務，與安全衛生部門無關", "C": "供應商勞工到廠（場）交貨時，因非屬本廠員工，無需要求其遵守安全衛生規定", "D": "有關請購之物品其安全衛生條件由供應商自行注意，無須於請購單中規定"}}, {"id": 36, "question": "下列何者屬於製程變更管理範疇？", "answer": "A", "options": {"A": "製程技術修改", "B": "健康檢查", "C": "組織調整", "D": "薪資結構變動"}}, {"id": 37, "question": "在特殊狀況需要或實施性能之變更，並須清楚界定其變更之期間，而於期滿時就需恢復變更前之狀況，試問此情況稱做何種變更？", "answer": "D", "options": {"A": "緊急變更", "B": "同型變更", "C": "永久性變更", "D": "暫時性變更"}}, {"id": 38, "question": "下列有關施工機具採購之敘述，何者錯誤？", "answer": "C", "options": {"A": "隧道開挖機等特殊機具，應於採購規範中訂明應辦理試運轉及必要之功能驗證測試，以為驗收之依據", "B": "採購契約應自行考量機具組裝、測試之安全防護設施、應使用安全防護具等", "C": "得標廠商應自行考量機具設備送抵工地之方式，採購規範中無需特別予以規定", "D": "採購契約中應規定供應商提供機具組裝、測試所需之機具設備及專業人力"}}, {"id": 39, "question": "營造工程職業安全衛生設施之採購，應如何辦理？", "answer": "B", "options": {"A": "發包交由專業廠商安裝，無涉使用該等設施之承包商管理責任", "B": "配合工程進度與作業前設置完妥，施工過程隨時檢視維護，以維持正常功能", "C": "於分項工程採購契約中明定各分包承攬商應自行負責工作所需之安全衛生設施無需原事業單位費心管理", "D": "原事業單位購置材料交由臨時點工安裝"}}]}, "8": {"chapter": "第八章 緊急應變管理", "note": "", "total_questions": 31, "questions": [{"id": 1, "question": "護欄旁2公尺內不可以做何種行為？", "answer": "D", "options": {"A": "堆放鋼筋", "B": "使用合梯", "C": "停放貨車下貨", "D": "以上皆是"}}, {"id": 2, "question": "依勞工健康保護規則規定，勞工人數為345 人之事業單位，至少應有多少位合格之急救人員？", "answer": "C", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}}, {"id": 3, "question": "目前衛生福利部公告之CPR 口訣為何？", "answer": "D", "options": {"A": "叫ABC", "B": "叫叫ABC", "C": "叫叫ABCD", "D": "叫叫CABD"}}, {"id": 4, "question": "對於化學燒傷傷患的一般處理原則，下列何者正確？", "answer": "A", "options": {"A": "立即用大量清水沖洗", "B": "傷患必須臥下，而頭、胸部須高於身體其他部位", "C": "於燒傷處塗抹油膏、油脂或發酵粉", "D": "使用酸鹼中和"}}, {"id": 5, "question": "對於食入性中毒患者，下列何種狀況宜給予催吐？", "answer": "C", "options": {"A": "已昏迷", "B": "口腔或咽喉部有疼痛或灼熱感", "C": "誤食大量安眠藥", "D": "誤食腐蝕性物質"}}, {"id": 6, "question": "有害物進入人體最常見的器官或途徑為下列何者？", "answer": "B", "options": {"A": "口", "B": "呼吸", "C": "皮膚", "D": "眼睛"}}, {"id": 7, "question": "下列何者為緊急應變計畫可不包含之內容？", "answer": "A", "options": {"A": "各類應變器材使用手冊", "B": "應變編組", "C": "疏散時機", "D": "應變通報程序"}}, {"id": 8, "question": "在緊急應變時，事故區域之擬定，通常將指揮區設置於下列何者？", "answer": "C", "options": {"A": "暖區", "B": "熱區", "C": "冷區", "D": "禁區"}}, {"id": 9, "question": "在緊急應變時，事故區域之擬定，通常將緊戒區與緊戒走道設置於下", "answer": "B", "options": {"A": "冷區", "B": "暖區", "C": "禁區", "D": "熱區"}}, {"id": 10, "question": "急救人員每幾名勞工人數應在增加一名急救人員？", "answer": "C", "options": {"A": "9", "B": "39", "C": "50", "D": "100"}}, {"id": 11, "question": "緊急應變總指揮之工作職責為下列何者？", "answer": "D", "options": {"A": "負責現場搶救工作", "B": "負責消防水及緊急電源之正常供應", "C": "代表事業單位對外發佈和說明災變處理情形", "D": "掌握各應變編組運作，瞭解災後之發展狀況，授權及監督各組應變"}}, {"id": 12, "question": "有關緊急應變之組織架構及權責之敘述，下列何者有誤？", "answer": "D", "options": {"A": "應訂定應變組織各階層人員的職掌", "B": "應變組織各工作小組應有編組名冊", "C": "不同應變等級應有不同應變組織架構", "D": "假日及夜間均有人值班，所以不須另定假日及夜間之應變組織架構"}}, {"id": 13, "question": "下列何者不是緊急應變計畫書中，應包含之要素？", "answer": "C", "options": {"A": "明確訂定緊急狀況之處理方式，包含指揮權移轉等", "B": "明確界定應變組織各階層人員的職掌", "C": "明確規劃對外發布的媒體", "D": "明確訂定稽核及定期管理審查機制"}}, {"id": 14, "question": "下列何者不是緊急應變計畫書中，應包含之要素？", "answer": "B", "options": {"A": "明確辨識危害性物質及其存量", "B": "明確辨識可能發生危害的人員", "C": "明確規範必要的教育訓練及應變演練之執行", "D": "明確訂定緊急狀況之處理方式"}}, {"id": 15, "question": "以緊急應變計畫書包含之要素而言，下列敘述何者有誤？", "answer": "D", "options": {"A": "明確辨識危害性物質及其存量", "B": "明確界定應變組織各階層人員的職掌", "C": "訂定緊急狀況之處理方法", "D": "緊急應變計畫係備而不用，無須考慮人員之訓練"}}, {"id": 16, "question": "下列何者非化學品災後復原階段應確認之事項？", "answer": "A", "options": {"A": "迅速查出肇災人員，依規定處分", "B": "補充滅火藥劑", "C": "注意事故處理人員之後續健康狀況", "D": "檢討廣播器材之有效性"}}, {"id": 17, "question": "災後復原時還是可能發生危險，下列何者較不會發生？", "answer": "D", "options": {"A": "恢復供電時感電", "B": "設備未經安全性確認，發生二次事故", "C": "因地面積水而滑倒", "D": "慢性職業病"}}, {"id": 18, "question": "緊急應變計畫檢討修正之目的在使計畫更能符合事業單位實際狀況之需求，除定期檢討修正外，亦應考量不定期檢討修正之時機，有關修正時機之敘述，下列何者有誤", "answer": "D", "options": {"A": "設計、製程、設備、物料、作業等變更時", "B": "演練檢討結果確認必須修正時", "C": "緊急狀況發生後", "D": "人口、道路、醫院等客觀環境改變時，因與場內運作無關，無須修改計畫"}}, {"id": 19, "question": "有關緊急應變措施之作業流程及基本原則之敘述，下列何者有誤？", "answer": "B", "options": {"A": "事業單位應依危害辨識及風險控制結果，確認須採取應變措施以控制殘餘風險之緊急狀況", "B": "選擇緊急應變計畫之參與成員，以安衛管理人員為主，其他技術或生產部門人員可以不必納入", "C": "事業單位應對現有應變能力及資源進行評估", "D": "事業單位對所辨識出之緊急狀況應予以分類，並制定緊急狀況之應變指引"}}, {"id": 20, "question": "緊急應變計畫之作業流程中， 研訂緊急應變計畫 危害辨識及風險評估 應變能力及資源評估 選擇參與計畫之成員，下列何者為正確", "answer": "C", "options": {"A": "BCAD", "B": "BDCA", "C": "DBCA", "D": "BCDA"}}, {"id": 21, "question": "有關緊急應變之搶救，下列敘述何者有誤？", "answer": "D", "options": {"A": "進行搶救前應先考量自己之安全不可貿然進行", "B": "對於感電災害應先設法切斷電源再行搶救", "C": "對於局限空間災害之搶救應先做好個人防護", "D": "救人第一，搶救時應不顧一切全力搶救"}}, {"id": 22, "question": "有關緊急狀況之分級，下列敘述何者有誤？", "answer": "C", "options": {"A": "應依緊急狀況之分級，規劃後續應變處理程序與對策", "B": "應依事故之損害特性及後果嚴重度，加以分級", "C": "不論分級為何，緊急應變指揮官都是同一人", "D": "大型災害無法控制時，必需迅速聯絡外界支援"}}, {"id": 23, "question": "緊急應變中，指揮官佔有很重要的決策地位，請問下列何者為其職責？", "answer": "C", "options": {"A": "通知消防應變指揮官之工作職責", "B": "隔離關斷洩漏源", "C": "負責掌握意外災害狀況", "D": "廠外支援單位之引導"}}, {"id": 24, "question": "有關緊急應變之作業流程及聯絡體系，下列敘述何者有誤？", "answer": "C", "options": {"A": "應訂定事故通報流程及緊急連絡電話一覽表", "B": "對於已由廠內自行處理完畢之職業災害可不通報", "C": "應有假日及夜間之通報聯絡體系", "D": "對法定"}}, {"id": 25, "question": "有關緊急應變之程序，下列何者最優先執行？", "answer": "A", "options": {"A": "通報", "B": "調查災害原因", "C": "成立應變小組", "D": "CPR"}}, {"id": 26, "question": "下列何者為燒傷急救口訣？", "answer": "B", "options": {"A": "沖脫泡蓋送", "B": "叫叫壓", "C": "拉拉壓", "D": "快狠準"}}, {"id": 27, "question": "依職業安全衛生管理辦法規定，事業單位應依其潛在風險，訂定緊急狀況預防、準備及應變之計畫，並定期實施演練。其執行紀錄，應至少保存多少年？", "answer": "C", "options": {"A": "1", "B": "2", "C": "3", "D": "5"}}, {"id": 28, "question": "依衛生福利部公告的資料中，提到實施 前，應先打哪一電話號 碼進行求救？", "answer": "A", "options": {"A": "119", "B": "110", "C": "117", "D": "親人手機"}}, {"id": 29, "question": "自衛消防編組的分班，下列何者為非？", "answer": "A", "options": {"A": "指揮班", "B": "滅火班", "C": "通報班", "D": "安全防護班"}}, {"id": 30, "question": "止血帶止血常用於受傷嚴重部位，請問在完成止血帶並送醫途中， 為防止造成傷者之二次傷害，應每隔幾分鐘將止血帶鬆開一次？", "answer": "C", "options": {"A": "5分鐘", "B": "10 分鐘", "C": "15 分鐘", "D": "20 分鐘"}}, {"id": 31, "question": "執行應變能力及資源評估時，下列敘述何者有誤？", "answer": "D", "options": {"A": "應評估應變器材之種類及數量是否足夠", "B": "應評估事業單位是否有足夠的醫療救護能力", "C": "應評估是否有足夠的緊急供電系統", "D": "對於必要的搶救設備如成本太高可不必購置，災害發生時再向鄰廠借用"}}]}, "9": {"chapter": "第九章 墜落危害預防管理實務", "note": "", "total_questions": 34, "questions": [{"id": 1, "question": "有關防止墜落之扶手欄杆，下列何者有誤？", "answer": "D", "options": {"A": "為確保安全，盡量不要卸下", "B": "可暫時卸下，但作業完畢後應立刻裝回", "C": "務必堅固牢靠", "D": "可暫時卸下，記得下次作業前再裝回"}}, {"id": 2, "question": "下列何者屬於作業人員發生位能高差變化之災害?", "answer": "D", "options": {"A": "倒塌", "B": "物體飛落", "C": "感電", "D": "墜落"}}, {"id": 3, "question": "依職業安全衛生設施規則規定，在石綿板、鐵皮板、塑膠等材料構築之屋頂從事作業時，為防止勞工踏穿墜落，應於屋架上設置適當強度，且寬度在多少公分以上之踏板？", "answer": "C", "options": {"A": "10", "B": "20", "C": "30", "D": "40"}}, {"id": 4, "question": "下列何者非屬墜落災害防止設施?", "answer": "C", "options": {"A": "開口邊緣設置護欄", "B": "開口邊緣張掛安全網", "C": "派戴安全帽", "D": "設置上下安全設施"}}, {"id": 5, "question": "雇主得使下列何種工作者其從事高架作業?", "answer": "C", "options": {"A": "酒醉或有酒醉之虞者", "B": "身體虛弱，經醫師診斷認為身體狀況不良者", "C": "情緒穩定且無安全顧慮者", "D": "勞工自覺不適從事工作者"}}, {"id": 6, "question": "依職業安全衛生設施規則規定，於以石綿板、鐵皮板、塑膠等材料構築之屋頂或於以礦纖板、石膏板等材料之夾層天花板從事作業時，為防止勞工踏穿墜落之設施，下列敘述何者為非?", "answer": "A", "options": {"A": "應使勞工戴安全帽", "B": "應指定專人指揮監督作業", "C": "應設安全網", "D": "應裝設堅固格柵"}}, {"id": 7, "question": "缺氧作業有因缺氧而發生墜落時，應使用那些工具？", "answer": "D", "options": {"A": "梯子", "B": "安全帶", "C": "救生索", "D": "以上皆是"}}, {"id": 8, "question": "墜落防止方法？", "answer": "D", "options": {"A": "開口設置護欄", "B": "開口掛安全網", "C": "使用安全母索及安全帶", "D": "以上皆是"}}, {"id": 9, "question": "有墜落危險多少公尺以上高處作業應確實使用背負式安全帶？", "answer": "B", "options": {"A": "1.5公尺", "B": "2 公尺", "C": "2.5 公尺", "D": "3 公尺"}}, {"id": 10, "question": "下列何者非屬墜落災害防止之設施?", "answer": "D", "options": {"A": "設置護欄、護蓋", "B": "張掛安全網", "C": "使勞工佩掛安全帶", "D": "使勞工穿反光背心"}}, {"id": 11, "question": "斜屋頂作業敘述何者正確?", "answer": "D", "options": {"A": "要鋪設安全通道", "B": "開口要設護欄", "C": "要有主管監視作業", "D": "以上皆是"}}, {"id": 12, "question": "爬護籠梯敘述何者有誤？", "answer": "B", "options": {"A": "檢查固定", "B": "雙手拿工具", "C": "使用捲揚式防墜器", "D": "要全神貫注"}}, {"id": 13, "question": "施作樓梯護欄前要注意？", "answer": "B", "options": {"A": "先拆臨時護欄", "B": "先做防墜設施", "C": "先量尺寸", "D": "先拆安全網"}}, {"id": 14, "question": "依職業安全衛生設施規則規定，雇主架設之通道，在有墜落之虞之場所，應置備高度多少公分以上之堅固扶手？", "answer": "A", "options": {"A": "75", "B": "80", "C": "85", "D": "90"}}, {"id": 15, "question": "高處作業安全帶要扣在何處？", "answer": "C", "options": {"A": "合梯", "B": "移動梯", "C": "安全母索", "D": "身上"}}, {"id": 16, "question": "在樓地板上看到預留開口要如何處理?", "answer": "B", "options": {"A": "蓋保麗龍", "B": "報告主管", "C": "不管它", "D": "跳過去"}}, {"id": 17, "question": "依職業安全衛生設施規則規定，為防止墜落災害，有關固定梯子應注", "answer": "B", "options": {"A": "踏條與牆壁間之淨距不得超過15公分", "B": "梯子之頂端應突出板面60公分以上", "C": "梯長連續超過6公尺時，應每隔12公尺以下設一平台", "D": "未設護籠或其他保護裝置，應每隔9公尺以下設一平台"}}, {"id": 18, "question": "一般女兒牆的高度應在多少公分以上？", "answer": "A", "options": {"A": "90", "B": "60", "C": "70", "D": "105"}}, {"id": 19, "question": "背負式安全帶應符合CNS編號多少號？", "answer": "C", "options": {"A": "4750", "B": "45001", "C": "14253-1", "D": "15030"}}, {"id": 20, "question": "有關使用合梯作業下列何者為非？", "answer": "C", "options": {"A": "合梯需有堅固之構造", "B": "合梯材質不可有顯著損傷", "C": "梯腳與地面應在80度以內且兩腳間有繫材扣牢", "D": "有安全梯面"}}, {"id": 21, "question": "有關使用合梯作業，下列敘述何者錯誤？", "answer": "B", "options": {"A": "有安全防滑梯面", "B": "梯腳與地面夾角任何角度皆可，且兩梯腳間無需繫材扣牢", "C": "合梯材質不可有顯著損傷", "D": "合梯須有堅固之構造"}}, {"id": 22, "question": "何種作業較少發生人體墜落災害？", "answer": "D", "options": {"A": "利用高架作業", "B": "作業時配戴安全帶", "C": "利用合梯作業", "D": "地面作業"}}, {"id": 23, "question": "依起重升降機具安全規則規定，對於吊籠之使用，下列何者有誤？", "answer": "B", "options": {"A": "不得超過積載荷重", "B": "放置腳墊供勞工使用", "C": "運轉中禁止操作人員擅離操作位置", "D": "在強風、大雨等惡劣氣候有發生危險之虞，應禁止工作"}}, {"id": 24, "question": "依職業安全衛生設施規則規定，為防止勞工有自粉碎機及混合機之開口部分墜落之虞，雇主應有覆蓋、護圍、高度至少在幾公分以上 之圍柵等必要設備？", "answer": "D", "options": {"A": "55", "B": "75", "C": "90", "D": "110"}}, {"id": 25, "question": "雇主對於高度在二公尺以上之工作場所邊緣及開口部分，勞工有遭受墜落危險之虞者，依職業安全衛生設施規則規定下列何者並非雇主應採取之防護措施？", "answer": "C", "options": {"A": "適當強度之護欄", "B": "握把", "C": "設置適當標示", "D": "覆蓋"}}, {"id": 26, "question": "為降低高架作業人員發生墜落之機率，下列何者有誤？", "answer": "C", "options": {"A": "護欄前方公尺內嚴禁堆放物料、設備", "B": "護欄應具有抵抗於上欄杆之任何一點，於任何方向加以75公斤之荷重，無顯著變形之強度", "C": "護欄如以鋼管構成者，得不使用中欄杆", "D": "於護欄附近堆積物料時，應將護欄適度加高"}}, {"id": 27, "question": "依法令規定，裝卸貨物高差在多少公尺以上之作業場所，應設置能使勞工安全上下之設備？", "answer": "B", "options": {"A": "1", "B": "1.5", "C": "2", "D": "3"}}, {"id": 28, "question": "依職業安全衛生設施規則規定，雇主對於在高度至少幾公尺以上之高處作業，勞工有墜落之虞者，應使勞工確實使用安全帶、安全帽 及其他必要之防護具？", "answer": "C", "options": {"A": "1", "B": "1.5", "C": "2", "D": "3"}}, {"id": 29, "question": "護欄前方幾公尺內之樓板地板，嚴禁堆放任何物料、設備？", "answer": "C", "options": {"A": "1", "B": "1.5", "C": "2", "D": "3"}}, {"id": 30, "question": "護欄前方 公尺內之樓板及地板作業，何者為非？", "answer": "C", "options": {"A": "不得堆放任何 物料、設備", "B": "不得使用梯子、合梯、踏凳作業及停放車輛機械供勞 工使用", "C": "可堆放物料設備、梯、凳及車輛機械", "D": "將護欄設置高度超過堆放之物料、設備、梯、凳及車輛機械之最高部分達90公分以上"}}, {"id": 31, "question": "依職業安全衛生設施規則規定，雇主對於使用移動梯之寬度應符合之規定中，應在多少公分以上？", "answer": "D", "options": {"A": "15 公分以上", "B": "20 公分以上", "C": "25公分以上", "D": "30 公分以上"}}, {"id": 32, "question": "使用移動梯，應符合下列規定", "answer": "C", "options": {"A": "移動梯踏面小於3公分", "B": "任何材料與結構皆可，不須考慮其堅固性", "C": "採取防止滑溜或轉動之必要措施", "D": "梯面寬度大小無礙"}}, {"id": 33, "question": "雇主對於使用之移動梯，應符合那些規定", "answer": "D", "options": {"A": "具有堅固之構造", "B": "其材質 不得有顯著之損傷、腐蝕等現象", "C": "寬度應在30公分以上且應採取防止滑溜或其他防止轉動之必要措施", "D": "以上皆是"}}, {"id": 34, "question": "當有員工採用移動梯施工架進行高處作業時，下列敘述何者錯誤？", "answer": "B", "options": {"A": "移動式施工架移動時，應要求作業人員離開施工架", "B": "作業人員上下應使用合梯", "C": "頂層需設置護欄", "D": "施工架上有人員施工時，應固定腳輪避免滑動"}}]}, "10": {"chapter": "第十章 機械安全管理實務", "note": "", "total_questions": 35, "questions": [{"id": 1, "question": "依職業安全衛生法規定，雇主設置下列何種機械應符合中央主管機關所定防護標準？", "answer": "A", "options": {"A": "動力衝剪機械", "B": "起重機", "C": "升降機", "D": "吊籠"}}, {"id": 2, "question": "使用手持砂輪機敘述何者正確？", "answer": "B", "options": {"A": "拆除護罩", "B": "先試運轉", "C": "敲擊", "D": "單手握"}}, {"id": 3, "question": "依起重升降機具安全規則規定，對於吊籠之使用，下列何者有誤？", "answer": "B", "options": {"A": "不得超過積載荷重", "B": "放置腳墊供勞工使用", "C": "運轉中禁止操作人員擅離操作位置", "D": "在強風、大雨等惡劣氣候有發生危險之虞，應禁止工作"}}, {"id": 4, "question": "依機械設備器具安全資訊申報登錄辦法規定，申報者認其構造、性能及防護符合中央主管機關所定安全標準者，應於何處登錄該產品之安全資訊，完成自我宣告？", "answer": "A", "options": {"A": "中央主管機關指定之資訊申報網站", "B": "地方主管機關指定之資訊申報網站", "C": "目的事業主管機關指定之資訊申報網站", "D": "公益法人指定之資訊申報網站"}}, {"id": 5, "question": "下列何種裝置可以預防木材加工用圓盤鋸鋸切木條時反撥？", "answer": "A", "options": {"A": "撐縫片", "B": "自動護罩", "C": "手工具送料", "D": "光電監視"}}, {"id": 6, "question": "以下所列舉之機械，何者未有型式檢定制度？", "answer": "B", "options": {"A": "動力衝剪機械", "B": "電鋸", "C": "動力堆高機", "D": "研磨機"}}, {"id": 7, "question": "有關堆高機搬運作業，下列何者為非？", "answer": "A", "options": {"A": "載物行駛中可搭乘人員", "B": "作業前應實施檢點", "C": "作業完畢人員離開座位時，應關閉動力並拉上手煞車", "D": "載貨荷重不得超過該機械所能承受最大荷重"}}, {"id": 8, "question": "械安全防護中，下列何種安全裝置具有發生異常時，可迅即停止其動作並維持安全之功能？", "answer": "B", "options": {"A": "一行程一停止裝置", "B": "緊急停止裝置", "C": "自動吹洩安全裝置", "D": "自動電擊防止裝置"}}, {"id": 9, "question": "為防止脫水機中物料從缸口飛出傷人，下列敘述何者正確？", "answer": "C", "options": {"A": "有爬升作用，必須將蓋子打開", "B": "有下降作用，必須將蓋子打開", "C": "有爬升作用，必須將蓋子關閉", "D": "有下降作用，必須將蓋子關閉"}}, {"id": 10, "question": "有關工作場所作業安全，下列敘述何者有誤？", "answer": "C", "options": {"A": "毒性及腐蝕性物質應存放在安全處所", "B": "有害揮發性物質應隨時加蓋", "C": "機械運轉中從事上油作業", "D": "佩戴適合之防護具"}}, {"id": 11, "question": "機械防護之安全管理的最基本原理，為下列何者？", "answer": "B", "options": {"A": "截果斷因", "B": "源頭管理", "C": "品質管理", "D": "管末管理"}}, {"id": 12, "question": "下列何者非屬防止搬運事故之一般原則？", "answer": "D", "options": {"A": "以機械代替人力", "B": "以機動車輛搬運", "C": "採取適當之搬運方法", "D": "儘量增加搬運距離"}}, {"id": 13, "question": "往復機件與固定物之間，會造成何種危險？", "answer": "D", "options": {"A": "捲入", "B": "跌倒", "C": "反彈", "D": "擠夾"}}, {"id": 14, "question": "研磨機之研磨輪破裂損害屬何種類型災害？", "answer": "D", "options": {"A": "物體破裂", "B": "被撞", "C": "與有害物接觸", "D": "物體飛落"}}, {"id": 15, "question": "捲揚裝置於開始使用、拆卸、捲揚、改裝或修理時，應實施下列何種", "answer": "C", "options": {"A": "型式檢查", "B": "竣工檢查", "C": "重點檢查", "D": "熔接檢查"}}, {"id": 16, "question": "衝剪機械之滑塊在動作中，遇身體之一部接近危險界限時，能使滑塊等停止動作者，為下列何種型式之安全裝置？", "answer": "B", "options": {"A": "防護式", "B": "感應式", "C": "拉開式", "D": "雙手操作式"}}, {"id": 17, "question": "具有外伸撐座之移動式起重機，其外伸撐座應如何使用?", "answer": "C", "options": {"A": "依起重大小外伸", "B": "依現場空間大小外伸", "C": "伸至最大極限位置", "D": "視伸臂長度決定外伸"}}, {"id": 18, "question": "依起重升降機具安全規則規定，未具伸臂之固定式起重機或未具吊桿之人字臂起重桿，自吊升荷重扣除吊鉤、抓斗等吊具重量所得之荷重，稱為下列何者？", "answer": "A", "options": {"A": "額定荷重", "B": "安全荷重", "C": "積載荷重", "D": "容許荷重"}}, {"id": 19, "question": "下列何者不為危險性機械？", "answer": "D", "options": {"A": "3公噸以上固定式起重機", "B": "營建用提升機", "C": "營建用升降機", "D": "堆高機"}}, {"id": 20, "question": "依危險性機械及設備安全檢查規則規定，雇主於固定式起重機經設置完成時，應向勞動檢查機構申請下列何種檢查？", "answer": "A", "options": {"A": "竣工檢查", "B": "使用檢查", "C": "定期檢查", "D": "重新檢查"}}, {"id": 21, "question": "依職業安全衛生設施規則規定，高壓氣體容器，搬運時之注意事項下列何者為非？", "answer": "A", "options": {"A": "溫度保持攝氏50度以下", "B": "儘量使用專用手推車", "C": "避免與其他氣體混載", "D": "應有警戒標誌"}}, {"id": 22, "question": "依職業安全衛生設施規則規定，多少公斤以上物品以機動車輛或其他", "answer": "C", "options": {"A": "200", "B": "400", "C": "500", "D": "300"}}, {"id": 23, "question": "以鑽床進行金屬加工作業時，下列何者屬不安全行為？", "answer": "A", "options": {"A": "帶棉紗手套", "B": "原有保護罩被拆", "C": "固定夾 不靈", "D": "穿著具袖扣之工作服"}}, {"id": 24, "question": "依職業安全衛生設施規則規定，雇主對於離心機械，應設置「使覆蓋未完全關閉時無法啟動」之下列何種安全裝置？", "answer": "A", "options": {"A": "連鎖裝置", "B": "緊急停止裝置", "C": "滑塊裝置", "D": "漏電斷路器"}}, {"id": 25, "question": "輸送帶容易發生被捲事故，下列何種不是常見的安全防護裝置？", "answer": "D", "options": {"A": "緊急停止開關", "B": "頭尾輪護罩", "C": "啟動前置警報裝置", "D": "變速裝置"}}, {"id": 26, "question": "造紙廠於滾筒進行接紙作業時，較易發生下列何種危害？", "answer": "D", "options": {"A": "被切", "B": "墜落", "C": "感電", "D": "被夾、被捲"}}, {"id": 27, "question": "在特定場所使用動力將貨物吊升，並作水平搬運為目的之機械裝置，依起重升降機具安全規則規定，稱為下列何者？", "answer": "D", "options": {"A": "高空工作車", "B": "堆高機", "C": "吊籠", "D": "固定式起重機"}}, {"id": 28, "question": "依職業安全衛生管理辦法規定下列何者非屬自動檢查之內容？", "answer": "C", "options": {"A": "機械之定期檢查", "B": "機械、設備之重點檢查", "C": "勞工健康檢查", "D": "機械、設備作業檢點"}}, {"id": 29, "question": "機械防護之安全管理的最基本原理，為下列何者？", "answer": "B", "options": {"A": "截果斷因", "B": "源頭管理", "C": "品質管理", "D": "管末管理"}}, {"id": 30, "question": "在沖床作業時，以手工具代替人手伸進危險區送取料件，這種安全作", "answer": "A", "options": {"A": "遠離危險", "B": "危險預警", "C": "安全確認", "D": "消除危險"}}, {"id": 31, "question": "緊急制動裝置在發生緊急狀況時，是個很有效防止災害發生之裝置，請問一般設置於何處", "answer": "A", "options": {"A": "操作勞工隨時可及之位置", "B": "任何地 方", "C": "機器之啟動開關處", "D": "總電源處"}}, {"id": 32, "question": "機械設備安全防護之主要（首要）目的為何？", "answer": "A", "options": {"A": "避免機械動力與人體接觸所造成之傷害", "B": "避免機械損壞", "C": "易於維護保養", "D": "預防操作者生病"}}, {"id": 33, "question": "應優先確認下列何者才能使用防塵眼鏡？", "answer": "A", "options": {"A": "鏡片是否裂傷破損", "B": "遮光度是否適當", "C": "可否防止氣體侵入", "D": "可否遮斷熱輻射"}}, {"id": 34, "question": "雇主不得以下列任何一種情況之吊鏈作為起重升降機具之吊掛用具？", "answer": "D", "options": {"A": "延伸長度超過3%以上者", "B": "斷面直徑減少5%以上者", "C": "斷面直徑減少7%以上者", "D": "延伸長度超過7%以上者"}}, {"id": 35, "question": "雇主不得以下列任何一種情況之吊掛之鋼索作為起重升降機具之吊掛用具？", "answer": "D", "options": {"A": "鋼索一撚間有5%以上素線截斷者", "B": "直徑減少達公稱直徑5%以上者", "C": "鋼鋼索一撚間有7%以上素線截斷者", "D": "直徑減少達公稱直徑10%以上者"}}]}, "11": {"chapter": "第十一章 火災爆炸危害預防管理實務", "total_questions": 35, "questions": [{"id": "001", "question": "以氧氣乙炔切割型鋼時，連接切割器之橡皮管竄出火苗，應優先採行 措施為何?", "options": {"A": "關閉氧氣乙炔鋼瓶", "B": "儘速離開", "C": "使用滅火器滅火", "D": "取水 滅火"}, "answer": "A"}, {"id": "002", "question": "下列何者非屬易發生火災之作業?", "options": {"A": "化學作業", "B": "電銲作業", "C": "施工架組 配作業", "D": "油漆作業"}, "answer": "C"}, {"id": "003", "question": "隧道內有下列何種狀況時，使用之馬達用電設備、照明燈等應有防爆 性能?", "options": {"A": "崩塌", "B": "可燃性氣體", "C": "落磐", "D": "湧水現象"}, "answer": "B"}, {"id": "004", "question": "雇主金屬之熔接、熔斷或加熱等作業所需使用可燃性氣體及氧氣之容 器，下列敘述何者錯誤?", "options": {"A": "容器不得設置於通風或換氣不充分之場所", "B": "容器應橫放，便於地面滾動", "C": "容器使用時，應留置專用板手於容器 閥柄上", "D": "保持容器之溫度於攝氏40 度以下"}, "answer": "B"}, {"id": "005", "question": "雇主對於從事灌注、卸收或儲藏危險物於槽車等作業，下列敘述何者 錯誤?", "options": {"A": "使用槽車從事灌注作業前，槽車之引擎不用熄火", "B": "作業結束 後，確認不致因引擎啟動而發生危害後，始得發動", "C": "使用槽車從事灌 注作業前，應設置適當之輪檔", "D": "使用軟管從事可燃性氣體之灌注時， 應事先確定軟管結合部分已確實連接牢固"}, "answer": "A"}, {"id": "006", "question": "下列何者非屬可燃性氣體?", "options": {"A": "氫", "B": "乙炔", "C": "乙醚", "D": "丙烷"}, "answer": "C"}, {"id": "007", "question": "油類發生火災不可如何處理？", "options": {"A": "用水澆滅", "B": "用砂撲滅", "C": "用滅火器噴射", "D": "以上皆非"}, "answer": "A"}, {"id": "008", "question": "由木材、紙張、煤炭、橡膠及垃圾等一般可燃性固體物質所引起之火 災係屬下列何類?", "options": {"A": "丁類火災", "B": "乙類火災", "C": "甲類火災", "D": "丙類火災"}, "answer": "C"}, {"id": "009", "question": "油漆桶發生火災，不宜使用下列何種滅火劑？", "options": {"A": "水", "B": "乾粉", "C": "二氧化碳", "D": "泡沫"}, "answer": "A"}, {"id": "010", "question": "當電線溫度太高可能發生？", "options": {"A": "斷電", "B": "火災", "C": : "爆炸性物質", "B": "著火性物質", "C": "氧 化性物質", "D": "易燃液體"}, "answer": "C"}, {"id": "026", "question": "使易燃液體之蒸汽、可燃性氣體著火所需最低能量，係指下列何", "options": {"A": "著火點", "B": "閃火點", "C": "最小著火能", "D": "引火點"}, "answer": "C"}, {"id": "027", "question": "一般物質在沒有外部火花或火焰的條件下，能自動引燃和繼續燃燒的 最低溫度", "options": {"A": "引火點", "B": "熔點", "C": "閃火點", "D": "自燃點"}, "answer": "D"}, {"id": "028", "question": "液態迅速轉變為蒸氣，造成爆炸現象，屬於下列何者", "options": {"A": "氣相爆炸", "B": "分解爆炸", "C": "物理性爆炸", "D": "化學性爆炸"}, "answer": "C"}, {"id": "029", "question": "下列何種氣體可能引起分解爆炸", "options": {"A": "甲烷", "B": "氮", "C": "氧", "D": "氯"}, "answer": "A"}, {"id": "030", "question": "金屬鋰、金屬鈉與金屬鉀等物質之保存方式，下列何者最佳？", "options": {"A": "儲存 於石油醚中", "B": "放置於空氣中", "C": "放置於水中", "D": "儲存於含水酒精中"}, "answer": "A"}, {"id": "031", "question": "可燃性氣體及氧氣鋼瓶，依職業安全衛生設施規則規定，應如何儲  存？", "options": {"A": "分開儲存", "B": "得混合儲存", "C": "未有規定", "D": "空鋼瓶可混合儲存"}, "answer": "A"}, {"id": "032", "question": "供危險物品倉庫使用之建築物高度，依職業安全衛生設施規則規  定，在幾公尺以上應設避雷針？", "options": {"A": "1.5", "B": "3", "C": "5", "D": "7"}, "answer": "B"}, {"id": "033", "question": "可燃性氣體中，下列何種比空氣重？", "options": {"A": "氫氣", "B": "甲烷", "C": "乙炔", "D": "丙  烷"}, "answer": "D"}, {"id": "034", "question": "依職業安全衛生設施規則規定，對於從事熔接、熔斷、金屬之加熱及 其他使用明火之作業或有發生火花之虞之作業時，不得以下列何種氣 體作為通風換氣之用？", "options": {"A": "氮氣", "B": "氧氣", "C": "一氧化碳", "D": "二氧化碳"}, "answer": "B"}, {"id": "035", "question": "液化石油氣容器，其溫度保持最高不得超過攝氏幾度？", "options": {"A": "20", "B": "30", "C": "40", "D": "50"}, "answer": "D"}]}, "12": {"chapter": "第十二章 感電危害預防管理實務", "note": "", "total_questions": 45, "questions": [{"id": 1, "question": "近接架空電線作業，以下何者為不當行為?", "options": {"A": "於電路四周裝置絕緣防護或安全", "B": "無絕緣被覆之架空電路下進行吊掛作業", "C": "作業機械、車輛或勞工與帶電體保持", "D": "設置護圍、警戒隔離、監視人員"}, "answer": "B"}, {"id": 2, "question": "某建築工程於地面層設置多組配電箱，供各分包商使用，下列敘述何者錯誤?", "options": {"A": "配電箱設於室內乾燥場所，可不須設置接地線", "B": "配電箱應有標示，限制非相關人員進入使用的規定", "C": "配電箱應由專業技術人員管理，並上鎖管制", "D": "配電箱內所有開關，均應有漏電斷路器裝置"}, "answer": "A"}, {"id": 3, "question": "電銲作業使用之焊接柄應注意防止感電之安全事項，下列敘述何者正確?", "options":  "C"}, {"id": 45, "question": "防止靜電危害之對策，何者為非?", "options": {"A": "接地", "B": "乾燥", "C": "游離化", "D": "使用導電性材料"}, "answer": "B"}]}, "13": {"chapter": "第十三章 倒塌崩塌危害預防管理實務", "note": "", "total_questions": 23, "questions": [{"id": 1, "question": "「物體倒榻」，是屬於下列何者?", "options": {"A": "特有災害", "B": "交通事故", "C": "一般災害", "D": "自然災害"}, "answer": "A"}, {"id": 2, "question": "對施工架、施工構台及模板支撐應實施檢查，下列何者為非?", "options": {"A": "3 級以上地震襲擊後", "B": "每次停工之復工前", "C": "強風大雨惡劣氣候襲擊後", "D": "每週一次"}, "answer": "A"}, {"id": 3, "question": "因施工架或建築物等之崩塌、倒塌而碰撞人體之情況，屬下列何種災害類型?", "options": {"A": "被撞", "B": "物體倒塌、崩塌", "C": "物體飛落", "D": "墜落"}, "answer": "B"}, {"id": 4, "question": "雇主對於工作場所暴露之鋼筋、鋼材、鐵件、鋁件及其他材料等易生職業災害者，應採取何措施?", "options": {"A": "彎曲尖端", "B": "加蓋", "C": "加裝護套", "D": "以上皆是"}, "answer": "D"}, {"id": 5, "question": "工作場所有物體飛落之虞時，應有防止飛落作為，以下何者為非?", "options": {"A": "安全移除可能飛落物體", "B": "供給勞工安全帽，並確實戴用", "C": "穿著背負式安全帶", "D": "設置防止物體飛落設備"}, "answer": "C"}, {"id": 6, "question": "下列那種設備措施，無法防止物體飛落災害發生?", "options": {"A": "作業人員佩戴使用安全帶", "B": "起重設備安全檢查", "C": "吊具安全檢查", "D": "開口設置攔物用防護網"}, "answer": "A"}, {"id": 7, "question": "設置適當滑槽供高處投下物體，屬防止何種危害之設施?", "options": {"A": "物體倒塌", "B": "物體飛落", "C": "墜落", "D": "人員被撞"}, "answer": "B"}, {"id": 8, "question": "以移動式起重機吊運鋼筋作業，若鋼索斷裂，可能發生何種危害?", "options": {"A": "物體飛落", "B": "被撞", "C": "倒塌", "D": "墜落"}, "answer": "A"}, {"id": 9, "question": "吊掛長條形吊物時要如何處理?", "options": {"A": "手扶吊物", "B": "拉牽引繩", "C": "在吊物下方", "D": "在吊物上"}, "answer": "B"}, {"id": 10, "question": "開口護欄要何種設施防止人員將物品踢落，防止物體飛落砸到人?", "options": {"A": "腳趾板", "B": "天花板", "C": "扶手", "D": "樓梯"}, "answer": "A"}, {"id": 11, "question": "為防止吊籠與上方物體接觸，造成鋼索斷裂應裝設何設施?", "options": {"A": "過負荷預防裝置", "B": "過捲揚預防裝置", "C": "防傾裝置", "D": "以上皆是"}, "answer": "D"}, {"id": 12, "question": "堆高機行駛在速度上?", "options": {"A": "減速慢行", "B": "沒有規定", "C": "隨自己的感覺", "D": "無人看到時就快，有人就慢"}, "answer": "A"}, {"id": 13, "question": "如何防止人員被撞的危害?", "options": {"A": "人車分道", "B": "加保意外險理賠金額", "C": "發放防撞衣", "D": "狂按喇叭"}, "answer": "A"}, {"id": 14, "question": "為防止堆置物料倒塌、崩塌或掉落，下列防護措施何者有誤?", "options": {"A": "限制物料堆置高度", "B": "禁止人員進入該場所", "C": "採用繩索綑綁", "D": "採用護網、擋樁等防護措施"}, "answer": "B"}, {"id": 15, "question": "依職業安全衛生設施規則規定，雇主對物料堆放應符合之規定中，下列敘述何者錯誤?", "options": {"A": "不得妨礙機械設備之操作", "B": "不得影響照明", "C": "不得超過堆放地最大安全負荷", "D": "為便於作業的堆置於開口邊緣"}, "answer": "D"}, {"id": 16, "question": "下列何者較非有效防止堆置物料倒塌、崩塌或掉落之方法?", "options": {"A": "設置擋樁", "B": "配戴安全帽", "C": "採用繩索綑綁", "D": "實施環境巡查"}, "answer": "B"}, {"id": 17, "question": "下列何者非為有效防止石材板倒塌之方法?", "options": {"A": "實施環境巡查", "B": "以繩索綑綁", "C": "佩戴安全帽", "D": "設置擋樁"}, "answer": "C"}, {"id": 18, "question": "施工架之斜籬及防護網，主要用於預防下列何種災害?", "options": {"A": "物體飛落", "B": "捲夾", "C": "墜落", "D": "倒崩塌"}, "answer": "A"}, {"id": 19, "question": "為確保鋼管儲存時之安全性，下列何者有誤?", "options": {"A": "應盡可能堆高以節省空間", "B": "因使用纜索等加以適當捆紮", "C": "應遠離電源", "D": "可加裝護套"}, "answer": "A"}, {"id": 20, "question": "研磨機之研磨輪破裂損害屬何種類型災害?", "options": {"A": "物體破裂", "B": "被撞", "C": "與有害物接觸", "D": "物體飛落"}, "answer": "D"}, {"id": 21, "question": "以飛來物、落下物等為主體碰撞人體之情況而言，屬下列何者災害類型?", "options": {"A": "跌倒", "B": "墬落", "C": "物體飛落", "D": "衝撞"}, "answer": "C"}, {"id": 22, "question": "為預防施工架倒塌，維持其穩定，對於施工架下列何者不正確?", "options": {"A": "應有荷重限制", "B": "應設置繫牆桿、壁連座", "C": "設置斜撐材", "D": "連接混凝土模板支撐"}, "answer": "D"}, {"id": 23, "question": "下列有關施工架之壁連座的設置敘述，下列何者不正確", "options": {"A": "應有足夠強度", "B": "考量工作效率，可同時拆除", "C": "需與建築物緊密固定", "D": "應儘量於靠近衡架處設置"}, "answer": "D"}]}, "14": {"chapter": "第十四章 化學性危害預防管理實務", "note": "", "total_questions": 70, "questions": [{"id": 1, "question": "依職業安全衛生設施規則規定，勞工在坑內、儲槽、隧道等自然換氣不充分之場所工作，不得使用下列何種機械，以避免排出廢氣危害勞工？", "options": {"A": "電氣機械", "B": "人力機械", "C": "具有內燃機之機械", "D": "手提電動機械"}, "answer": "C"}, {"id": 2, "question": "油漆作業潛在危害為何？", "options": {"A": "有機溶劑中毒", "B": "火災", "C": "墜落", "D": "以上皆是"}, "answer": "D"}, {"id": 3, "question": "氧氣乙炔鋼瓶敘述何者有誤？", "options": {"A": "使用時固定", "B": "橫躺", "C": "不可超過攝氏40度", "D": "分開存放"}, "answer": "B"}, {"id": 4, "question": "依職業安全衛生管理辦法規定，雇主對化學設備或其附屬設備，應就規定事項多久實施定期檢查1次？", "options": {"A": "每日", "B": "每月", "C": "每年", "D": "每2年"}, "answer": "B"}, {"id": 5, "question": "依職業安全衛生管理辦法規定，局部排氣裝置應多久定期實施檢查1次？", "options": {"A": "每月", "B": "每三個月", "C": "每半年", "D": "每年"}, "answer": "D"}, {"id": 6, "question": "通風不充份之場所，使用氬、二氧化碳或氦等從事熔接作業時，應予①備妥滅火器②適當換氣③指派人員監視作業④以上皆是，以保持作業場所空氣中氧氣含量在百分之十八以上。", "options": {"A": "備妥滅火器", "B": "適當換氣", "C": "指派人員監視作業", "D": "以上皆是"}, "answer": "B"}, {"id": 7, "question": "依缺氧症預防規則之規定，雇主使勞工從事缺氧危險作業時，應指派幾人以上監視人員，隨時監視作業狀況？", "options": {"A": "不需派員", "B": "1人", "C": "2人", "D": "無規定"}, "answer": "B"}, {"id": 8, "question": "從事缺氧危險作業時，應予？", "options": {"A": "適當換氣，以保持該作業場所空氣含氧量百分之十八以上", "B": "可不必通風換氣，打開人孔蓋，自然通風即可", "C": "只要測定空氣含氧量18％以上即可，不必通風換氣", "D": "為防止爆炸、氧化或作業上有顯著因難，可不必實施換氣，戴防毒面具即可"}, "answer": "A"}, {"id": 9, "question": "依危害性化學品標示及通識規則規定，危害圖示為「骷顱頭」有可能為下列何種危害性化學品？", "options": {"A": "致癌物質", "B": "生殖毒性物質", "C": "呼吸道過敏物質", "D": "急毒性物質"}, "answer": "D"}, {"id": 10, "question": "依危害性化學品標示及通識規則規定，致癌物質之危害圖式，為下列何者？", "options": {"A": "驚歎號", "B": "骷顱頭", "C": "癌細胞", "D": "人頭及胸腔"}, "answer": "D"}, {"id": 11, "question": "依危害性化學品標示及通識規則規定，裝有危害物質之容器在多少毫升(mL)以下者，得僅標示名稱、危害圖示及警示語？", "options": {"A": "50", "B": "100", "C": "200", "D": "500"}, "answer": "B"}, {"id": 12, "question": "依危害性化學品標示及通識規則規定，液化氣體標示之危害圖式，其符號應使用下列何種顏色？", "options": {"A": "黃色", "B": "綠色", "C": "黑色", "D": "藍色"}, "answer": "C"}, {"id": 13, "question": "依危害性化學品標示及通識規則規定，安全資料表應具有幾項內容？", "options": {"A": "6", "B": "8", "C": "12", "D": "16"}, "answer": "D"}, {"id": 14, "question": "依危害性化學品標示及通識規則規定，安全資料表應適時更新，並至少應每幾年檢討1次？", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C"}, {"id": 15, "question": "依缺氧症預防規則規定，下列敘述何者有誤？", "options": {"A": "氧氣濃度高於18%為缺氧作業場所", "B": "儲存穀物之倉庫內部，屬缺氧危險場所", "C": "實施換氣時不得使用純氧", "D": "雇主使勞工從事缺氧危險作業時，應定期或每次作業開始前確認呼吸防護具之數量及效能，認有異常時，應立即採取必要之措施"}, "answer": "A"}, {"id": 16, "question": "依缺氧症預防規則規定，下列敘述何者有誤？", "options": {"A": "雇主使勞工從事缺氧危險作業，如受鄰接作業場所之影響致有發生缺氧危險之虞時，應與各該作業場所密切保持聯繫", "B": "作業場所入口應公告監視人員姓名", "C": "密閉相當期間之船艙內部，若內壁實施防銹措施，則
