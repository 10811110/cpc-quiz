合計以幾年為限?", "options": {"A": "5", "B": "3", "C": "7", "D": "2"}, "answer": "D"}, {"id": 5, "question": "依勞工健康保護規則之規定，下列何者不是特別危害健康之作業?", "options": {"A": "粉塵作業", "B": "高溫作業", "C": "噪音作業", "D": "高架作業"}, "answer": "D"}, {"id": 6, "question": "我國目前職業病必須由專家判定，下列何者非屬判定條件?", "options": {"A": "曾經在有害因子的環境下工作", "B": "發病必須在接觸有害因子之後", "C": "工作場所中有害因子確實存在", "D": "起因與非職業原因有關"}, "answer": "D"}, {"id": 7, "question": "使勞工於夏季期間從事戶外作業，為防範高氣溫環境引起之熱疾病，應採取下列危害預防措施何者為非?", "options": {"A": "提供陰涼休息場所", "B": "提供適當之飲料及食鹽水", "C": "增加作業場所巡視頻率", "D": "工具箱會議宣導即可"}, "answer": "D"}, {"id": 8, "question": "依勞工健康保護規則規定，雇主對特定化學作業勞工特殊健康檢查及管理，下列敘述何者錯誤？", "options": {"A": "第二級管理者應提供個人健康指導", "B": "第三級管理者應進一步請職業醫學科專科醫師評估", "C": "第四級管理者應予退休", "D": "每年應定期實施健康檢查"}, "answer": "C"}, {"id": 9, "question": "對在職勞工應施行健康檢查種類？", "options": {"A": "一般健康檢查", "B": "從事特別危害健康作業者之特殊健康檢查", "C": "經中央主管機關指定為特定對象及特定項目之健康檢查", "D": "以上皆是"}, "answer": "D"}, {"id": 10, "question": "對檢查結果異常之勞工，經醫師健康評估結果，不能適應原有工作者，應參採醫師之建議？", "options": {"A": "變更其作業場所", "B": "更換工作或", "C": "縮短工作時間", "D": "以上皆是，並採取健康管理措施"}, "answer": "D"}, {"id": 11, "question": "依照勞工健康保護規則規規定，一般作業勞工未滿40歲者，多久進行一次健康檢查？", "options": {"A": "1年", "B": "3年", "C": "5年", "D": "7年"}, "answer": "C"}, {"id": 12, "question": "依照勞工健康保護規則規規定，一般作業勞工40歲以上未滿65歲者，多久進行一次健康檢查？", "options": {"A": "1年", "B": "3年", "C": "5年", "D": "8年"}, "answer": "B"}, {"id": 13, "question": "依照勞工健康保護規則規規定，一般作業勞工65歲以上者，多久進行一次健康檢查？", "options": {"A": "1年", "B": "3年", "C": "5年", "D": "7年"}, "answer": "A"}, {"id": 14, "question": "事業單位勞工人數在多少以上者，應僱用或特約醫護人員，辦理健康管理、職業病預防及健康促進等勞工健康保護事項？", "options": {"A": "30", "B": "50", "C": "100", "D": "200"}, "answer": "B"}, {"id": 15, "question": "特別危害健康作業，需至少每幾年檢查一次在職勞工特別危害健康檢查？", "options": {"A": "3年", "B": "2年", "C": "1年", "D": "半年"}, "answer": "C"}, {"id": 16, "question": "新人體格檢查費用未協調應由誰付？", "options": {"A": "雇主", "B": "主管機關", "C": "勞工", "D": "勞保局"}, "answer": "C"}, {"id": 17, "question": "一般健康檢查記錄應保存幾年以上？", "options": {"A": "5年", "B": "6年", "C": "7年", "D": "員工留存"}, "answer": "A"}, {"id": 18, "question": "在職勞工健康檢查費用應由誰支付？", "options": {"A": "雇主", "B": "勞雇協調", "C": "勞工本人", "D": "勞保局"}, "answer": "A"}, {"id": 19, "question": "從事有害溶劑作業，實施特殊體格檢查之主要目的為何？", "options": {"A": "識別勞工工作適性", "B": "達成勞工要求", "C": "配合主管喜好", "D": "家人要求"}, "answer": "A"}, {"id": 20, "question": "依勞工健康保護規則規定，醫護人員臨場服務應辦理之事項，不包含下列何者？", "options": {"A": "健康促進之策劃與實施", "B": "健康諮詢與急救處置", "C": "協助選配勞工從適當工作", "D": "定期辦理健康檢查"}, "answer": "D"}, {"id": 21, "question": "下列何者不是勞工健康保護規則規定，雇主於僱用勞工時，應實施一般體格檢查之規定項目？", "options": {"A": "胸部Ｘ光(大片)攝影檢查", "B": "尿蛋白及尿潛血之檢查", "C": "血色素及白血球數檢查", "D": "肺功能檢查"}, "answer": "D"}, {"id": 22, "question": "為能依據勞工體能、健康狀況，適當選配勞工於適當之場所作業，雇主於僱用勞工時，應實施下列何種健康檢查？", "options": {"A": "一般健康檢查", "B": "一般體格檢查", "C": "特殊健康檢查", "D": "健康追蹤檢查"}, "answer": "B"}, {"id": 23, "question": "職業健康促進活動中，下列何者不屬推行健康生活範圍？", "options": {"A": "投資理財", "B": "營養指導", "C": "菸害防制", "D": "體重管理"}, "answer": "A"}, {"id": 24, "question": "推行職場健康促進最主要的目的為下列何者？", "options": {"A": "提升勞工健康概念", "B": "調合勞工與主管關係", "C": "提升雇主健康", "D": "使勞工身心處最佳狀態"}, "answer": "D"}, {"id": 25, "question": "下列何者非愛滋病之主要傳染途程？", "options": {"A": "血液", "B": "唾液", "C": "性行為", "D": "母子垂直感染"}, "answer": "B"}, {"id": 26, "question": "依勞工健康保護規則規定，定期健康檢查項目比一般體格檢查項目增加下列何者？", "options": {"A": "總膽固醇", "B": "低密度脂蛋白膽固醇", "C": "三酸甘油酯", "D": "高密度脂蛋白膽固醇"}, "answer": "B"}, {"id": 27, "question": "雇主於勞工經定期健康檢查後，應採取之措施，下列何者不當？", "options": {"A": "参照醫師建議，告知勞工並適當配置勞工於工作場所作業", "B": "異常結果之健康檢查手冊應公告周知", "C": "將檢查結果發給受檢勞工", "D": "將受檢勞工之健康檢查紀錄彙整成健康檢查手冊"}, "answer": "B"}, {"id": 28, "question": "特殊健康檢查，應依規定分級實施健康管理，請問健康管理分幾級？", "options": {"A": "一級", "B": "二級", "C": "三級", "D": "四級"}, "answer": "D"}, {"id": 29, "question": "特殊健康檢查或健康追蹤檢查結果，全部項目正常，或部分項目異常，而經醫師綜合判定為無異常者，請問是屬於健康管理第幾級？", "options": {"A": "一級", "B": "二級", "C": "三級", "D": "四級"}, "answer": "A"}, {"id": 30, "question": "特殊健康檢查或健康追蹤檢查結果，部分或全部項目異常，經醫師綜合判定為異常，而無法確定此異常與工作之相關性，應進一步請職業醫學科專科醫師評估者，請問是屬於健康管理第幾級？", "options": {"A": "一級", "B": "二級", "C": "三級", "D": "四級"}, "answer": "C"}, {"id": 31, "question": "特殊健康檢查或健康追蹤檢查結果，部分或全部項目異常，經醫師綜合判定為異常，且與工作有關者，請問是屬於健康管理第幾級？", "options": {"A": "一級", "B": "二級", "C": "三級", "D": "四級"}, "answer": "D"}, {"id": 32, "question": "發生白指症或白手病係導因於長期從事下列何種作業之危害？", "options": {"A": "受黴菌污染之作業", "B": "振動作業", "C": "異常氣壓作業", "D": "有機溶劑作業"}, "answer": "B"}, {"id": 33, "question": "急救人員設置，人數超過50人者，每增加50人，應再置幾人？", "options": {"A": "1人", "B": "2人", "C": "3人", "D": "5人"}, "answer": "A"}, {"id": 34, "question": "下列何者非雇主因要求醫護人員辦理之臨廠服務？", "options": {"A": "提供健康檢查資料以作為開除員工之依據", "B": "協助規劃健康促進業務", "C": "職業衛生之研究", "D": "預防注射"}, "answer": "A"}, {"id": 35, "question": "依職業安全衛生法規定，雇主執行勞工體格檢查、健康檢查，應由何醫療機構之醫師為之所指醫療機構應由中央主管機關會商下列何單位認可？", "options": {"A": "中央衛生主管機關", "B": "職業疾病鑑定委員會", "C": "勞動檢查機構", "D": "職業傷病防治中心"}, "answer": "A"}]}, "17": {"chapter": "第十七章 職業災害調查處理與統計", "note": "", "total_questions": 52, "questions": [{"id": 1, "question": "職業災害原因分析時，勞工未使用雇主提供防護歸類為何?", "options": {"A": "不安全環境", "B": "不安全狀態", "C": "不安全設施", "D": "不安全動作行為"}, "answer": "D"}, {"id": 2, "question": "下列何者非職業災害發生的間接原因?", "options": {"A": "未提供安全設備", "B": "未提供安全護具", "C": "安全衛生管理不善", "D": "未依標準作業程序操作"}, "answer": "C"}, {"id": 3, "question": "職業災害發生之原因可分為直接原因、間接原因及基本原因，下列何者係屬直接原因?", "options": {"A": "能量", "B": "不安全行為", "C": "管理缺陷", "D": "不安全狀況"}, "answer": "A"}, {"id": 4, "question": "為防止機械夾捲、切割傷害，下列何者為不安全之行為?", "options": {"A": "將長髮綁綁", "B": "穿寬鬆衣服", "C": "穿戴適當防護具", "D": "不穿戴圍巾"}, "answer": "B"}, {"id": 5, "question": "交流電焊機未設置自動電擊防止裝置，致勞工於作業時不慎碰觸感電，其災害之間接原因為何?", "options": {"A": "不安全制度", "B": "不安全動作", "C": "不安全設備", "D": "天災"}, "answer": "C"}, {"id": 6, "question": "甲公司承攬某捷運工程依規定應向勞動檢查機構報備職業災害統計資料之頻率為何?", "options": {"A": "每月", "B": "每年", "C": "每三個月", "D": "每2個月"}, "answer": "A"}, {"id": 7, "question": "下列何者非職業災害發生的間接原因?", "options": {"A": "未依標準作業程序操作", "B": "安全衛生管理不善", "C": "未提供安全設備", "D": "未提供安全護具"}, "answer": "B"}, {"id": 8, "question": "勞工不遵守安全衛生工作手則規定，屬於下列何者?", "options": {"A": "不安全環境", "B": "公害", "C": "不安全行為", "D": "不安全設備"}, "answer": "C"}, {"id": 9, "question": "發生職業災害時，除必要之急救、搶救外，雇主非經哪個單位許可，不得移動或破壞現場?", "options": {"A": "工程監造單位", "B": "勞動部", "C": "司法機關或勞動檢查機構工程主辦機關", "D": "縣市政府"}, "answer": "C"}, {"id": 10, "question": "職業災害原因分析時，將管理不良歸屬下列何者?", "options": {"A": "直接原因", "B": "基本原因", "C": "不安全狀況", "D": "間接原因"}, "answer": "B"}, {"id": 11, "question": "下職業災害造成事業單位之損失，可分為直接損失及間接損失，下列何者屬間接損失?", "options": {"A": "罹災勞工之醫療費用", "B": "罹災勞工之法定補償費用", "C": "罹災勞工之工資損失", "D": "造成事業單位形象受損"}, "answer": "D"}, {"id": 12, "question": "發生職業災害大都是由於?", "options": {"A": "天意", "B": "人為", "C": "別人", "D": "陷阱"}, "answer": "B"}, {"id": 13, "question": "依職業安全衛生法規定，事業單位工作場所如發生職業災害，雇主應即採取何種必要之措施並實施調查、分析及作成紀錄?", "options": {"A": "停工", "B": "急救搶救", "C": "向法院自首", "D": "報告檢查機構"}, "answer": "B"}, {"id": 14, "question": "勞工因遭遇職業災害，在醫療中不能工作時，雇主對其工資補償補償方式為何?", "options": {"A": "按其原領工資數額打對折作為補償", "B": "按其原領工資數額作為補償", "C": "雇主已補償其必需之醫療費用，所以就不用補償工資", "D": "補償1/3工資"}, "answer": "B"}, {"id": 15, "question": "下列發生何種職業災害，依法應予通報?", "options": {"A": "死亡災害", "B": "災害之罹災人數在3人以上", "C": "災害之罹災人數在1人以上且需住院治療", "D": "以上均需通報"}, "answer": "D"}, {"id": 16, "question": "發生死亡職災雇主應多久內報告勞動檢查機構?", "options": {"A": "8小時內", "B": "12小時內", "C": "24小時內", "D": "30小時內"}, "answer": "A"}, {"id": 17, "question": "事業單位勞動場所如發生死亡職業災害，雇主應於8小時內報告哪一單位?", "options": {"A": "勞動部", "B": "勞動檢查機構", "C": "警察局", "D": "地檢署"}, "answer": "B"}, {"id": 18, "question": "職業災害的定義，指因下列何種場所之建築物、機械等或作業活動及其他職業上原因引起之工作者疾病、傷害、失能或死亡。", "options": {"A": "公共場所", "B": "工作場所", "C": "勞動場所", "D": "作業場所"}, "answer": "C"}, {"id": 19, "question": "事業單位於下列何種場所發生職業災害，雇主應立即採取必要之急救、搶救等措施，並會同勞工代表實施調查、分析及作成記錄?", "options": {"A": "勞動場所", "B": "就業場所", "C": "勞動場所", "D": "作業場所"}, "answer": "C"}, {"id": 20, "question": "八小時通報的時機為何?", "options": {"A": "勞工受傷時", "B": "到達醫院診療時", "C": "收到住院通知時", "D": "家屬得知時"}, "answer": "C"}, {"id": 21, "question": "中央主管機關指定之事業，雇主應按月填填寫職業災害統計，報請檢查機構備查?", "options": {"A": "5日", "B": "10日", "C": "15日", "D": "20日"}, "answer": "B"}, {"id": 22, "question": "依照職業安全衛生法規定，勞工執行職務發現有立即發生危險之虞時，得在不危及其它工作者安全情形下，自行停止作業及退避至安全場所，並向何人報告?", "options": {"A": "檢查員", "B": "同事", "C": "醫護人員", "D": "直屬主管"}, "answer": "D"}, {"id": 23, "question": "下列何者非安全作業標準修訂的時機?", "options": {"A": "事故發生時", "B": "製程改變時", "C": "違反安全作業標準規定時", "D": "風險評估有不可忍受風險時"}, "answer": "C"}, {"id": 24, "question": "依職業安全衛生法規定，下列何種情形得處3年以下有期徒刑?", "options": {"A": "雇主僱用勞工時未施行體格檢查", "B": "鍋爐使用超過規定期間，未經再檢查合格而繼續使用致發生勞工死亡之職業災害", "C": "未設置安全衛生組織或管理人員", "D": "未對勞工施以從事工作所必要之安全衛生教育訓練"}, "answer": "B"}, {"id": 25, "question": "一件不希望發生的事故，雖然沒有造成損失，但顯示其潛在可能造成傷害或損失的事故，稱之為下列何者?", "options": {"A": "輕微事故", "B": "急救事故", "C": "虛驚事故", "D": "失能事故"}, "answer": "C"}, {"id": 26, "question": "下列何者不屬於職業安全衛生法所稱之職業災害?", "options": {"A": "勞工於噴漆時有機溶劑中毒", "B": "勞工因工作罹患疾病", "C": "勞工為修理機器感電死亡", "D": "化學工廠爆炸致居民死傷多人"}, "answer": "D"}, {"id": 27, "question": "職業災害發生，係因不安全狀況與不安全行為，屬下列何種原因?", "options": {"A": "基本原因", "B": "直接原因", "C": "間接原因", "D": "天災"}, "answer": "C"}, {"id": 28, "question": "職業災害發生模式中，以某一要素為基源，由此一要素衍生一新要素，此一新要素再衍生另一新要素，各要素分別為次一要素之原因，由此等要素間連鎖發展並逐次擴大規模形成災害，此為下列何種模式?", "options": {"A": "集中型", "B": "連鎖型", "C": "複合型", "D": "聚合型"}, "answer": "B"}, {"id": 29, "question": "職業災害調查處理，對於設備故障未修理及維修不良之不安全狀態，屬下列何者?", "options": {"A": "設備本身的缺陷", "B": "設備之防護措施的缺陷", "C": "設備之放置、作業場所的缺陷", "D": "防護具、服裝等的缺陷"}, "answer": "A"}, {"id": 30, "question": "勞工發生職業傷害在一次事故中，有一手指截斷，失去原有機能，依規定為下列何種職業傷害類型?", "options": {"A": "永久全失能", "B": "永久部分失能", "C": "暫時全失能", "D": "輕傷害事故"}, "answer": "B"}, {"id": 31, "question": "勞工因工作傷害雙目失明，依國家標準(CNS)其損失日數為多少日?", "options": {"A": "3000", "B": "4000", "C": "5000", "D": "6000"}, "answer": "D"}, {"id": 32, "question": "所謂失能傷害係指損失日數在多少日以上?", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C"}, {"id": 33, "question": "下列何者不屬於永久部分失能?", "options": {"A": "損失牙齒", "B": "一隻眼睛失能", "C": "一隻手臂失能", "D": "一隻小腿截斷"}, "answer": "A"}, {"id": 34, "question": "某工廠有工人200名，總經歷工時為1000000，共發生10日失能傷害損失日數，則失能傷害嚴重率(SR)為下列何者?", "options": {"A": "30", "B": "10", "C": "40", "D": "2"}, "answer": "B"}, {"id": 35, "question": "依勞動檢查法施行細則規定，下列何者系指每百萬工時之失能傷害總損失日數?", "options": {"A": "事故率", "B": "失能傷害千人率", "C": "傷害頻率", "D": "職業災害嚴重率"}, "answer": "D"}, {"id": 36, "question": "勞工進入10尺深人孔後因缺氧而死亡，在職業災害調查分析時，未先測定氧氣濃度屬下列何者原因?", "options": {"A": "直接原因", "B": "根本原因", "C": "基本原因", "D": "間接原因"}, "answer": "C"}, {"id": 37, "question": "職業災害統計中對於暫時全失能定義為下列何者?", "options": {"A": "死亡", "B": "永久部分失能", "C": "輕傷害", "D": "暫時不能恢復工作1日以上"}, "answer": "D"}, {"id": 38, "question": "工作場所如發生死亡職業災害，下列何者非雇主應有之作為?", "options": {"A": "必要搶救", "B": "實施調查、分析", "C": "必要急救", "D": "馬上復原現場，並加以隔離"}, "answer": "D"}, {"id": 39, "question": "職業災害造成事業單位之損失，可分為直接損失及間接損失，下列何者係屬直接損失?", "options": {"A": "重新訓練新員工之費用", "B": "超時工作之額外津貼", "C": "受傷員工之醫療支付", "D": "員工士氣低落"}, "answer": "C"}, {"id": 40, "question": "職業災害造成事業單位之損失，下列何者係屬間接損失?", "options": {"A": "社會救濟支付", "B": "保險公司賠償", "C": "延遲交貨違約罰款", "D": "受害者之醫療費用"}, "answer": "C"}, {"id": 41, "question": "截斷食指第二骨節之傷害損失日數為200日，某事故使一位勞工之食指的中骨節發生機能損失，經醫生證明有25%的僵直，則其傷害損失日數為多少日?", "options": {"A": "50", "B": "100", "C": "150", "D": "200"}, "answer": "A"}, {"id": 42, "question": "美國工業安全專家韓立奇曾統計分析工業事故，就事故結果之嚴重性，得知事故發生次數之比例關係為其中比例為係指下列何種事故?", "options": {"A": "重傷害", "B": "虛驚事故", "C": "輕傷害", "D": "財物損失"}, "answer": "A"}, {"id": 43, "question": "依勞動檢查法施行細則規定，下列何者係指每百萬工時之失能傷害總損失日數?", "options": {"A": "傷害頻率", "B": "失能傷害千人率", "C": "職業傷害嚴重率", "D": "事故率"}, "answer": "C"}, {"id": 44, "question": "發生死亡職災雇主應多久內報告勞動檢查機構?", "options": {"A": "4小時內", "B": "8小時內", "C": "16小時內", "D": "24小時內"}, "answer": "B"}, {"id": 45, "question": "勞工遭遇職業災害致死，依勞基法規定死亡補償受領之遺屬之順位，第一為?", "options": {"A": "父母", "B": "配偶及子女", "C": "祖父母", "D": "孫子女"}, "answer": "B"}, {"id": 46, "question": "勞工因職業災害死亡，雇主應給付死亡補償，其給與之平均工資應為幾個月?", "options": {"A": "35", "B": "40", "C": "45", "D": "50"}, "answer": "C"}, {"id": 47, "question": "依勞動基準法施行細則之規定，勞工遭遇職業傷害或罹患職業病而死亡時，雇主給與之5個月平均工資之喪葬費應於幾日內給罹災者家屬?", "options": {"A": "3日", "B": "7日", "C": "14日", "D": "30日"}, "answer": "A"}, {"id": 48, "question": "依勞動基準法施行細則之規定，勞工遭遇職業傷害或罹患職業病而死亡時，雇主給與之40個月平均工資之死亡補償應於幾日內給罹災者家屬?", "options": {"A": "5日", "B": "10日", "C": "15日", "D": "30日"}, "answer": "C"}, {"id": 49, "question": "下列何者不屬於永久部分失能?", "options": {"A": "損失牙齒", "B": "一隻眼睛失能", "C": "一隻手臂失能", "D": "一隻小腿截斷"}, "answer": "A"}, {"id": 50, "question": "職業災害發生模式中，以某一要素為基源，由此一要素衍生一新要素，此一新要素再衍生另一新要素，各要素分別為次一要素之原因，由此等要素間連鎖發展並逐次擴大規模形成災害，此為下列何種模式?", "options": {"A": "集中型", "B": "連鎖型", "C": "複合型", "D": "聚合型"}, "answer": "B"}, {"id": 51, "question": "依勞動檢查法施行細則規定，下列何者洩漏，發生勞工中毒1人需住院治療者，係屬於重大職業災害", "options": {"A": "瓦斯", "B": "氯氣", "C": "甲烷", "D": "氯化氫"}, "answer": "B"}, {"id": 52, "question": "某常日班勞工上午因工作受傷，中午開始請公傷假48小時後，隔天下午恢復上班，此勞工缺席兩個半天之工資應如何處理?", "options": {"A": "領兩倍薪", "B": "領半薪", "C": "不領薪", "D": "領全薪"}, "answer": "D"}]}}</script>

,"D":"1000"}},{"id":43,"question":"常用乾粉滅火器的主要成分為下列何者？","answer":"1","options":{"A":"碳酸氫鈉、碳酸氫鉀","B":"二氧化碳","C":"隋性氣體","D":"鹵化烷"}},{"id":44,"question":"依職業安全衛生管理辦法規定，事業單位勞工在多少人以上時，雇 主應訂定職業安全衛生管理規章？","answer":"2","options":{"A":"30","B":"100","C":"200","D":"300"}},{"id":45,"question":"進入長期間未使用之坑井作業時，未實施作業環境測定，較會產生 下列何種危害？","answer":"2","options":{"A":"墜落","B":"中毒","C":"感電","D":"被夾、被捲"}},{"id":46,"question":"下列何者非屬職業安全衛生法之附屬法規？","answer":"2","options":{"A":"職業安全衛生設施規 則","B":"勞工保險被保險人 因執行職務而致傷 病審查準則","C":"起重升降機具安全 規則","D":"有機溶劑中毒預防 規則"}},{"id":47,"question":"金屬鉀所引起之火災適合用何種滅火劑？","answer":"3","options":{"A":"泡沫","B":"二氧化碳","C":"特種金屬化學乾粉","D":"惰性氣體"}},{"id":48,"question":"依職業安全衛生法施行細則規定，下列何者非屬安全衛生工作守則 之內容？","answer":"3","options":{"A":"事業之勞工安全衛生 管理及各級之權責","B":"設備之維護及檢查","C":"環境汙染預防","D":"工作安全及衛生標 準"}},{"id":49,"question":"使用移動式施工架作業，下列敘述何者有誤？","answer":"1","options":{"A":"作業人員上下應使用 合梯","B":"施工架上有人員施 工時，應固定腳輪 避免滑動","C":"移動施工架時，應 要求作業人員離開 施工架","D":"頂層須設置護欄"}},{"id":50,"question":"有關危害告知事項，下列何者正確？","answer":"4","options":{"A":"可以口頭方式告知","B":"承攬人就其承攬之 全部或一部分交付 再承攬時，承攬人 無須告知再承攬人","C":"得以承攬人勞工之 安全承諾書替代危 害告知","D":"須以書面或召開協 商會議並作成紀錄 為之"}}]},"A2":{"chapter":"甲業第2章","total_questions":50,"questions":[{"id":51,"question":"齒輪與齒條之傳動裝置，較易造成下列何種危害？","answer":"4","options":{"A":"擦傷","B":"感電","C":"割傷","D":"被夾、被捲"}},{"id":52,"question":"勞工於室外高溫作業環境工作，可能對身體產生何種危害？","answer":"3","options":{"A":"塵肺症","B":"聽力損失","C":"中暑","D":"下背痛"}},{"id":53,"question":"紙張所引起之火災種類為下列何者？","answer":"1","options":{"A":"A類","B":"B類","C":"C類","D":"D類"}},{"id":54,"question":"依危險性機械及設備安全檢查規則規定，下列何者非屬「具有危險 性之機械」？","answer":"4","options":{"A":"積載荷重320公斤之 吊籠","B":"吊升荷重在3公噸 以上之固定式起重 機","C":"積載荷重1公噸以 上之營建用升降機","D":"1公噸以上之堆高 機"}},{"id":55,"question":"依起重升降機具安全規則規定，下列何者指由懸吊式施工架、升降 裝置、支撐裝置、工作台及其附屬裝置所構成，專供勞工升降施工 之設備？","answer":"2","options":{"A":"升降機","B":"吊籠","C":"簡易提升機","D":"移動式起重機"}},{"id":56,"question":"造紙廠於滾胴接紙作業時，較易發生下列何種危害？","answer":"4","options":{"A":"被切","B":"墜落","C":"感電","D":"被夾、被捲"}},{"id":57,"question":"依職業安全衛生法規定，事 er":"4","options":{"A":"A類","B":"B類","C":"C類","D":"D類"}},{"id":146,"question":"身體質量指數(BMI)之計算公式中，分母為下列何者？","answer":"2","options":{"A":"身高","B":"身高之平方","C":"體重","D":"體重之平方"}},{"id":147,"question":"依勞動檢查法施行細則規定，下列何者係指每百萬工時之失能傷害 次數？","answer":"1","options":{"A":"傷害頻率","B":"職業災害嚴重率","C":"失能傷害千人率","D":"死亡千人率"}},{"id":148,"question":"職業災害造成事業單位之損失，可分為直接損失及間接損失，下列 何者係屬「間接損失」？","answer":"2","options":{"A":"受傷員工之醫療支付","B":"造成公司信譽受損","C":"受傷員工之工資損 失","D":"受傷勞工之補償費 用"}},{"id":149,"question":"下列何者不屬於永久部分失能？","answer":"1","options":{"A":"牙齒斷掉","B":"一耳聽力喪失","C":"一隻手臂失能","D":"一隻小腿截斷"}},{"id":150,"question":"若電氣迴路之電壓越高，該迴路電擊之危害性為何？","answer":"2","options":{"A":"越低","B":"越高","C":"不一定","D":"與電壓無關"}}]},"A4":{"chapter":"甲業第4章","total_questions":50,"questions":[{"id":151,"question":"雇主於勞工經定期健康檢查後，應採取之措施，下列何者不適當？","answer":"4","options":{"A":"參照醫師建議，告知 勞工並適當配置勞工 於工作場所作業","B":"將檢查結果發給受 檢勞工","C":"將受檢勞工之健康 檢查紀錄彙整成健 康檢查手冊","D":"異常結果之健康檢 查手冊應公告周知"}},{"id":152,"question":"依職業安全衛生教育訓練規則規定，新僱勞工所接受之安全衛生教 育訓練，不得少於幾小時？","answer":"4","options":{"A":"0.5","B":"1","C":"2","D":"3"}},{"id":153,"question":"依職業安全衛生設施規則規定，雇主對室內工作場所應符合之規定 中，下列敘述何者錯誤？","answer":"4","options":{"A":"主要人行道不得小於 1公尺","B":"各機械間通道不得 小於80公分","C":"主要人行道及安全 門應有明顯標示","D":"自路面起算2公尺 高度範圍內，得有 障礙物"}},{"id":154,"question":"有關危害辨識之敘述，下列何者正確？","answer":"2","options":{"A":"事業單位僅須針對重 點工作進行危害辨識 ，界定潛在危害之分 類或類型","B":"事業單位應針對作 業之危害來源，辨 識出最嚴重後果","C":"對已有可有效預防 發生可能性及減輕 後果嚴重度之控制 措施無須辨識","D":"只有職安人員可執 行危害辨識"}},{"id":155,"question":"工作中導致雙眼失明無法復原，是屬於下列何種失能傷害？","answer":"2","options":{"A":"暫時全失能","B":"永久全失能","C":"永久部分失能","D":"輕傷害"}},{"id":156,"question":"下列何者不是辨識機械危害所需思考之因素？","answer":"2","options":{"A":"預期機械會產生什麼 旋轉、來回運動或上 下移動","B":"這台機械購置成本","C":"產生什麼廢料","D":"這台機械處理什麼 原料、如何處理加 工"}},{"id":157,"question":"依職業安全衛生法規定，製造者或輸入者對於中央主管機關公告列 入型式驗證之機械、設備或器具，非經中央主管機關認可之驗證機 構實施下列何項措施，不得產製運出廠場或輸入？","answer":"4","options":{"A":"熔接檢查","B":"重新檢查","C":"作業環境測定","D":"型式驗證合格及張 貼合格標章"}},{"id":158,"question":"職場健康促進活動中，下列何者不屬推行健康生活範圍？","answer":"4","options":{"A":"營養指導","B":"菸害防制","C":"體重管理","D":"投資理財"}},{"id":159,"question":"缺氧症預防標準所稱「缺氧」狀態，係指空氣中氧氣濃度未滿多 少％？","answer":"3","options":{"A":"6","B":"12","C":"18","D":"21"}},{"id":160,"question":"依職業安全衛生法施行細則規定，下列何者非屬安全衛生工作守則 之內容？","answer":"1","options":{"A":"環境污染預防","B":"工作安全及衛生標 準","C":"事業之安全衛生管 理及各級之權責","D":"急救及搶救"}},{"id":161,"question":"下列何者非屬勞工健康保護規則所稱之特別危害健康作業？","answer":"4","options":{"A":"異常氣壓作業","B":"游離輻射作業","C":"高溫作業","D":"操作衝剪機械作業"}},{"id":162,"question":"下列何者為事業單位內負責審議、協調及建議職業安全衛生有關業 務之組織？","answer":"3","options":{"A":"職業安全衛生管理單 位","B":"醫療管理單位","C":"職業安全衛生委員 會","D":"安全衛生協議組織"}},{"id":163,"question":"職業災害勞工保護法之中央主管機關為下列何者？","answer":"1","options":{"A":"勞動部","B":"衛生署","C":"勞工保險局","D":"勞工保護署"}},{"id":164,"question":"依職業安全衛生設施規則規定，雇主設置之安全門及其通道，應如 何辦理？","answer":"2","options":{"A":"安全門於勞工工作期 間內得上鎖，其通道 得堆置物品","B":"安全門於勞工工作 期間內不得上鎖， 其通道不得堆置物 品","C":"安全門於勞工工作 期間內不得上鎖， 其通道得堆置物品","D":"安全門於勞工工作 期間內得上鎖，其 通道不得堆置物品"}},{"id":165,"question":"某常日班勞工上午因工作受傷，中午開始請公傷假，24小時後，隔 天下午恢復上班，則此勞工缺席兩個半天之工資應如何處理？","answer":"2","options":{"A":"領半薪","B":"領全薪","C":"不領薪","D":"領兩倍薪"}},{"id":166,"question":"提高空氣中氧氣濃度，對易燃液體蒸汽之爆炸範圍影響為何？","answer":"1","options":{"A":"擴大","B":"縮小","C":"不變","D":"不一定"}},{"id":167,"question":"依職業安全衛生設施規則規定，可燃性氣體、有毒性氣體及氧氣之 鋼瓶，應如何儲存？","answer":"1","options":{"A":"全部分開","B":"僅可燃性氣體及毒 性氣體鋼瓶需分開","C":"僅可燃性氣體及氧 氣鋼瓶需分開","D":"無需分開"}},{"id":168,"question":"下列何者不屬於雷射加工機常見的危害？","answer":"4","options":{"A":"雷射光束誤照射人體","B":"光束間接（反射、 折射、繞射）發射 所引起的危害","C":"非游離輻射所引起 的危害","D":"滾胴間的捲入點"}},{"id":169,"question":"下列何者屬職業災害原因分析之間接原因？","answer":"1","options":{"A":"使用有缺陷之機具","B":"無安全衛生政策","C":"未定期檢討安全衛 生計畫","D":"未訂定書面之安全 衛生工作守則"}},{"id":170,"question":"粉塵爆炸係屬下列何者？","answer":"2","options":{"A":"固相與液相反應","B":"固相與氣相反應","C":"液相與氣相反應","D":"僅有固相反應"}},{"id":171,"question":"下列有關職業安全衛生管理計畫訂定之內容，何者錯誤？","answer":"4","options":{"A":"應含工作目標、期程","B":"應含採行措施","C":"應含資源需求","D":"績效考核屬於人資 業務，不應納入"}},{"id":172,"question":"鍍鉻作業易使勞工暴露於鉻酸霧滴，易造成下列何種疾病？","answer":"2","options":{"A":"青光眼","B":"鼻中膈穿孔","C":"白指症","D":"白內障"}},{"id":173,"question":"下列何者較不屬於一般健康體能檢測項目？","answer":"4","options":{"A":"心肺適能","B":"肌耐力","C":"柔軟度","D":"飲食習慣"}},{"id":174,"question":"下列何種材料對游離輻射屏蔽效果最好？","answer":"1","options":{"A":"鉛","B":"鐵","C":"鋼","D":"石頭"}},{"id":175,"question":"製程危害分析應評估之事項，不包括下列何者？","answer":"2","options":{"A":"設備設施配置","B":"附近居民之敦親睦 鄰措施","C":"類似製程曾發生之 事故所發現之潛在 危害","D":"工程及管理控制措 施與失效之後果與 影響"}},{"id":176,"question":"依職業安全衛生管理辦法規定，雇主對固定式起重機，應每隔多久 就機械之整體定期實施檢查1次？","answer":"4","options":{"A":"3個月","B":"6個月","C":"9個月","D":"1年"}},{"id":177,"question":"臺灣職業安全衛生管理系統中之「預防與控制措施」項目中，下列 何者為第一優先採行的措施？","answer":"3","options":{"A":"提供適當個人防護具","B":"實施教育訓練","C":"消除危害及風險","D":"設置職安管理單位"}},{"id":178,"question":"人體受熱最有效之降低熱蓄積方式，為下列何者？","answer":"2","options":{"A":"增加血液流速","B":"出汗","C":"飲食","D":"不要移動"}},{"id":179,"question":"在建立健康工作環境時，下列何者較不屬於組織管理層面？","answer":"1","options":{"A":"工作姿勢","B":"領導風格","C":"人際關係","D":"團隊互助"}},{"id":180,"question":"有關臺灣職業安全衛生管理系統的特色，下列何者正確？","answer":"4","options":{"A":"與OHSAS 18001之要 求完全一致","B":"由100人以上高風 險事業單位優先推 動","C":"政府強制推動高風 險事業單位通過驗 證","D":"可與ISO 9001、ISO 14001相容"}},{"id":181,"question":"勞工在一次工作中導致雙目失明，永久失去其機能，是屬於下列何 種失能傷害？","answer":"2","options":{"A":"暫時全失能","B":"永久全失能","C":"永久部分失能","D":"輕傷害"}},{"id":182,"question":"危險性工作場所審查暨檢查辦法規定，須執行施工安全評估，乃屬 於下列何種危險性工作場所？","answer":"4","options":{"A":"甲類","B":"乙類","C":"丙類","D":"丁類"}},{"id":183,"question":"依災害類型分類說明表，下列何種災害類型係指以飛來物、落下物 等為主體碰撞人體之情況？","answer":"3","options":{"A":"感電","B":"火災","C":"物體飛落","D":"跌倒"}},{"id":184,"question":"臨時性交付之承攬作業，其危害辨識及風險評估應在何時開始實","answer":"1","options":{"A":"正式施工前","B":"施工中","C":"完工後","D":"都不用"}},{"id":185,"question":"失能傷害嚴重率(SR)數值之表示方式為何？","answer":"1","options":{"A":"取至個位數","B":"取小數點第1位","C":"取小數點第2位","D":"無規定"}},{"id":186,"question":"進入混凝土預拌廠之拌合機內部清除結塊時，預防捲夾災害的最有 效方法為下列何者？","answer":"2","options":{"A":"設置寸動開關","B":"門蓋加裝連鎖裝置","C":"實施通風","D":"穿戴防護具"}},{"id":187,"question":"有關職業安全衛生管理規章之敘述，下列何者正確？","answer":"2","options":{"A":"直接套用他廠規章， 以方便管理","B":"規章之結構應含制 定目的、適用範圍 結構","C":"屬公司內部規則， 無須頒布","D":"一般組織管理經驗 或文獻資料屬研究 範圍不 ","D":"都不需要"}},{"id":202,"question":"下列何種作業場所，較不易發生缺氧危害？","answer":"1","options":{"A":"一般地下室停車場","B":"醃漬槽","C":"污水處理池","D":"水井"}},{"id":203,"question":"裝設無熔絲開關之主要目的為何？","answer":"3","options":{"A":"防止感電","B":"防止靜電","C":"防止電氣火災","D":"增加電阻"}},{"id":204,"question":"電磁波能量與頻率之關係為何？","answer":"1","options":{"A":"正比","B":"反比","C":"無關","D":"非線性關係"}},{"id":205,"question":"職業災害統計，有關失能日數之損失日數，不包括下列何者？","answer":"1","options":{"A":"受傷當日","B":"受傷後經過之星期 日","C":"受傷後經過之休假 日","D":"受傷後經過之工廠 停工日"}},{"id":206,"question":"依職業安全衛生管理辦法規定，雇主依規定實施之定期檢查表單， 下列何者非屬應記錄事項？","answer":"3","options":{"A":"檢查年月日","B":"檢查方法","C":"檢查態度","D":"檢查結果"}},{"id":207,"question":"雇主不應要求醫護人員臨廠服務下列何事項？","answer":"1","options":{"A":"提供健康檢查資料以 作為開除員工之依據","B":"協助規劃健康促進 業務","C":"預防接種","D":"職業衛生之研究"}},{"id":208,"question":"依職業安全衛生法施行細則規定，下列何者非屬有害物？","answer":"3","options":{"A":"致癌物","B":"劇毒物質","C":"氧化性物質","D":"腐蝕性物質"}},{"id":209,"question":"依危害性化學品標示及通識規則之規定，容器之容積在多少以下者 ，得僅標示名稱、危害圖式及警示語？","answer":"2","options":{"A":"10毫升","B":"100毫升","C":"500毫升","D":"1公升"}},{"id":210,"question":"下列何者不是氧化性物質？","answer":"4","options":{"A":"氯酸鈉","B":"過氯酸鈉","C":"硝酸鈉","D":"硝化甘油"}},{"id":211,"question":"有關承攬管理之敘述，下列何者正確？","answer":"2","options":{"A":"事業單位與承攬人、 再承攬人分別僱用勞 工共同作業時，原事 業單位應設置協議組 織，並指定承攬人為 工作場所負責人，擔 任指揮及協調之工作","B":"原事業單位應對相 關承攬事業間之安 全衛生教育給予指 導及協助","C":"原事業單位無權對 承攬人之勞工實施 進場管制","D":"既已將工作交付承 攬，無須於契約中 規定相關安全事項"}},{"id":212,"question":"某工廠有工人200名，總經歷工時為1,000,000，共發生2次失能傷害事 故，則失能傷害頻率(FR)為下列何者？","answer":"2","options":{"A":"1","B":"2","C":"3","D":"4"}},{"id":213,"question":"下列何者為危險性工作場所審查及檢查所需推動實施之制度？","answer":"1","options":{"A":"製程安全評估制度","B":"經過職業衛生實驗 室認可","C":"推動ISO 14001驗證","D":"通過TOSHMS之驗 證"}},{"id":214,"question":"下列何者屬於噪音危害預防之工程改善項目？","answer":"4","options":{"A":"減少暴露時間","B":"標示公告噪音危害 預防事項","C":"佩戴適當的防音防 護具","D":"密閉噪音源"}},{"id":215,"question":"為落實職業安全衛生管理系統中之採購管理，對於請購、採購及驗 收人員應提供下列何種必要之措施？","answer":"1","options":{"A":"安全衛生教育訓練","B":"職務輪調","C":"採購經費","D":"核定權限"}},{"id":216,"question":"從事游離輻射作業之勞工，特別需要定期接受下列何種檢查？","answer":"1","options":{"A":"甲狀腺","B":"心電圖","C":"腎功能","D":"聽力"}},{"id":217,"question":"下列何者為成員共享的安全價值、信念與規範，表徵於個人及組織 的行動與態度、政策及程序等過程，強調成員共享的安全知覺？","answer":"2","options":{"A":"職業災害防止計畫","B":"安全文化","C":"自動檢查計畫","D":"職業災害調查"}},{"id":218,"question":"勞工在一次工作中導致雙目失明，永久失去其機能，是屬於下列何 種失能傷害？","answer":"2","options":{"A":"暫時全失能","B":"永久全失能","C":"永久部分失能","D":"輕傷害"}},{"id":219,"question":"下列何者不是「具有危險性之機械」？","answer":"4","options":{"A":"積載荷重320公斤之 吊籠","B":"貨櫃起重機","C":"積載荷重1公噸以 上之升降機","D":"高空工作車"}},{"id":220,"question":"關於危害辨識之敘述，下列何者有誤？","answer":"2","options":{"A":"應辨識出潛在危害與 發生原因","B":"應辨識出可降低現 有風險的替代方案","C":"應辨識可能且合理 之最嚴重後果","D":"應辨識出現有可有 效預防或降低危害 原因發生，可能性 及減輕後果嚴重度 之控制措施"}},{"id":221,"question":"勞工發生職業災害，雇主應負無過失責任之職業災害補償，另依職 業災害勞工保護法之規定，如涉及損害賠償時，過失之舉證責任為 下列何者？","answer":"1","options":{"A":"雇主","B":"勞工","C":"主管機關","D":"公正第三者"}},{"id":222,"question":"氯乙烯單體屬下列何種物質？","answer":"1","options":{"A":"致肝癌物質","B":"腐蝕性物質","C":"肺部惰性物質","D":"致肺纖維化物質"}},{"id":223,"question":"政府為保障職業災害勞工之權益，加強職業災害之預防，促進就業 安全及經濟發展，所制定之法律為下列何者？","answer":"1","options":{"A":"職業災害勞工保護法","B":"職業安全衛生法","C":"勞動檢查法","D":"勞動基準法"}},{"id":224,"question":"依職業安全衛生設施規則規定，雇主對於矽甲烷之處理，下列何者 有誤？","answer":"2","options":{"A":"應儲存於室外安全處 所或室內有效通風換 氣之處所，使用時應 置於氣瓶櫃內","B":"氣體容器閥門應有 提供最小流率之裝 置","C":"應設置氣體洩漏檢 知警報系統","D":"未使用之容器與供 器中之容器應分開 放置"}},{"id":225,"question":"有關臺灣職業安全衛生管理系統（TOSHMS）驗證的做法，下列何 者正確？","answer":"4","options":{"A":"TOSHMS驗證對高風 險事業為強制性","B":"驗證稽核與勞動檢 查性質類似","C":"申請TOSHMS驗證 之費用可由政府支 付","D":"高風險事業單位須 優先推動，但未強 制需通過驗證"}},{"id":226,"question":"FMEA為下列何種評估方法之縮寫？","answer":"4","options":{"A":"初步危害分析","B":"危害及可操作性分 析","C":"故障樹分析","D":"失誤模式與影響分 析"}},{"id":227,"question":"職場健康促進活動中，下列何者不屬推行舒適環境範圍？","answer":"4","options":{"A":"健康工時","B":"人因工程","C":"作業環境","D":"員工協助方案"}},{"id":228,"question":"職業安全衛生管理系統所強調的P-D-C-A管理循環，係指那些管理功 能？","answer":"1","options":{"A":"規劃－實施－查核－ 改進","B":"程序－執行－改進 －考核","C":"規劃－發展－確認 －改進","D":"計畫－執行－檢討 －回饋"}},{"id":229,"question":"勞工進入9公尺深人孔後中毒死亡，在職業災害調查分析時，未先行 通風屬下列何種原因？","answer":"2","options":{"A":"直接原因","B":"間接原因","C":"基本原因","D":"長期原因"}},{"id":230,"question":"依危害性化學品標示及通識規則之規定，氧化性固體之危害圖式符 號為何？","answer":"2","options":{"A":"火焰","B":"圓圈上一團火焰","C":"炸彈爆炸","D":"骷顱頭與二根交叉 骨"}},{"id":231,"question":"雇主對於勞工實施特殊健康檢查，可向下列何者申請補助費用？","answer":"3","options":{"A":"勞工局","B":"衛生局","C":"勞保局","D":"環保局"}},{"id":232,"question":"於工地設置之安全母索，若不慎被移動式起重機拉斷，下列何者處 置較適當？","answer":"4","options":{"A":"以八字結將斷索兩端 續接後繼續使用","B":"以鐵線捆紮後繼續 使用","C":"以索夾索固後繼續 使用","D":"整條母索更換後繼 續使用"}},{"id":233,"question":"A+B→C+D，ΔH＝20卡，左列為一常用燃燒化學反應式的表示方式 ，以下敘述何者有誤？","answer":"3","options":{"A":"A、B是反應物","B":"C、D是生成物","C":"20卡是活化能","D":"燃燒通常是放熱反 應"}},{"id":234,"question":"有關事業分散於不同地區者，應於各該地區之事業單位設職業安全 衛生管理單位及管理人員，下列敘述何者有誤？","answer":"4","options":{"A":"事業單位勞工人數之 計算，以各該地區事 業單位作業勞工之總 人數為準","B":"設有總機構者，應 另於總機構或其地 區事業單位設綜理 全事業之職業安全 衛生事務之管理單 位及置管理人員","C":"第一類事業設有總 機構且勞工人數在 五百人以上者，應 設綜理全事業且直 接隸屬僱主之專責 一級管理單位","D":"前項勞工人數之計 算，以總機構作業 勞工之人數為準"}},{"id":235,"question":"下列何者非臺灣職業安全衛生管理系統所涵蓋的項目？","answer":"2","options":{"A":"採購管理","B":"環境影響評估","C":"績效量測與監督","D":"緊急應變措施"}},{"id":236,"question":"依勞動檢查法施行細則規定，事業單位對勞動檢查機構所發檢查結 果通知書有異議時，應於通知書送達次日起幾日內，以書面敘明理 由向勞動檢查機構提出？","answer":"1","options":{"A":"10","B":"12","C":"15","D":"30"}},{"id":237,"question":"為防止災害，應對下列何者採取適當對策或措施？","answer":"1","options":{"A":"人員及設備皆要","B":"設備即可","C":"人員或設備擇一","D":"人員即可"}},{"id":238,"question":"依勞工健康保護規則之規定，雇主使勞工從事粉塵作業以外之特別 危害健康作業時，應依規定實施分級健康管理。勞工經特殊健康檢 查結果，部分或全部項目異常，經醫師綜合判定為異常，且可能與 職業原因有關者，屬第幾級管理？","answer":"3","options":{"A":"1","B":"2","C":"3","D":"4"}},{"id":239,"question":"我國製造業失能職業災害，以發生次數統計，下列何種災害類型所 占百分比較高？","answer":"2","options":{"A":"墜落","B":"被夾、被捲","C":"感電","D":"跌倒"}},{"id":240,"question":"依職業安全衛生管理辦法規定，有關職業安全衛生業務主管，雇主 應自該事業單位之何者選任？","answer":"3","options":{"A":"僅可由相關主管選任","B":"僅由從辦理職業安 全衛生事務者選任","C":"可由相關主管或辦 理職業安全衛生事 務者選任","D":"可由辦理職業安全 衛生或人資事務者 選任"}},{"id":241,"question":"下列何者非屬採購管理涵蓋之範圍？","answer":"4","options":{"A":"設備購買","B":"工程定作","C":"勞務採購","D":"社區服務"}},{"id":242,"question":"有關局限空間災害之緊急應變，下列何者較能減少職業災害之再發 生？","answer":"1","options":{"A":"救援人員做好個人防 護","B":"正確CPR","C":"強化救援人員體能","D":"儘速搶救"}},{"id":243,"question":"坐姿姿勢不良屬於下列何種危害？","answer":"2","options":{"A":"化學性","B":"人因工程","C":"物理性","D":"生物性"}},{"id":244,"question":"為預防高處作業的災害，下列何者有誤？","answer":"2","options":{"A":"於鄰近結構物之周遭 下方設置斜籬","B":"高差未達2公尺之 作業面，可不設置 安全之上下設備","C":"應以高空工作車或 架設施工架或其他 方法設置工作台","D":"高度2公尺以上之 高處作業，已採安 全網者，勞工可不 用使用安全帶"}},{"id":245,"question":"交流電焊機未設置自動電擊防止裝置，致勞工於作業時不慎碰觸感 電，其災害之間接原因為下列何者？","answer":"1","options":{"A":"不安全設備","B":"不安全動作","C":"不安全制度","D":"天災"}},{"id":246,"question":"在降低風險的控制措施中，不使用危害物質，屬於下列何者？","answer":"1","options":{"A":"消除","B":"取代","C":"工程控制措施","D":"管理控制措施"}},{"id":247,"question":"有關發生火災時之滅火措施，下列敘述何者較佳？","answer":"2","options":{"A":"儘速用水灌救，掌握 先機","B":"應先確認適用之滅 火措施","C":"不論火勢大小，先 使用手提滅火器","D":"儘速逃離現場"}},{"id":248,"question":"在各類災害防止基本對策中，下列何者屬於強化安全管理之措施？","answer":"1","options":{"A":"確立安全作業標準","B":"設備安全化","C":"設置局部排氣裝置","D":"安全連鎖裝置"}},{"id":249,"question":"電氣迴路中，火線係指下列何者？","answer":"1","options":{"A":"通電中導線","B":"接地導線","C":"中性導線","D":"無電流流通之導線"}},{"id":250,"question":"下列何者不是消除靜電之方法？","answer":"3","options":{"A":"加濕","B":"接地","C":"絕緣","D":"裝設靜電棒、靜電 網"}}]},"A6":{"chapter":"甲業第6章","total_questions":50,"questions":[{"id":251,"question":"有關風險管理的三大主要工作，下列何者有誤？","answer":"3","options":{"A":"危害辨識","B":"風險評估","C":"企業保險","D":"風險控制"}},{"id":252,"question":"事業單位分別交付二個以上承攬人共同作業而未參與共同作業時， 下列敘述何者正確？","answer":"2","options":{"A":"仍應依規定負原事業 單位之承攬管理責任","B":"應指定承攬人之一 負原事業單位之承 攬管理責任","C":"應由承攬人互推一 人負原事業單位之 承攬管理責任","D":"抽籤決定"}},{"id":253,"question":"依職業安全衛生設施規則規定，雇主對於堆高機之操作，不得超過 該機械所能承受之最大荷重，且其載運之貨物應保持穩固狀態，防 止下列何種災害？","answer":"3","options":{"A":"感電","B":"火災","C":"翻倒","D":"缺氧"}},{"id":254,"question":"某一空氣壓縮機用之空氣儲槽，氣體壓力為每平方公分20公斤，且 內容積為0.5立方公尺，該儲槽屬下列何者？","answer":"3","options":{"A":"高壓氣體特定設備","B":"第一種壓力容器","C":"第二種壓力容器","D":"小型壓力容器"}},{"id":255,"question":"某電子零件加工廠勞工人數70人，另有共同作業之承攬商勞工人數 35人，依據職業安全衛生管理辦法規定，應設何種職業安全衛生管 理單位？","answer":"3","options":{"A":"一級單位","B":"二級單位","C":"一級專責單位","D":"二級專責單位"}},{"id":256,"question":"沸騰液體膨脹蒸汽爆炸(BLEVE)屬下列何者？","answer":"3","options":{"A":"化學變化","B":"物理變化","C":"兼具物理與化學變 化","D":"核子反應"}},{"id":257,"question":"紙廠原料通常捲成圓柱體形狀，每一圓柱體高度通常大於3公尺，以 下那一個儲存位置，最不符合安全考量？","answer":"1","options":{"A":"於鄰近斜坡道路旁堆 置","B":"於倉庫內堆置","C":"於廠區角落處堆置","D":"於人車較少處堆置"}},{"id":258,"question":"ppm 相當於多少立方公尺空氣中所含有害氣體之立方公分數？","answer":"1","options":{"A":"1","B":"10","C":"100","D":"1000"}},{"id":259,"question":"搬運氧氣鋼瓶時不慎翻倒，碰觸腳部受傷，屬於下列何種危害？","answer":"2","options":{"A":"化學性危害","B":"物理性危害","C":"電氣危害","D":"凍傷"}},{"id":260,"question":"若已知某危害之可能性，則其嚴重度越高，風險將如何變化？","answer":"1","options":{"A":"越高","B":"越低","C":"不變","D":"都有可能"}},{"id":261,"question":"依職業安全衛生法規定，雇主對在職勞工應施行健康檢查，而健康 檢查費用應由下列何者負擔？","answer":"2","options":{"A":"勞工","B":"雇主","C":"雇主及勞工各負擔 一半","D":"雇主負擔80％及勞 工負擔20％"}},{"id":262,"question":"事業單位以其事業之全部或一部分交付承攬時，依職業安全衛生法 規定應於事前告知該承攬人之事項，不包括下列何者？","answer":"4","options":{"A":"有關其事業工作環境","B":"有關其事業之危害 因素","C":"有關安全衛生規定 應採取之措施","D":"事業經營概況"}},{"id":263,"question":"依職業安全衛生法之規定，受僱從事工作獲致工資者，稱為下列何 者？","answer":"4","options":{"A":"承攬人","B":"工作者","C":"勞動者","D":"勞工"}},{"id":264,"question":"就安全管理而言，下列有關請購作業之敘述何者正確？","answer":"2","options":{"A":"請購過程係屬需求單 位與採購部門之業務 ，與安全衛生部門無 關","B":"需求單位對於採購 之物品應考量其安 全衛生條件，並簽 會安全衛生部門提 供意見","C":"有關請購之物品其 安全衛生條件由供 應商自行注意，無 須於請購單中規定","D":"供應商勞工到廠 (場)交貨時，因非 屬本廠員工，無須 要求其遵守安全衛 生規定"}},{"id":265,"question":"依危險性機械及設備安全檢查規則規定，高壓氣體特定設備係指供 高壓氣體之製造設備及其支持構造物，其容器以「每平方公分之公 斤數」單位所表示之設計壓力數值與以「立方公尺」單位所表示之 內容積數值之積，超過多少者？","answer":"4","options":{"A":"0.01","B":"0.02","C":"0.03","D":"0.04"}},{"id":266,"question":"下列何者不是「具有危險性之設備」（如高壓氣體特定設備）之檢 查種類？","answer":"3","options":{"A":"型式檢查","B":"定期檢查","C":"型式檢定","D":"構造檢查"}},{"id":267,"question":"依職業安全衛生設施規則規定，雇主對於研磨機之使用，下列敘述 何者錯誤？","answer":"3","options":{"A":"研磨輪應採用經速率 試驗合格且有明確記 載最高使用周速度者","B":"規定研磨輪使用， 除該研磨輪為側用 外，不得使用側面","C":"規定研磨機之使用 ，得超過規定最高 使用周速度","D":"規定研磨機使用， 應於每日作業開始 前試轉1分鐘以上"}},{"id":268,"question":"依高壓氣體勞工安全規則規定，設置於內容積在5000公升以上之液 化氣體儲槽之配管，應於距離該儲槽外側幾公尺以上之安全處所設 置可操作之緊急遮斷裝置？","answer":"1","options":{"A":"5","B":"6","C":"7","D":"8"}},{"id":269,"question":"事業單位在選擇承攬人時應考慮之因素，下列敘述何者有誤？","answer":"4","options":{"A":"考慮過去之安全衛生 績效","B":"考慮協調性","C":"考慮人員之素質及 流動性","D":"僅考慮其專業能力 ，不計較其安全衛 生管理能力"}},{"id":270,"question":"下列何者屬勞動部主管之職業安全衛生法規？","answer":"3","options":{"A":"公共危險物品及可燃 性高壓氣體設置標準 暨安全管理辦法","B":"加氣站設置管理規 則","C":"高壓氣體勞工安全 規則","D":"常壓液態罐槽車罐 槽體檢驗及管理辦 法"}},{"id":271,"question":"危害控制優先順序，下列何者正確？","answer":"2","options":{"A":"工程改善→消除→行 政管理","B":"消除→取代→隔離 →行政管理","C":"消除→使用防護具 →行政管理","D":"使用防護具→重新 設計→行政管理"}},{"id":272,"question":"下列何者不屬於電氣火災之防止對策？","answer":"3","options":{"A":"導線之負載勿超過規 定容量","B":"導線應定期檢查","C":"電焊操作人員所穿 的防火衣，以不導 電之尼龍材質為佳","D":"電氣設備在不使用 時，應確實關閉電 源"}},{"id":273,"question":"依職業安全衛生管理辦法規定，雇主所設職業安全衛生委員會之委 員會名冊，應如何處理？","answer":"3","options":{"A":"陳報勞動檢查機構","B":"陳報當地主管機關","C":"自行留存","D":"報衛生主管機關備 查"}},{"id":274,"question":"高壓氣體在絕熱環境下吹洩，其溫度變化為何？","answer":"3","options":{"A":"上升","B":"不變","C":"下降","D":"上下微幅振盪"}},{"id":275,"question":"金屬鉀所引起之火災種類為何？","answer":"4","options":{"A":"甲類","B":"乙類","C":"丙類","D":"丁類"}},{"id":276,"question":"美國工業安全專家韓立奇（H. W. Heinrich）曾統計分析工業事故， 就事故結果嚴重性分為3種事故，得出3種事故發生次數比例關係為 1：29：300，其中比例為1係指下列何種事故？","answer":"1","options":{"A":"重傷害","B":"輕傷害","C":"財物損失","D":"虛驚事故"}},{"id":277,"question":"目前事業單位所推動的職業安全衛生管理系統，不包括下列何者？","answer":"2","options":{"A":"OHSAS 18001","B":"ISO 9001","C":"ILO-OSH","D":"TOSHMS"}},{"id":278,"question":"依危險性機械及設備安全檢查規則規定，雇主變更固定式起重機之 桁架、伸臂、腳、塔等構造部分時，應向檢查機構申請何種檢查？","answer":"1","options":{"A":"變更檢查","B":"竣工檢查","C":"使用檢查","D":"型式檢查"}},{"id":279,"question":"下列何者非設立急救人員之主要目的？","answer":"1","options":{"A":"災害現場證人","B":"幫助勞工維持生命","C":"急救處理","D":"避免不必要傷亡"}},{"id":280,"question":"依勞工作業環境監測實施辦法之規定，特定粉塵作業場所，應每隔 多久測定其濃度一次以上？","answer":"3","options":{"A":"1個月","B":"3個月","C":"6個月","D":"1年"}},{"id":281,"question":"下列何者不屬於固定式起重機之安全裝置？","answer":"4","options":{"A":"接近防撞裝置","B":"過捲預防裝置","C":"過負荷預防裝置","D":"過熱預防裝置"}},{"id":282,"question":"最小著火能之單位為下列何者？","answer":"2","options":{"A":"牛頓","B":"毫焦耳","C":"瓦特","D":"伏特"}},{"id":283,"question":"永久全失能職業災害之勞動損失日數，我國是以多少日數來計算？","answer":"3","options":{"A":"3000","B":"4000","C":"6000","D":"10000"}},{"id":284,"question":"下列何種氣體較易滯留於局限空間場所底部？","answer":"4","options":{"A":"甲烷","B":"一氧化碳","C":"氨","D":"硫化氫"}},{"id":285,"question":"依職業安全衛生設施規則規定，雇主對物料堆放應符合之規定中， 下列敘述何者錯誤？","answer":"4","options":{"A":"不得超過堆放地最大 安全負荷","B":"不得影響照明","C":"不得妨礙機械設備 之操作","D":"為便於作業得堆置 於開口邊緣"}},{"id":286,"question":"下列何者不是交流電焊機易發生感電之處？","answer":"4","options":{"A":"待機中，接於電焊柄 之焊條端","B":"一次側線路端子","C":"二次側線路端子","D":"接地線"}},{"id":287,"question":"從事維修污水儲槽作業，下列敘述何者正確？","answer":"1","options":{"A":"攪拌設施未停電掛牌 維修，易產生感電及 因誤動作造成人員被 夾、被捲等傷害","B":"只要實施一次通風 ，人員進入就不會 造成缺氧、中毒等 危害","C":"應實施作業環境監 測，則可免除派人 監視之責任","D":"應單獨完成維修作 業，以避免遭主管 績效考評之危害"}},{"id":288,"question":"依職業安全衛生教育訓練規則規定，從事營造作業之新僱勞工，其 接受之一般安全衛生教育訓練應至少幾小時？","answer":"4","options":{"A":"3","B":"4","C":"5","D":"6"}},{"id":289,"question":"風險評估中，嚴重度應考慮之因素，下列何者有誤？","answer":"4","options":{"A":"可能受到傷害的人數 與程度","B":"環境衝擊","C":"生產停工損失","D":"事故發生機率"}},{"id":290,"question":"依我國歷年來工作場所重大職業災害統計資料顯示，以何種行業發 生勞工職災死亡人數最多？","answer":"1","options":{"A":"營造業","B":"製造業","C":"水電燃氣業","D":"餐旅業"}},{"id":291,"question":"依職業安全衛生法規定，雇主如未對勞工施以從事工作及預防災變 所必要之安全衛生教育訓練，經通知限期改善而不如期改善者，可 處新臺幣多少元之罰鍰？","answer":"2","options":{"A":"3萬元以上，6萬元以 下","B":"3萬元以上，15萬 元以下","C":"3萬元以上，30萬 元以下","D":"15萬元以上"}},{"id":292,"question":"ILO-OSH 2001係指下列何者？","answer":"3","options":{"A":"國際標準組織所頒布 的職業安全衛生管理 系統標準","B":"經濟部標準局所公 布的職業安全衛生 管理系統標準","C":"國際勞工組織所頒 布的職業安全衛生 管理系統指引","D":"國際驗證公司合作 訂定的職業安全衛 生管理驗證規範"}},{"id":293,"question":"依職業安全衛生設施規則規定，氫氣屬下列何者？","answer":"4","options":{"A":"爆炸性物質","B":"著火性物質","C":"易燃液體","D":"可燃性氣體"}},{"id":294,"question":"下列何種作業若控制設備不良，易使懷孕中胎兒智力受影響？","answer":"3","options":{"A":"石灰","B":"石綿","C":"鉛","D":"噪音"}},{"id":295,"question":"職業安全衛生管理系統所強調的P-D-C-A管理循環，其C代表意義為 何？","answer":"4","options":{"A":"Control","B":"Clean","C":"Clear","D":"Check"}},{"id":296,"question":"下列何者不是輸送帶常設之安全裝置？","answer":"3","options":{"A":"緊急停止開關","B":"頭尾輪護罩","C":"變速裝置","D":"啟動前之警報裝置"}},{"id":297,"question":"下列何者不屬於製程變更管理範疇？","answer":"3","options":{"A":"製程技術修改","B":"作業方法、程 tions":{"A":"可暫時卸下，記得下 次作業前再裝回","B":"務必堅固牢靠","C":"可暫時卸下，但作 業完畢後應立刻裝 回","D":"為確保安全，儘量 不要卸下"}},{"id":312,"question":"下列何者可做為線路過電流保護裝置？","answer":"4","options":{"A":"避雷針","B":"變壓器","C":"電阻器","D":"熔絲"}},{"id":313,"question":"下列何種物質置放於高溫或劇烈摩擦下易產生爆炸？","answer":"2","options":{"A":"還原性物質","B":"氧化性物質","C":"中性物質","D":"水溶液"}},{"id":314,"question":"依勞工作業環境監測實施辦法規定之場所，下列何者非屬應實施化 學性因子作業環境監測之作業場所？","answer":"3","options":{"A":"特定粉塵作業場所","B":"有機溶劑作業場所","C":"於鍋爐房從事工作 之作業場所","D":"隧道掘削之建設工 程之場所"}},{"id":315,"question":"下列何者較屬健康促進之相關活動？","answer":"1","options":{"A":"辦理登山郊遊","B":"請休假","C":"辦理業務競賽","D":"辦理業務檢討"}},{"id":316,"question":"下列何者不是推動臺灣職業安全衛生管理系統(TOSHMS)之主要目 的？","answer":"4","options":{"A":"強化組織自主管理","B":"持續改善安全衛生 管理績效","C":"降低職業災害","D":"維護環境生態"}},{"id":317,"question":"有關臺灣職業安全衛生管理系統指引中之「危害」定義，係指下列 何者？","answer":"3","options":{"A":"危及公共安全的潛在 原因","B":"可能造成財務損失 的原因","C":"對人體的健康造成 傷害或損害的潛在 因素","D":"危險性及有害性的 簡稱"}},{"id":318,"question":"工作場所有立即發生危險之虞時，雇主或工作場所負責人應優先採 取下列何種處置？","answer":"4","options":{"A":"報告檢查機構","B":"報告主管機關","C":"繼續作業","D":"下令停止作業，使 勞工退避至安全場 所"}},{"id":319,"question":"就安全管理而言，下列敘述何者錯誤？","answer":"4","options":{"A":"經常性交付承攬之作 業，宜事先依據危害 辨識及風險評估相關 程式，辨識出潛在之 危害及相關控制措施","B":"臨時性交付之承攬 作業，在正式施工 前亦應先完成危害 辨識及風險評估","C":"對於運輸作業之承 攬，除須評估在本 身廠(場)內之危害 及風險外，也應評 估運送至客戶期間 交通上之危害及風 險","D":"工作交付承攬後係 屬承攬人責任，原 事業單位事前不須 對該項工作實施危 害辨識"}},{"id":320,"question":"積載型移動式起重機(吊卡車)之吊臂其構造及材質所能吊升之最大荷 重為下列何者？","answer":"1","options":{"A":"吊升荷重","B":"積載荷重","C":"額定荷重","D":"設計荷重"}},{"id":321,"question":"下列何者非化學品災後復原階段應確認之事項？","answer":"4","options":{"A":"補充滅火藥劑","B":"檢討廣播器材之有 效性","C":"注意事故處理人員 之後續健康狀況","D":"迅速查出肇災人員 ，依規定處分"}},{"id":322,"question":"依職業安全衛生設施規則規定，雇主對於高度至少在幾公尺以上之 作業場所，有遇強風、大雨等惡劣氣候致勞工有墜落危險時，應使 勞工停止作業？","answer":"4","options":{"A":"1","B":"1.2","C":"1.5","D":"2"}},{"id":323,"question":"依職業安全衛生法之規定，下列何者為雇主不得使產後未滿一年之 女工從事之危險性或有害性工作？","answer":"4","options":{"A":"堆高機操作之工作","B":"有害輻射散布場所 之作業","C":"噪音作業","D":"鑿岩機及其他有顯 著振動之作業"}},{"id":324,"question":"職業安全衛生管理系統之主要架構運作，職業安全衛生活動的最高 指導原則為下列何者？","answe 0"}},{"id":339,"question":"消除或降低危害最優先考慮的方法，為下列何者？","answer":"2","options":{"A":"健康管理","B":"工程改善","C":"教育訓練","D":"使用防護具"}},{"id":340,"question":"雇主對於勞工投保幾個月以上，即可向勞保局申請支付特殊健康檢 查經費？","answer":"4","options":{"A":"1","B":"3","C":"6","D":"12"}},{"id":341,"question":"依職業災害勞工保護法之規定，下列何者非屬可向勞工保險局申請 之補助項目？","answer":"1","options":{"A":"危險津貼","B":"看護補助","C":"職業訓練生活津貼","D":"家屬補助"}},{"id":342,"question":"依職業安全衛生管理辦法規定，職業安全衛生委員會之勞工代表產 生方式，如事業單位無工會組織而有勞資會議者，應如何產生？","answer":"1","options":{"A":"由勞方代表推選之","B":"由資方代表推選之","C":"由會議主席裁示之","D":"由勞資雙方投票選 定之"}},{"id":343,"question":"依職業安全衛生設施規則規定，1萬伏特之電壓係屬下列何者？","answer":"2","options":{"A":"低壓","B":"高壓","C":"特高壓","D":"超高壓"}},{"id":344,"question":"公司如已設有勞安室及職業安全衛生人員，在臺灣職業安全衛生管 理系統指引中，可對應下列何者？","answer":"2","options":{"A":"能力與訓練","B":"組織設計","C":"管理審查","D":"控制措施"}},{"id":345,"question":"若有6名員工參與機械設備之維修工作，則最少需使用幾把鎖進行上 鎖作業？","answer":"4","options":{"A":"3","B":"4","C":"5","D":"6"}},{"id":346,"question":"實施職業災害調查，下列何者通常不列為直接原因？","answer":"4","options":{"A":"能量來源","B":"危害物","C":"高溫","D":"人為因素"}},{"id":347,"question":"依職業安全衛生設施規則規定，雇主對於扇風機之葉片，如有危害 勞工手指之虞時，應設下列何種安全設備？","answer":"4","options":{"A":"自動電擊防止裝置","B":"漏電斷路器","C":"防爆電氣設備","D":"護網或護圍"}},{"id":348,"question":"下列何者為機械設備安全防護之主要目的？","answer":"2","options":{"A":"增加機械設備之美觀","B":"避免機械動力與人 體接觸所造成之傷 害","C":"方便操作","D":"易於維護保養"}},{"id":349,"question":"沸騰液體膨脹蒸氣爆炸(BLEVE)屬下列何者？","answer":"3","options":{"A":"化學變化","B":"物理變化","C":"兼具物理與化學變 化","D":"核子反應"}},{"id":350,"question":"在降低風險的控制措施中，連鎖停機系統，屬於下列何者？","answer":"3","options":{"A":"消除","B":"取代","C":"工程控制措施","D":"管理控制措施"}}]},"A8":{"chapter":"甲業第8章","total_questions":50,"questions":[{"id":351,"question":"事業單位以其事業之全部或一部分交付承攬時，依職業安全衛生管 理辦法規定，該事業單位勞工人數之計算，下列敘述何者正確？","answer":"4","options":{"A":"僅以該事業單位之勞 工人數計算","B":"以原事業單位、承 攬人、再承攬人分 別所僱用之勞工人 數中，取最多者","C":"以原事業單位、承 攬人、再承攬人分 別所僱用之勞工人 數中，取最少者","D":"包含原事業單位、 承攬人、再承攬人 之勞工於同一期 間、同一工作場所 作業時之總人數"}},{"id":352,"question":"作業場所設置以動力吸引排出已發散之有害氣體或蒸氣之設備，為 下列何者？","answer":"1","options":{"A":"局部排氣裝置","B":"送風機","C":"密閉設備","D":"整體換氣裝置"}},{"id":353,"question":"下列何者為最優先應選擇之風險控制措施？","answer":"1","options":{"A":"從源頭消除危害","B":"以低毒性取代高毒 性","C":"給勞工休息","D":"提供個人防護具"}},{"id":354,"question":"依職業安全衛生設施規則規定，為防止勞工有自粉碎機及混合機之 開口部分墜落之虞，雇主應有覆蓋、護圍、高度至少在幾公分以上 之圍柵等必要設備？","answer":"4","options":{"A":"30","B":"50","C":"75","D":"90"}},{"id":355,"question":"依職業安全衛生管理辦法規定，捲揚裝置於開始使用、拆卸、捲 揚、改裝或修理時，應實施下列何種檢查？","answer":"2","options":{"A":"竣工檢查","B":"重點檢查","C":"熔接檢查","D":"型式檢查"}},{"id":356,"question":"風險評估的嚴重度判斷時，嚴重骨折或致命傷害，屬於下列何種傷 害程度？","answer":"3","options":{"A":"輕傷害","B":"中度傷害","C":"重度傷害","D":"虛驚事故"}},{"id":357,"question":"依職業安全衛生設施規則規定，雇主對勞工於下列何種場所作業時 使用之交流電焊機，為防止感電，應有自動電擊防止裝置？","answer":"1","options":{"A":"良導體機器設備內之 狹小空間","B":"噪音場所","C":"鉛作業場所","D":"粉塵散布場所"}},{"id":358,"question":"下列何者屬職業安全衛生法所稱雇主之定義？","answer":"2","options":{"A":"勞工安全衛生部門主 管","B":"事業經營負責人","C":"廠長","D":"經理"}},{"id":359,"question":"事業單位以其事業之全部或一部分交付承攬時，依職業安全衛生管 理辦法規定，該事業單位勞工人數之計算，下列敘述何者正確？","answer":"4","options":{"A":"僅以該事業單位之勞 工人數計算","B":"以原事業單位、承 攬人、再承攬人之 勞工人數中，取最 多者","C":"以原事業單位、承 攬人、再承攬人之 勞工人數中，取最 少者","D":"包含原事業單位、 承攬人、再承攬人 之勞工於同一期 間、同一工作場所 作業時之總人數"}},{"id":360,"question":"工作安全分析的第二個程序為何？","answer":"2","options":{"A":"決定要分析的工作","B":"將工作分解成若干 步驟","C":"找出危害及可能發 生的事故","D":"尋求避免危害及可 能發生事故的方法"}},{"id":361,"question":"有關緊急狀況之分級，下列敘述何者有誤？","answer":"3","options":{"A":"應依事故之損害特性 及後果嚴重度，加以 分級","B":"應該依緊急狀況之 分級，規劃後續應 變處理程序與對策","C":"不論分級為何，緊 急應變指揮官都是 同一人","D":"大型災害自己無法 控制時，必須迅速 連絡外界支援"}},{"id":362,"question":"下列何者非高溫作業量測之綜合溫度熱指數溫度？","answer":"4","options":{"A":"輻射熱","B":"自然濕球溫度","C":"乾球溫度","D":"人體溫度"}},{"id":363,"question":"下列何者非屬勞工作業場所容許暴露濃度標準所使用之容許濃度標 準？","answer":"2","options":{"A":"8小時日時量平均容 許濃度","B":"半數致死濃度","C":"短時間時量平均容 許濃度","D":"最高容許濃度"}},{"id":364,"question":"依高壓氣體勞工安全規則規定，灌氣容器等應經常保持其溫度於攝 氏幾度以下？","answer":"3","options":{"A":"30","B":"35","C":"40","D":"45"}},{"id":365,"question":"依職業安全衛生管理辦法規定，在職業安全衛生法施行後，事業單 位置職業安全管理師或職業衛生管理師達2人以上者，其中至少1人 應為下列何者？","answer":"3","options":{"A":"職業安全衛生業務主 管","B":"職業安全管理師","C":"職業衛生管理師","D":"工業安全技師"}},{"id":366,"question":"下列何者較不屬電線絕緣劣化之可能原因？","answer":"3","options":{"A":"日曬","B":"高溫","C":"乾燥通風","D":"氧化作用"}},{"id":367,"question":"為安全起見，於室內行駛動力堆高機是否要開前燈？","answer":"1","options":{"A":"一定要","B":"有開室內燈就不用","C":"照度夠就不用","D":"不用"}},{"id":368,"question":"依職業安全衛生管理辦法規定，政府機關（構）應設之職業安全衛 生組織或人員，因其他法規限制，得在組織修編完成前，以報經中 央主管機關核定之下列何種文件替代之？A.職業災害防止計畫、B. 職業安全衛生管理計畫、C.職業安全衛生管理規章、D.自動檢查計","answer":"2","options":{"A":"AB","B":"BC","C":"CD","D":"AC"}},{"id":369,"question":"下列何者為可燃性氣體？","answer":"1","options":{"A":"氫","B":"乙醚","C":"苯","D":"汽油"}},{"id":370,"question":"下列何種物質引發的火災，不屬於A類火災？","answer":"4","options":{"A":"木製品","B":"橡膠","C":"紙","D":"瓦斯"}},{"id":371,"question":"有關緊急應變之作業流程及連絡體系，下列敘述何者有誤？","answer":"3","options":{"A":"應訂定事故通報流程 及緊急連絡電話一覽 表","B":"對法定應通報之事 項及內容應明訂","C":"對於已由廠內自行 處理完畢之事故可 不通報","D":"應有假日及夜間之 通報流程及連絡體 系"}},{"id":372,"question":"依職業安全衛生法規定，二個以上之事業單位分別出資共同承攬時 ，防止職業災害之雇主責任應由誰負責？","answer":"1","options":{"A":"此二事業單位互推一 人為代表人","B":"二事業單位一起負 責","C":"出資較多的事業單 位","D":"勞工人數較多的事 業單位"}},{"id":373,"question":"工作場所如發生死亡職業災害，下列何者非雇主應有之作為？","answer":"4","options":{"A":"必要急救","B":"必要搶救","C":"實施調查、分析","D":"馬上復原現場，並 加以隔離"}},{"id":374,"question":"勞工雖有堆高機操作人員證照，但未遵守工廠規定，於廠內擅自以 高速行駛堆高機而肇災，其災害之間接原因為下列何者？","answer":"2","options":{"A":"不安全設備","B":"不安全動作","C":"不安全環境","D":"天災"}},{"id":375,"question":"有關防爆電氣設備維護作業的注意事項，下列何者錯誤？","answer":"1","options":{"A":"設備運轉中進行維護 作業時，可直接打開 接線盒蓋與檢查窗口","B":"設備停止並進行維 護作業時，須確認 電路的安全性","C":"在易爆的環境中維 護時，應使用防爆 型之測量儀器","D":"不得任意拆解防爆 型電器設備"}},{"id":376,"question":"依職業安全衛生設施規則規定，有關對高壓氣體容器之儲存，下列 何者有誤？","answer":"1","options":{"A":"周圍2公尺內得放置 引火性物品","B":"盛裝和空容器應分 區放置","C":"可燃性氣體、有毒 性氣體及氧氣容器 應分開儲存","D":"禁止煙火接近"}},{"id":377,"question":"依危險性工作場所審查暨檢查辦法之規定，從事製造、處置、使用 危險物及有害物達規定數量者，應於使勞工作業前，向勞動檢查機 構申請下列何類危險性工作場所審查及檢查？","answer":"1","options":{"A":"甲","B":"乙","C":"丙","D":"丁"}},{"id":378,"question":"依職業安全衛生法規定，原事業單位與承攬人分別僱用勞工共同作 業時，有關工作場所負責人，應為下列何者？","answer":"2","options":{"A":"原事業單位之雇主","B":"由原事業單位指定 於工作場所代表雇 主從事管理、指揮 或監督勞工從事工 作之人","C":"共同作業工作場所 之承攬工程金額最 多之事業單位負責 人","D":"共同作業工作場所 所有承攬人共推之 安全衛生負責人"}},{"id":379,"question":"燃燒PVC電纜線時，會產生下列何種毒性氣體？","answer":"3","options":{"A":"醋酸","B":"氨氣","C":"氯化氫","D":"丙烯醛"}},{"id":380,"question":"美國工業安全專家韓立奇（H. W. Heinrich）曾就事故發生模式提出 骨牌理論（Domino theory），共有5張骨牌，其中最後一張骨牌為下 列何者？","answer":"4","options":{"A":"個人缺陷","B":"不安全行為或狀況","C":"災害","D":"傷害"}},{"id":381,"question":"有關臺灣職業安全衛生管理系統指引中之變更管理，下列何者為 非？","answer":"3","options":{"A":"事前應實施風險評估","B":"與變更有關人員均 須被告知或訓練","C":"僅限設備或材料等 硬體變更事項，才 需實施變更管理","D":"與變更有關文件均 須被檢討修正"}},{"id":382,"question":"依職業安全衛生設施規則規定，雇主對於堆高機之操作，不得超過 該機械所能承受之最大荷重，且其載運之貨物應保持穩固狀態，防 止下列何種事故？","answer":"3","options":{"A":"感電","B":"火災","C":"翻覆","D":"缺氧"}},{"id":383,"question":"雇主僱用勞工時，應實施一般體格檢查，下列何者為非規定之檢查 項目？","answer":"4","options":{"A":"既往病歷及作業經歷 之調查","B":"胸部X光(大片)攝 影檢查","C":"血色素及白血球數 檢查","D":"心電圖檢查"}},{"id":384,"question":"為防止壓力槽內壓力過高而發生事故，應裝置下列何種安全設備？","answer":"2","options":{"A":"反撥裝置","B":"釋壓閥","C":"制動裝置","D":"光電開關"}},{"id":385,"question":"職業災害統計中，對於輕傷害定義，係指損失工作日數為下列何","answer":"1","options":{"A":"未滿1日","B":"未滿2日","C":"未滿3日","D":"未滿4日"}},{"id":386,"question":"有關採購之安全衛生規格擬訂，下列何者有誤？","answer":"3","options":{"A":"安全衛生規格制訂應 考量法規及國家標準 之要求","B":"應先經由危害辨識 及風險評估之結果 ，鑑別出關鍵性項 目","C":"安全衛生規格為本 公司採購時之內部 規定，如法規有異 動時，不需配合檢 討更新","D":"請購單位不清楚相 關安全衛生規範時 ，應主動尋求工安 部門、供應商或外 界專業機構之協助"}},{"id":387,"question":"風險評估下列何者錯誤？","answer":"3","options":{"A":"需考量危害後果的嚴 重度","B":"需考量現有法規和 相關指引","C":"無需考量周遭居民","D":"需考量風險控制的 績效"}},{"id":388,"question":"依勞工作業環境監測實施辦法之定義，指雇主使勞工每日作業時間 在1小時以內者，為下列何者？","answer":"2","options":{"A":"彈性作業","B":"作業時間短暫","C":"非常態作業","D":"非例行性作業"}},{"id":389,"question":"勞工進入儲槽後因墜落死亡，在職業災害調查分析時，未施以從事 工作及預防災變所必要之安全衛生教育及訓練屬下列何種原因？","answer":"3","options":{"A":"直接原因","B":"間接原因","C":"基本原因","D":"長期原因"}},{"id":390,"question":"依職業安全衛生管理辦法規定，職業安全衛生管理計畫應由下列何 者擬訂？","answer":"4","options":{"A":"業務部門主管","B":"作業勞工","C":"人事人員","D":"雇主"}},{"id":391,"question":"下列何者非臺灣職業安全衛生管理系統指引所強調之主要項目？","answer":"3","options":{"A":"員工參與","B":"承攬管理","C":"環境影響評估","D":"採購管理"}},{"id":392,"question":"依危害性化學品標示及通識規則之規定，禁水性物質之危害圖式符 號為何？" "C":"加熱","D":"冷卻"}},{"id":407,"question":"電流流經人體時，下列何者不是影響感電傷害嚴重度之直接因素？","answer":"3","options":{"A":"流經身體的電流量之 大小","B":"電流流經身體之路 徑","C":"人體之身高","D":"身體之電阻"}},{"id":408,"question":"依職業安全衛生管理辦法之規定，局部排氣裝置或除塵裝置於開始 使用、拆卸、改裝或修理時，應實施何種檢查？","answer":"2","options":{"A":"定期檢查","B":"重點檢查","C":"竣工檢查","D":"熔接檢查"}},{"id":409,"question":"下列何種氣體可能引起分解爆炸？","answer":"1","options":{"A":"乙炔","B":"氫","C":"氧","D":"氯"}},{"id":410,"question":"進行高度2公尺以上之開口作業時，下列墜落災害預防措施何者不正 確？","answer":"4","options":{"A":"規劃施工通道及上下 設備","B":"施作防護設施","C":"按標準作業流程施 作","D":"於開口邊緣架設繩 索做為護欄"}},{"id":411,"question":"若已知某危害之嚴重度，則其可能性越高，風險將如何變化？","answer":"1","options":{"A":"越高","B":"越低","C":"不變","D":"都有可能"}},{"id":412,"question":"指定醫療機構來廠內辦理勞工健康檢查時，該機構應有相關醫事人 員在現場執行業務，但可不包括下列何者？","answer":"2","options":{"A":"醫事放射師","B":"牙醫師","C":"醫事檢驗師","D":"護理人員"}},{"id":413,"question":"在建立安全衛生工作環境時，下列何者較屬於組織管理層面？","answer":"2","options":{"A":"工作姿勢","B":"領導風格","C":"預防注射","D":"採購管理"}},{"id":414,"question":"靜電電荷累積後易產生電弧放熱，下列何者非為消除靜電電荷累積 的方法？","answer":"3","options":{"A":"以導體接地","B":"提高靜電環境之濕 度","C":"隔離產生靜電之設 備","D":"裝置靜電消除器"}},{"id":415,"question":"依職業災害勞工保護法規定，政府應建立工殤紀念碑，訂定每年何 日為工殤日？","answer":"1","options":{"A":"4月28日","B":"5月1日","C":"8月23日","D":"9月1日"}},{"id":416,"question":"依職業安全衛生法之規定，下列何者為雇主不得使妊娠中之女性勞 工從事之危險性或有害性工作？","answer":"4","options":{"A":"文書作業","B":"噪音作業","C":"電子零件裝配作業","D":"起重機運轉工作"}},{"id":417,"question":"有關臺灣職業安全衛生管理系統的特色，下列何者有誤？","answer":"4","options":{"A":"可與ISO9001、 ISO14001相容","B":"由300人以上高風 險事業單位優先推","C":"政府並未強制事業 單位通過驗證","D":"內容與 OHSAS18001完全"}},{"id":418,"question":"勞工A進入人孔後突然缺氧昏倒，勞工B見狀迅速進入救人，較有可 能發生下列何種結果？","answer":"2","options":{"A":"搶救成功","B":"勞工B也昏倒，甚 至死亡","C":"徒勞無功，勞工B 自行返回","D":"勞工B自覺不適而 自行返回"}},{"id":419,"question":"依職業安全衛生法施行細則規定，下列何者非屬符合中央主管機關 所定一定容量以上之「具有危險性之設備」？","answer":"4","options":{"A":"鍋爐","B":"高壓氣體特定設備","C":"高壓氣體容器","D":"固定式起重機"}},{"id":420,"question":"事業單位對承攬人有告知危害因素之義務，下列何種告知方式不符 合此項規定？","answer":"3","options":{"A":"合約中就作業環境危 害列舉具體防範措施","B":"就分項工程之作業 危害及應採取措施 以書面具體告知","C":"僅於合約中載述 「應依職業安全衛 生法規定辦理」","D":"作業前以協議紀錄 記載具體告知事項"}},{"id":421,"question":"進入儲槽等局限空間作業，為避免缺氧危害，應確認其內部空氣中 氧氣濃度大於多少百分比？","answer":"3","options":{"A":"12","B":"16","C":"18","D":"21"}},{"id":422,"question":"下列何者屬於製程變更管理範疇？","answer":"2","options":{"A":"差勤辦法之修改","B":"作業方法、程式修 改","C":"人員輪調","D":"增資"}},{"id":423,"question":"依勞工作業環境監測實施辦法之定義，指正常作業以外之作業，其 作業期間不超過3個月，且1年內不再重複者，為下列何者？","answer":"1","options":{"A":"臨時性作業","B":"異常作業","C":"常態性作業","D":"非例行性作業"}},{"id":424,"question":"依機械設備器具安全標準規定，衝壓機械緊急停止裝置之動作用按 鈕，應符合下列何者？","answer":"2","options":{"A":"紅色且為凹入型","B":"紅色且為凸出型","C":"綠色且為凹入型","D":"綠色且為凸出型"}},{"id":425,"question":"下列敘述何者正確？","answer":"3","options":{"A":"電器之接地線可接於 天然氣鋼管上","B":"電動手工具無須接 地","C":"接地是避免感電危 害的有效方法","D":"無熔絲開關亦可避 免遭受感電危害"}},{"id":426,"question":"常溫水瞬間接受極大的能量，由液態迅速轉變為蒸汽，造成爆炸現 象，屬於下列何者？","answer":"4","options":{"A":"氣相爆炸","B":"分解爆炸","C":"化學性爆炸","D":"物理性爆炸"}},{"id":427,"question":"下列何者為臺灣職業安全衛生管理系統之簡稱？","answer":"4","options":{"A":"OHSAS 18001","B":"VPP","C":"TS","D":"TOSHMS"}},{"id":428,"question":"對於變更管理，下列何者非必要之採行措施？","answer":"1","options":{"A":"採取矯正措施","B":"實施風險評估","C":"有關人員應被告知","D":"有關文件資料應一 併檢討修正"}},{"id":429,"question":"某家工廠對內部人員異動、導入新製程、新作業程序時，均會重新 評估其對職業安全衛生管理產生的影響，並採取適當的預防措施， 則該項管理措施稱為下列何者？","answer":"4","options":{"A":"採購管理","B":"承攬管理","C":"自動檢查","D":"變更管理"}},{"id":430,"question":"依勞動檢查法施行細則規定，下列何者係指每百萬工時之失能傷害 總損失日數？","answer":"2","options":{"A":"傷害頻率","B":"職業災害嚴重率","C":"失能傷害千人率","D":"事故率"}},{"id":431,"question":"不安全動作為造成災害的何種原因？","answer":"2","options":{"A":"直接原因","B":"間接原因","C":"基本原因","D":"長期原因"}},{"id":432,"question":"下列何者不屬於物理性危害？","answer":"1","options":{"A":"粉塵","B":"高溫","C":"輻射","D":"噪音"}},{"id":433,"question":"依職業安全衛生管理辦法規定，有關職業安全衛生業務主管，雇主 應自該事業單位之何者選任？","answer":"3","options":{"A":"僅可由人資或資安部 門主管選任","B":"僅可由辦理職業安 全衛生事務者選任","C":"可由相關主管或辦 理職業安全衛生事 務者選任","D":"可由辦理職業安全 衛生或人資事務者 選任"}},{"id":434,"question":"職業安全衛生管理系統所強調的P-D-C-A管理循環，其D代表意義為 何？","answer":"4","options":{"A":"Design","B":"Danger","C":"Defence","D":"Do"}},{"id":435,"question":"為執行職業安全衛生管理系統的績效監督與量測，被動指標通常會 選用下列何者？","answer":"3","options":{"A":"教育訓練人數","B":"安衛提案件數","C":"職業傷病統計資料","D":"機械設備自動檢查 次數"}},{"id":436,"question":"依職業安全衛生設施規則規定，110伏特之電壓係屬下列何者？","answer":"1","options":{"A":"低壓","B":"高壓","C":"特高壓","D":"超高壓"}},{"id":437,"question":"依職業安全衛生設施規則規定，升降搬器及升降路出入口之任一門 被開啟時，升降機應具備下列何種安全連鎖作用？","answer":"4","options":{"A":"設警告標示","B":"門自動關閉","C":"發出警報","D":"停止上下"}},{"id":438,"question":"依職業安全衛生設施規則規定，雇主對於升降機之升降路各樓出入 口門，應有連鎖裝置，使搬器地板與樓板相差幾公分以上時，升降 路出入口門不能開啟之？","answer":"4","options":{"A":"1","B":"2","C":"4","D":"7.5"}},{"id":439,"question":"家庭常用的桶裝液化石油氣，其成分主要為下列何者？","answer":"2","options":{"A":"甲烷、乙烷","B":"丙烷、丁烷","C":"乙炔","D":"乙烯、丙烯"}},{"id":440,"question":"FTA為下列何種評估方法之縮寫？","answer":"3","options":{"A":"初步危害分析","B":"危害及可操作性分 析","C":"故障樹分析","D":"失誤模式與影響分 析"}},{"id":441,"question":"有關事業單位推動職業安全衛生管理系統可能帶來的好處，下列何 者有誤？","answer":"2","options":{"A":"降低工作場所職災事 故","B":"增加客戶對產品品 質的抱怨","C":"減少不必要之災害 善後支出","D":"避免事故造成經營 中斷"}},{"id":442,"question":"輪班作業係針對下列何類暴露要件進行控制？","answer":"3","options":{"A":"污染源","B":"輸送途徑","C":"接受者","D":"監督者"}},{"id":443,"question":"依職業安全衛生設施規則規定，雇主對於機械之原動機、轉軸、齒 輪、傳動輪、傳動帶等有危害勞工之虞之部分，為防止機械夾捲危 害，應設下列何種安全裝置？","answer":"2","options":{"A":"漏電斷路器","B":"護罩、護圍","C":"雙手操作式安全裝 置","D":"防滑舌片"}},{"id":444,"question":"依美國工業安全專家韓立奇（H. W. Heinrich）之事故統計分析結果 ，勞工發生事故之原因，大多是屬於下列何者？","answer":"2","options":{"A":"天災","B":"不安全行為","C":"不可避免的","D":"原因不明"}},{"id":445,"question":"對於具有氰化物或硫化物之廢水，應嚴格管制不得與下列何種物質 混合，以避免產生有害氣體？","answer":"2","options":{"A":"鹼液","B":"酸液","C":"水","D":"中性有機溶劑"}},{"id":446,"question":"下列何者非意外災害發生的基本原因？","answer":"1","options":{"A":"未提供安全設備","B":"危害認知不足","C":"承攬商管理不良","D":"安全衛生管理不善"}},{"id":447,"question":"依職業安全衛生設施規則規定，高壓氣體容器外表顏色得否變更？","answer":"1","options":{"A":"不得","B":"得","C":"可部分變更","D":"未有規定"}},{"id":448,"question":"下列何種方法不能有效防止捲胴捲夾危害？","answer":"1","options":{"A":"裝設接地線","B":"使用摩擦輪或惰輪","C":"設置護圍","D":"設置防護條，以隔 離捲夾點"}},{"id":449,"question":"灌裝每平方公分150公斤之高壓氫氣於鋼瓶時，如灌裝速率過快，易 產生下列何種現象？","answer":"2","options":{"A":"等溫壓縮","B":"絕熱壓縮","C":"鋼瓶震動","D":"鋼瓶洩壓裝置作動 而發生爆炸"}},{"id":450,"question":"距某機械4公尺處測得噪音為90分貝，若另有一噪音量相同之機械併 置一起，於原測量處測量噪音量約為多少分貝？","answer":"2","options":{"A":"90","B":"93","C":"95","D":"120"}}]},"A10":{"chapter":"甲業第10章","total_questions":50,"questions":[{"id":451,"question":"以工安的角度，下列何者較重要？","answer":"1","options":{"A":"人命","B":"產能","C":"績效","D":"服務"}},{"id":452,"question":"關於危害辨識之敘述，下列何者正確？","answer":"2","options":{"A":"無須參考作業環境測 定及監測之結果。","B":"對於執行危害辨識 及風險評估之人員 應給予必要教育訓 練","C":"不應尋求外界專業 機構的協助","D":"無須考量以往事故 之經歷"}},{"id":453,"question":"身體質量指數(BMI)之計算公式中，分子為下列何者？","answer":"3","options":{"A":"身高","B":"身高之平方","C":"體重","D":"體重之平方"}},{"id":454,"question":"依職業安全衛生設施規則規定，雇主設置之固定梯子，梯子之頂端 至少應突出板面幾公分以上？","answer":"4","options":{"A":"10","B":"20","C":"30","D":"60"}},{"id":455,"question":"依職業安全衛生管理辦法規定，第一類事業勞工人數在300人以上之 事業單位， 應依事業單位之潛在風險，訂定緊急狀況預防、準備及 應變之計畫，並定期實施演練。其執行紀錄，應至少保存多少年？","answer":"2","options":{"A":"2","B":"3","C":"5","D":"10"}},{"id":456,"question":"對於感電災害之緊急應變，下列何者應最優先進行？","answer":"1","options":{"A":"設法切斷電源","B":"CPR","C":"通報","D":"搶救"}},{"id":457,"question":"依機械設備器具安全標準規定，下列何種裝置係指衝剪機械發生危 險或異常時，以人為操作而使滑塊等動作緊急停止之裝置？","answer":"1","options":{"A":"緊急停止裝置","B":"感應式安全裝置","C":"可動式接觸預防裝 置","D":"護圍、護罩"}},{"id":458,"question":"Preliminary hazard analysis為下列何種評估方法？","answer":"1","options":{"A":"初步危害分析","B":"危害及可操作性分 析","C":"故障樹分析","D":"失誤模式與影響分 析"}},{"id":459,"question":"下列何者係指送訊者將語言、符號等訊息，經由適當的表達方式， 使收訊者表現出預期反應的一種歷程？","answer":"2","options":{"A":"組織","B":"溝通","C":"用人","D":"控制"}},{"id":460,"question":"勞工進入10公尺深人孔後因缺氧而死亡，在職業災害調查分析時， 未先測定氧氣濃度屬下列何種原因？","answer":"2","options":{"A":"直接原因","B":"間接原因","C":"基本原因","D":"根本原因"}},{"id":461,"question":"在衝床作業時，以手工具代替人手伸進危險區送取料件，這種安全 作業方式屬下列何者？","answer":"1","options":{"A":"遠離危險","B":"危險預警","C":"安全確認","D":"消除危險"}},{"id":462,"question":"有關實施控制方法之敘述，下列何者正確？","answer":"4","options":{"A":"既訂定控制方法，就 無須再發展新之作業 程序，以確保有效實 施","B":"輕微變動無須告知 員工，以避免訓練 成本增加","C":"除管理者外，應全 員訓練","D":"應維持管制方法之 必要條件，以確保 該方法的持續有效 性"}},{"id":463,"question":"依職業安全衛生設施規則規定，於時量平均音壓級為90 dBA之噪音 環境下，勞工一天容許暴露時間至多幾小時？","answer":"3","options":{"A":"2","B":"4","C":"8","D":"10"}},{"id":464,"question":"於特殊情況使用輔助手工具，以代替人手伸進危險區送取料件，這 種操作方式屬於下列何者？","answer":"1","options":{"A":"遠離危險","B":"危險預警","C":"安全確認","D":"消除危險"}},{"id":465,"question":"有關危害辨識之考量，下列何者有誤？","answer":"3","options":{"A":"考量工作環境之規模 與特性等因素","B":"考量作業危害之規 模與特性等因素","C":"考量企業之營運模 式與國際佈局","D":"應明確規範執行及 檢討修正之時機"}},{"id":466,"question":"一般而言，失能傷害頻率(FR)與失能傷害嚴重率(SR)之數值相較為","answer":"2","options":{"A":"前者較大","B":"後者較大","C":"相同","D":"不一定何者較大"}},{"id":467,"question":"推行職場健康促進最主要目的為下列何者？","answer":"3","options":{"A":"使勞工多工作","B":"使產量增加","C":"使勞工身心處最適 宜狀態","D":"調合勞工與主管關 係"}},{"id":468,"question":"衛生單位推動之民眾版簡易CPR，與正式CPR相較，主要省略下列何 者？","answer":"1","options":{"A":"人工呼吸","B":"胸部按壓","C":"檢查意識","D":"求救"}},{"id":469,"question":"當風險已被降低至可被容忍的程度，又稱之為何？","answer":"3","options":{"A":"低度風險","B":"中度風險","C":"可接受風險","D":"高度風險"}},{"id":470,"question":"機械設備安全防護之主要的目的為何？","answer":"2","options":{"A":"預防操作者生病","B":"避免機械動力與人 體接觸所造成之傷 害","C":"避免機械損壞","D":"易於維護保養"}},{"id":471,"question":"一般而言，下列無機鉻何者毒性較高？","answer":"4","options":{"A":"一價鉻","B":"三價鉻","C":"四價鉻","D":"六價鉻"}},{"id":472,"question":"為瞭解作業環境中有害因子之強度，並建立勞工暴露資料，應採下 列何者措施？","answer":"3","options":{"A":"工程改善","B":"低毒性取代高毒性","C":"作業環境監測","D":"有害物標示"}},{"id":473,"question":"依職業安全衛生管理辦法規定，雇主依規定實施之自動檢查，於發 現有異常時，應採取下列何種措施？","answer":"2","options":{"A":"竄改自動檢查紀錄","B":"立即檢修及採取必 要措施","C":"可忽略而繼續工作","D":"無需採取任何措施"}},{"id":474,"question":"依勞工作業場所容許暴露標準之規定，二氧化碳之容許濃度為多少 ppm？","answer":"4","options":{"A":"5","B":"50","C":"500","D":"5000"}},{"id":475,"question":"下列何種法規之制定與修正，無需經立法院三讀通過？","answer":"2","options":{"A":"職業安全衛生法","B":"職業安全衛生設施 規則","C":"勞動基準法","D":"職業災害勞工保護 法"}},{"id":476,"question":"對於具有耳疾之噪音作業勞工，較適合佩戴下列何種耳部防護具？","answer":"2","options":{"A":"耳塞","B":"耳罩","C":"勿須佩戴防護具","D":"耳塞或耳罩皆可"}},{"id":477,"question":"危害辨識及風險評估結果應予記錄存檔，其紀錄可不顯示下列何 者？","answer":"3","options":{"A":"危害類型、危害原因 及後果","B":"風險程度或等級","C":"主管機關名稱","D":"既有控制措施"}},{"id":478,"question":"依職業安全衛生法規定，事業單位與承攬人、再承攬人分別僱用勞 工共同作業時，為防止職業災害，原事業單位應採取之必要措施， 下列敘述何者錯誤？","answer":"3","options":{"A":"工作之連繫與調整","B":"工作場所之巡視","C":"指定承攬工程金額 最多之承攬人為工 作場所負責人","D":"相關承攬事業間之 安全衛生教育之指 導及協助"}},{"id":479,"question":"以不適當的姿勢做重複性的動作，屬下列何種危害因子？","answer":"4","options":{"A":"化學性","B":"物理性","C":"生物性","D":"人因工程"}},{"id":480,"question":"依勞動基準法規定，勞工遭受職業災害後，雇主之職業災害補償原 則為下列何者？","answer":"1","options":{"A":"不論雇主有無過失責 任，均應予以補償","B":"視雇主有無過失決 定補償與否","C":"視勞工有無過失決 定補償與否","D":"視勞工是否提出要 求決定補償與否"}},{"id":481,"question":"下列何種作業具有粉塵及非游離輻射危害？","answer":"4","options":{"A":"有機溶劑作業","B":"鉛作業","C":"特定化學物質作業","D":"電焊作業"}},{"id":482,"question":"下列何者不是造紙廠於勞工進入散漿槽清掃作業時，較易發生之危 害？","answer":"4","options":{"A":"中毒","B":"被夾、被捲","C":"缺氧","D":"倒塌"}},{"id":483,"question":"依職業安全衛生設施規則規定，雇主對於在高度至少幾公尺以上之 處所進行作業，勞工有墜落之虞者，應以架設施工架或其他方法設 置工作台？","answer":"4","options":{"A":"1","B":"1.2","C":"1.5","D":"2"}},{"id":484,"question":"依職業安全衛生法規定，下列何者為受僱從事工作獲致工資者？","answer":"1","options":{"A":"勞工","B":"雇主","C":"事業單位","D":"承攬人"}},{"id":485,"question":"依職業安全衛生教育訓練規則規定，雇主對下列何種操作人員無須 使其接受特殊作業安全衛生教育訓練？","answer":"3","options":{"A":"小型鍋爐操作人員","B":"荷重在1公噸以上 之堆高機操作人員","C":"電焊機操作人員","D":"使用起重機具從事 吊掛作業人員"}},{"id":486,"question":"組織中之安全溝通與協調方式，下列何者不是有效的溝通原則？","answer":"4","options":{"A":"就事論事不攻訐別人","B":"心胸開放不預設立 場","C":"設身處地運用同理 心","D":"以統御命令式口氣 指導"}},{"id":487,"question":"依機械設備器具安全標準規定，下列何種裝置係指衝剪機械發生危 險或異常時，以人為操作而使滑塊等動作緊急停止之裝置？","answer":"1","options":{"A":"緊急停止裝置","B":"感應式安全裝置","C":"可動式接觸預防裝 置","D":"護圍、護罩"}},{"id":488,"question":"下列何者得認定為承攬關係？","answer":"4","options":{"A":"事業單位將部份工作 交由他人施工，本身 仍具指揮、監督、統 籌規劃之權者","B":"事業單位將設備之 檢修以點工方式請 人施作並由其指揮","C":"事業單位購買原料 約定賣方將原料放 置倉庫一處","D":"事業單位將外牆粉 刷請人施作僅約定 5日後要完成，工 作期間並未加以干 涉"}},{"id":489,"question":"依機械設備器具安全標準規定，衝壓機械緊急停止裝置之動作用按 鈕應符合下列何者？","answer":"4","options":{"A":"綠色且為凹入型","B":"綠色且為凸出型","C":"紅色且為凹入型","D":"紅色且為凸出型"}},{"id":490,"question":"對於勞工不慎吸入煙囪廢氣造成昏迷且皮膚顏色變桃紅色，有可能 屬下列何種氣體中毒？","answer":"2","options":{"A":"甲烷","B":"一氧化碳","C":"氨","D":"硫化氫"}},{"id":491,"question":"變電設備所引起之火災，不適用下列何種滅火劑？","answer":"1","options":{"A":"泡沫","B":"二氧化碳","C":"ABC類乾粉","D":"BC類乾粉"}},{"id":492,"question":"原事業單位將工作交付承攬時，對該項工作之危害辨識是否具有責 任？","answer":"1","options":{"A":"是","B":"否","C":"依協議約定","D":"由原事業單位決定"}},{"id":493,"question":"依職業安全衛生法規定，下列何種檢查發現應僱勞工不適於從事某 種工作時，不得僱用其從事該項工作？","answer":"1","options":{"A":"體格檢查","B":"一般健康檢查","C":"特殊健康檢查","D":"特殊追蹤健康檢查"}},{"id":494,"question":"依職業安全衛生管理辦法之規定，局部排氣裝置或除塵裝置於開始 使用、拆卸、改裝或修理時，應實施何種檢查？","answer":"3","options":{"A":"竣工檢查","B":"定期檢查","C":"重點檢查","D":"型式檢查"}},{"id":495,"question":"依職業安全衛生管理辦法規定，下列何者應設置直接隸屬雇主之一 級職業安全衛生管理單位？","answer":"3","options":{"A":"僱用勞工人數在100 人以上之汽車租賃業","B":"僱用勞工人數在 300人以上之金融 及保險業","C":"僱用勞工人數在 100人以上之金屬 基本工業","D":"僱用勞工人數在 300人以上之廣播 及電視業"}},{"id":496,"question":"依職業安全衛生管理辦法規定，第一類事業其人數至少應超過多少 人以上時，所設置之職業安全衛生管理人員應為專職？","answer":"2","options":{"A":"30","B":"100","C":"200","D":"300"}},{"id":497,"question":"健康飲食為促進健康之要件，下列何者為較適當之鈣質攝取來源？","answer":"2","options":{"A":"菸草","B":"小魚乾","C":"果汁","D":"檳榔"}},{"id":498,"question":"依職業安全衛生設施規則規定，為防止機械夾捲傷害，雇主對於離 心機械，應裝置護蓋及下列何種安全裝置？","answer":"1","options":{"A":"連鎖裝置","B":"雙手操作式安全裝 置","C":"防爆電氣設備","D":"絕緣裝置"}},{"id":499,"question":"下列何者非意外災害發生的間接原因？","answer":"4","options":{"A":"未提供安全設備","B":"未提供安全護具","C":"未依標準作業程序 操作","D":"安全衛生管理不善"}},{"id":500,"question":"下列有關危害告知事項，何者正確？","answer":"4","options":{"A":"可以口頭方式告知","B":"承攬人就其承攬之 全部或一部分交付 再承攬時，承攬人 無須告知再承攬人","C":"得以承攬人勞工之 安全承諾書替代危 害告知","D":"應以書面或召開協 商會議並作成紀錄 為之"}}]},"A11":{"chapter":"甲業第11章","total_questions":50,"questions":[{"id":501,"question":"假設同時暴露於鉛及砷所造成之危害，與分別暴露後各自所造成之 危害總和相同，此現象係屬於下列何者？","answer":"1","options":{"A":"相加作用","B":"協同作用","C":"相減作用","D":"拮抗作用"}},{"id":502,"question":"依職業安全衛生管理辦法規定，針對第二類事業的事業單位，對於 推動職業安全衛生管理系統，下列何者正確？","answer":"3","options":{"A":"第一類事業仍須推行","B":"僅留存紀錄備查即 可","C":"暫不強制導入系統 化管理","D":"應申請職業安全衛 生管理系統驗證"}},{"id":503,"question":"使易燃液體之蒸汽、可燃性氣體著火所需最低能量，係指下列何","answer":"3","options":{"A":"著火點","B":"閃火點","C":"最小著火能","D":"引火點"}},{"id":504,"question":"依勞工健康保護規則規定，年齡45歲勞工，應每幾年實施一般健康 檢查？","answer":"3","options":{"A":"1","B":"2","C":"3","D":"4"}},{"id":505,"question":"依職業安全衛生設施規則規定，雇主對勞工於鐵皮屋頂從事作業時 ，應設置適當強度，且寬度在多少公分以上之踏板？","answer":"3","options":{"A":"10","B":"20","C":"30","D":"40"}},{"id":506,"question":"依危險性工作場所審查暨檢查辦法規定，事業單位對經檢查機構審 查合格之乙類危險性工作場所，應至少每幾年重新評估一次？","answer":"2","options":{"A":"1","B":"5","C":"10","D":"15"}},{"id":507,"question":"對於背負式安全帶之使用，下列何者不正確？","answer":"4","options":{"A":"搭配使用雙掛鉤之安 全掛繩","B":"使用具緩衝包之安 全掛繩時，應考量 人員作業位置與地 面間之淨空間","C":"安全帶之繫索或安 全母索應予保護， 避免受切斷或磨損","D":"安全帶應鉤掛於交 叉拉桿上，以確保 人員安全"}},{"id":508,"question":"滅火方式採用降低燃燒溫度的方法，該方法稱為下列何者？","answer":"3","options":{"A":"隔離法","B":"窒息法","C":"冷卻法","D":"抑制法"}},{"id":509,"question":"依職業安全衛生管理辦法規定，雇主對機械、設備實施定期檢查、 重點檢查或作業檢點，應訂定下列何種計畫？","answer":"3","options":{"A":"災害防止計畫","B":"機械設備維修計畫","C":"自動檢查計畫","D":"損失防阻計畫"}},{"id":510,"question":"下列何種法規之立法意旨，在於防止職業災害，保障工作者之安全 與健康？","answer":"2","options":{"A":"勞動基準法","B":"職業安全衛生法","C":"勞工保險條例","D":"工會法"}},{"id":511,"question":"依職業災害勞工保護法施行細則規定，未加入勞工保險而遭遇死亡 職業災害之勞工，且雇主未依勞動基準法規定予以補償時，得比照 勞工保險條例之標準申請職業災害死亡補助，其申請補助之第一順 位為何？","answer":"1","options":{"A":"配偶及子女","B":"父母","C":"祖父母","D":"兄弟、姊妹"}},{"id":512,"question":"依職業安全衛生管理辦法規定，雇主實施自動檢查應訂定下列何種 計畫？","answer":"4","options":{"A":"緊急應變計畫","B":"職業災害防止計畫","C":"自主管理計畫","D":"自動檢查計畫"}},{"id":513,"question":"下列何者之目的為灌輸及訓練勞工正確之安全衛生觀念及作業程序 ，以防止勞工因不安全行為而導致職業災害？","answer":"1","options":{"A":"職業安全衛生教育訓 練","B":"危險性機械設備之 定期檢查","C":"機械器具之型式檢 定","D":"作業環境測定"}},{"id":514,"question":"依高架作業勞工保護措施標準規定，高度在2公尺以上未滿5公尺者 ，每連續作業2小時，應給予作業勞工至少幾分鐘的休息時間？","answer":"1","options":{"A":"20","B":"15","C":"10","D":"5"}},{"id":515,"question":"失能傷害嚴重率公式中之分子為下列何者？","answer":"2","options":{"A":"總經歷工時","B":"總損失日數","C":"失能日數","D":"傷害損失日數"}},{"id":516,"question":"依職業安全衛生法之規定，下列何者非屬「工作者」之定義？","answer":"2","options":{"A":"勞工","B":"承攬人","C":"自營作業者","D":"其他受工作場所負 責人指揮或監督從 事勞動之人員"}},{"id":517,"question":"依職業安全衛生設施規則規定，雇主架設之通道，在有墜落之虞之 場所，應置備高度多少公分以上之堅固扶手？","answer":"4","options":{"A":"50","B":"60","C":"70","D":"75"}},{"id":518,"question":"機器設置緊急按鈕之目的為何？","answer":"4","options":{"A":"降低噪音","B":"馬上啟動","C":"提高運轉速度","D":"緊急停止"}},{"id":519,"question":"職業災害發生之原因可分為直接原因、間接原因及基本原因，下列 何者係屬「基本原因」？","answer":"4","options":{"A":"能量","B":"不安全行為","C":"不安全狀況","D":"管理上的缺陷"}},{"id":520,"question":"依職業安全衛生管理辦法規定，雇主依規定實施之定期檢查表單， 下列何者非屬應記錄事項？","answer":"2","options":{"A":"實施檢查者之姓名","B":"部門主管","C":"檢查部分","D":"檢查方法"}},{"id":521,"question":"依臺灣職業安全衛生管理系統指引之規定，採取矯正措施的目的為 下列何者？","answer":"1","options":{"A":"預防事故再度發生","B":"處罰相關失職人員","C":"報告上級長官","D":"避免品質差異太大"}},{"id":522,"question":"依職業安全衛生管理辦法規定，對於僅需置職業安全衛生業務主管 ，而不需置職業安全管理師、職業衛生管理師及職業安全衛生管理 員的事業單位，則該業務主管之職責為何？","answer":"3","options":{"A":"督導安全衛生管理事 項","B":"協調及建議安全衛 生管理事項","C":"規劃及推動安全衛 生管理事項","D":"審議及主管安全衛 生管理事項"}},{"id":523,"question":"依危險性工作場所審查暨檢查辦法之規定，從事農藥原體合成之工 作場所，應於使勞工作業前，向勞動檢查機構申請何類危險性工作 場所審查及檢查？","answer":"2","options":{"A":"甲","B":"乙","C":"丙","D":"丁"}},{"id":524,"question":"金屬燻煙熱之主要症狀與下列何者類似？","answer":"1","options":{"A":"感冒","B":"手腕隧道症候群","C":"中暑","D":"鉛中毒"}},{"id":525,"question":"大部分易燃液體火災，無法以水滅火，主要原因為下列何者？","answer":"2","options":{"A":"燃燒速度快","B":"易燃物質密度較水 低，易懸浮水面上 ，擴散燃燒範圍","C":"易燃物質釋放熱值 高","D":"易燃液體易溶於水"}},{"id":526,"question":"依職業安全衛生設施規則規定，雇主對物料堆放應符合之規定中， 下列敘述何者錯誤？","answer":"1","options":{"A":"得超過堆放地最大安 全負荷","B":"不得影響照明","C":"不得妨礙機械設備 之操作","D":"不得阻礙交通或出 入口"}},{"id":527,"question":"下列何種職業災害類型導致之死亡率較高？","answer":"1","options":{"A":"墜落","B":"被夾、被捲","C":"感電","D":"火災、爆炸"}},{"id":528,"question":"勞工長期使用高錳成分焊條從事電焊作業，有可能造成下列何種職 業病？","answer":"3","options":{"A":"白指病","B":"皮膚病","C":"巴金森氏症","D":"熱衰竭"}},{"id":529,"question":"一般所謂吊車是屬於下列那種機械？","answer":"1","options":{"A":"起重機","B":"堆高機","C":"昇空車","D":"搬運車"}},{"id":530,"question":"對於噪音作業勞工是否有效佩戴防護具，可依下列何者瞭解成效？","answer":"4","options":{"A":"環境管理","B":"作業管理","C":"行政管理","D":"健康管理"}},{"id":531,"question":"風險評估結果對於風險無法完全去除時，應採取下列何種適當措 施？","answer":"4","options":{"A":"調高風險判定基準","B":"變換評估方法","C":"替換評估人員","D":"降低風險等級，並 控制其殘餘風險"}},{"id":532,"question":"考量降低風險之控制措施時，下列順序何者正確？A.工程控制B.管 理控制C.消除D.取代","answer":"2","options":{"A":"ABCD","B":"CDAB","C":"DCBA","D":"ACDB"}},{"id":533,"question":"關於勞工於高處作業，下列何者有誤？","answer":"3","options":{"A":"高度2公 作場所發生勞工死亡之職業災 害時，雇主應於多少小時內通報勞動檢查機構？","answer":"1","options":{"A":"8","B":"12","C":"24","D":"48"}},{"id":589,"question":"消除或降低危害最後考慮的方法，為下列何者？","answer":"4","options":{"A":"健康管理","B":"工程改善","C":"教育訓練","D":"使用個人防護具"}},{"id":590,"question":"事業單位建置職業安全衛生管理系統之流程中，下列何者非系統架 構建置期之工作？","answer":"4","options":{"A":"先期審查","B":"風險評估","C":"目標與方案","D":"緊急應變演練"}},{"id":591,"question":"吊運車架空移動起重機，其構造及材質所能吊升之最大荷重為下列 何者？","answer":"1","options":{"A":"吊升荷重","B":"積載荷重","C":"額定荷重","D":"設計荷重"}},{"id":592,"question":"電氣設備故障修理時，為防止事故發生，下列何者較不適當？","answer":"1","options":{"A":"確認電源維持開啟","B":"機械修理中要懸掛 標示牌","C":"確認電源開關是否 關閉","D":"非相關人員，禁止 操作"}},{"id":593,"question":"依職業安全衛生設施規則規定，雇主對於離心機械，應設置「使覆 蓋未完全關閉時無法啟動」之下列何種安全裝置？","answer":"3","options":{"A":"漏電斷路器","B":"緊急停止裝置","C":"連鎖裝置","D":"滑塊裝置"}},{"id":594,"question":"甲公司欲向外租賃堆高機時，為落實下列那項管理功能，其契約內 容應參考法令訂有防止職業災害之具體規範，並於使用前確認其符 合規定？","answer":"4","options":{"A":"施工管理","B":"變更管理","C":"承攬管理","D":"採購管理"}},{"id":595,"question":"對於勞工作業受熱超過綜合溫度熱指數規定時，應優先採取下列何 者措施？","answer":"2","options":{"A":"教育訓練","B":"工程改善","C":"作業檢點","D":"多喝水"}},{"id":596,"question":"依職業安全衛生法之規定，雇主不得使分娩後未滿一年之女性勞工 從事之危險性或有害性之工作，不包括下列何者？","answer":"4","options":{"A":"礦坑工作","B":"一定重量以上之重 物處理工作","C":"鑿岩機及其他有顯 著振動之工作","D":"堆高機操作"}},{"id":597,"question":"依職業安全衛生設施規則規定，雇主對於使用之合梯應符合之規定 中，下列敘述何者錯誤？","answer":"4","options":{"A":"具有堅固之構造","B":"應有安全之防滑梯 面","C":"兩梯腳間有金屬等 硬質繫材扣牢","D":"梯腳與地面之角度 應在85度以內"}},{"id":598,"question":"勞工未依職業安全衛生法規定接受健康檢查，得處新臺幣多少元以 下罰鍰？","answer":"1","options":{"A":"3,000","B":"1,000","C":"6,000","D":"不用罰"}},{"id":599,"question":"依職業安全衛生管理辦法規定，事業單位於僱用勞工人數至少多少 人以上之事業單位，應訂定職業安全衛生管理規章，要求各級主管 及管理、指揮、監督有關人員執行職業安全衛生管理事項？","answer":"2","options":{"A":"30","B":"100","C":"200","D":"300"}},{"id":600,"question":"下列何者不屬於固定式起重機之安全裝置？","answer":"4","options":{"A":"防脫落裝置","B":"過捲預防裝置","C":"過負荷警報裝置","D":"過熱預防裝置"}}]},"A13":{"chapter":"甲業第13章","total_questions":50,"questions":[{"id":601,"question":"依勞工作業環境監測實施辦法規定，坑內特定粉塵作業場所應多久 實施作業環境監測一次以上？","answer":"4","options":{"A":"每半個月","B":"每月","C":"每三個月","D":"每半年"}},{"id":602,"question":"在安全防護的原則中，安全護圍所提供的主要功能為下列何者？","answer":"3","options":{"A":"消除危險","B":"遠離危險","C":"隔離危害源","D":"危險預警"}},{"id":603,"question":"電流流經人體時，下列何者較不影響感電後果嚴重度？","answer":"3","options":{"A":"流經身體的電流量大 小","B":"電流流經身體之路 徑","C":"人體之膚色","D":"身體之電阻"}},{"id":604,"question":"雇主對勞工實施特殊健康檢查，其結果報告書不需要報請或副知事 業單位所在地之何種機關？","answer":"4","options":{"A":"勞工主管機關","B":"衛生主管機關","C":"勞動檢查機構","D":"衛生所"}},{"id":605,"question":"從事高架作業之安全注意事項，下列何者有誤？","answer":"1","options":{"A":"一定要2人以上共同 作業","B":"應減少工作時間","C":"戴用安全帽","D":"施工架務必堅固牢 靠"}},{"id":606,"question":"依職業安全衛生管理辦法規定，第二類事業勞工人數100人以上之事 業單位應執行之職業安全衛生事項，下列何者有誤？","answer":"4","options":{"A":"訂定職業安全衛生管 理計畫","B":"職業安全衛生管理 事項留存紀錄備查","C":"訂定職業安全衛生 管理規章","D":"申請績效認可"}},{"id":607,"question":"勞工於工作8小時之噪音暴露劑量＞200％，即表示其相當8小時日時 量平均音壓級超過多少分貝？","answer":"4","options":{"A":"80","B":"85","C":"90","D":"95"}},{"id":608,"question":"下列何者含纖維量較高，可促進腸道蠕動？","answer":"1","options":{"A":"高麗菜","B":"炸排骨","C":"泡麵","D":"滷雞翅"}},{"id":609,"question":"下列何種作業較具有紫外線危害？","answer":"4","options":{"A":"玻璃成型","B":"鍋爐房","C":"熔鐵","D":"電焊"}},{"id":610,"question":"在提舉重物時，為避免發生人因工程危害，應儘量利用人體之下列 何種部位？","answer":"2","options":{"A":"背部","B":"腿部","C":"腰部","D":"腹部"}},{"id":611,"question":"使用大量氮氣於製程作業時，應注意氮氣外洩而造成下列何種危","answer":"2","options":{"A":"中毒","B":"缺氧","C":"火災","D":"爆炸"}},{"id":612,"question":"勞工作業場所容許暴露標準之短時間時量平均容許濃度，為一般勞 工連續暴露在此濃度以下任何多少分鐘，不致有不可忍受之刺激、 慢性或不可逆之組織病變、麻醉昏暈作用、事故增加之傾向或工作 效率之降低者？","answer":"3","options":{"A":"5","B":"10","C":"15","D":"20"}},{"id":613,"question":"使用一般殺菌燈時，應特別注意下列何種危害？","answer":"1","options":{"A":"紫外線","B":"紅外線","C":"雷射","D":"射頻輻射"}},{"id":614,"question":"四氯化碳最可能循下列何種路徑進入人體？","answer":"2","options":{"A":"皮膚接觸","B":"呼吸","C":"口腔","D":"眼睛接觸"}},{"id":615,"question":"依危害性化學品標示及通識規則之規定，下列危害圖式及顏色，何 者正確？","answer":"3","options":{"A":"白底、黑色圖式符 號、紅框","B":"紅底、白色圖式符 號、黑框","C":"白底、紅色圖式符 號、黑框","D":"白底、黑色圖式符 號、黑框"}},{"id":616,"question":"依職業安全衛生設施規則規定，雇主對於高度在2公尺以上之工作場 所邊緣及開口部份，勞工有遭受墜落危險之虞者，應設有適當強度 之下列何種防護措施？","answer":"1","options":{"A":"圍欄、握把、覆蓋","B":"漏電斷路器","C":"防爆電氣設備","D":"安全閥"}},{"id":617,"question":"依職業安全衛生設施規則規定，500公斤以上物品，應以下列何種方 式搬運為宜？","answer":"1","options":{"A":"以機動車輛或其他機 械搬運","B":"以人力搬運","C":"以人力車輛搬運","D":"以手工具搬運"}},{"id":618,"question":"勞工因長期工作壓迫及重複性作業引起椎間盤突出，屬於下列何種 危害因子？","answer":"4","options":{"A":"物理性","B":"化學性","C":"生物性","D":"人因性"}},{"id":619,"question":"變電設備所引起之火災不適合用何種滅火劑？","answer":"1","options":{"A":"泡沫","B":"二氧化碳","C":"ABC類乾粉","D":"惰性氣體"}},{"id":620,"question":"依職業安全衛生設施規則規定，雇主對於高壓氣體容器之使用，下 列敘述何者錯誤？","answer":"3","options":{"A":"高壓氣體容器應標明 所裝氣體之品名，不 得任意灌裝或轉裝","B":"容器使用時應加固 定","C":"焊接時得在容器上 試焊","D":"確知容器之用途無 誤者，方得使用"}},{"id":621,"question":"依職業安全衛生設施規則規定，過氧化丁酮屬於下列何者？","answer":"1","options":{"A":"爆炸性物質","B":"著火性物質","C":"易燃液體","D":"可燃性氣體"}},{"id":622,"question":"事業單位應採取下列何種管理措施，使災害發生後得有效控制並減 少損失？","answer":"3","options":{"A":"風險評估","B":"變更管理","C":"緊急應變管理","D":"自動檢查"}},{"id":623,"question":"依職業安全衛生法施行細則規定，下列何者屬於「具有危險性之機 械」？","answer":"4","options":{"A":"空壓機","B":"堆高機","C":"鑽床","D":"吊籠"}},{"id":624,"question":"變更管理之所謂變更，通常不包括下列何者？","answer":"1","options":{"A":"商標變更","B":"製程變更","C":"材料變更","D":"設備變更"}},{"id":625,"question":"有人進入半密閉之污水槽工作而昏倒在槽中，下列措施何者最不適 當？","answer":"1","options":{"A":"立即徒手進入救人出 來，以求時效","B":"實施換氣","C":"戴妥空氣呼吸器再 下去救人","D":"打119電話求救"}},{"id":626,"question":"從事動力堆高機作業包含駕駛人員，最多可坐幾人？","answer":"1","options":{"A":"1","B":"2","C":"3","D":"4"}},{"id":627,"question":"依職業安全衛生設施規則規定，雇主對於可燃性高壓氣體之貯存， 下列敘述何者錯誤？","answer":"3","options":{"A":"容器應保持在攝氏40 度以下","B":"應安穩置放並加固 定","C":"可燃性氣體、有毒 性氣體及氧氣之鋼 瓶，應合併貯存","D":"貯存場所應禁止煙 火接近"}},{"id":628,"question":"某科技公司之職業安全衛生管理員，最近因家庭因素暫時無法執行 職務，依職業安全衛生管理辦法規定，下列敘述何者有誤？","answer":"3","options":{"A":"雇主應指定適當代理 人","B":"雇主應指定之代理 人，代理期間不得 超過3個月","C":"無須代理人，但必 須報當地主管機關 備查","D":"雇主可找職業安全 管理師暫時代理之"}},{"id":629,"question":"下列敘述中，何者不屬承攬關係之特徵？","answer":"4","options":{"A":"承攬人具備「雇主之 性質」","B":"工作指派不受他人 所約束","C":"有獨立營運之自主 權","D":"只負責出工，不負 責損益"}},{"id":630,"question":"依變更管理技術指引之要求，變更管理之作業流程中，下列何者應 最先執行？","answer":"1","options":{"A":"界定變更管制範圍","B":"變更之申請","C":"諮詢","D":"成效確認"}},{"id":631,"question":"執行應變能力及資源評估時，下列敘述何者有誤？","answer":"4","options":{"A":"應評估應變器材之種 類及數量是否足夠","B":"應評估事業單位是 否有足夠的醫療救 護能力","C":"應評估是否有足夠 的緊急供電系統","D":"對於必要的搶救設 備如成本太高可不 必購置，災害發生 時再向鄰廠借用"}},{"id":632,"question":"下列何者不屬於健康風險評估實施所需積極考量之因素？","answer":"4","options":{"A":"製程使用之化學物質 之健康危害特性","B":"作業環境監測結果","C":"健康管理","D":"消防設施等應變措 施之準備"}},{"id":633,"question":"紙張所引起之火災較不適用下列何種滅火劑？","answer":"3","options":{"A":"水","B":"泡沫","C":"BC類乾粉","D":"ABC類乾粉"}},{"id":634,"question":"勞工從事下列何種粉塵作業較易罹患塵肺症？","answer":"3","options":{"A":"裝卸麵粉","B":"裝卸塑膠粉","C":"裝卸石英粉","D":"裝卸糖粉"}},{"id":635,"question":"從事缺氧危險作業時之人員安排，下列敘述何者較佳？","answer":"3","options":{"A":"若2人以上同時進入 該場所作業，則無須 指派人員監視","B":"若僅1人作業，必 須帶通訊裝備","C":"無論作業人數，應 指派1人以上之監 視人員","D":"避免與他人一起作 業，以免他人不專 業致干擾及妨礙作 業安全之危害"}},{"id":636,"question":"在降低風險的控制措施中，以低電壓電氣設備取代高電壓電氣設備 ，屬於下列何者？","answer":"2","options":{"A":"消除","B":"取代","C":"工程控制措施","D":"管理控制措施"}},{"id":637,"question":"防塵口罩選用原則，下列敘述何者錯誤？","answer":"4","options":{"A":"捕集效率愈高愈好","B":"吸氣抵抗愈低愈好","C":"重量愈輕愈好","D":"視野愈小愈好"}},{"id":638,"question":"於電梯開口部進行作業時，下列何者有誤？","answer":"4","options":{"A":"電梯直井工作平台下 方設安全網","B":"於電梯直井開口對 面之牆壁裝設捲揚 式防墜器或電梯直 井開口側邊牆壁裝 設安全帶掛鉤","C":"安全帶應確實鉤掛 於繫固裝置或垂直 安全母索上","D":"作業人員應將所需 零件及工具插於褲 袋中"}},{"id":639,"question":"對於移動式施工架之使用，下列做法何者有誤？","answer":"1","options":{"A":"攀爬施工架上下時， 手足應確實抓緊及踩 穩","B":"確認安全帶已勾掛 妥實","C":"應注意腳底踏踩位 置避免扭傷","D":"於結構物上突出之 鐵件應予以拔除、 釘入"}},{"id":640,"question":"雇主使勞工從事特別危害健康作業，應於其僱用或變更其工作時， 實施下列何種檢查？","answer":"1","options":{"A":"特殊體格檢查","B":"一般健康檢查","C":"特殊健康檢查","D":"體格檢查"}},{"id":641,"question":"勞工因氯氣外洩造成1人送醫住院治療時，雇主應於多少時間內通報 當地勞動檢查機構？","answer":"1","options":{"A":"8小時","B":"12小時","C":"24小時","D":"勿須通報"}},{"id":642,"question":"某公司勞工人數未滿30人，依職業安全衛生管理辦法規定，有關其 職業安全衛生人員之設置，下列何者正確？","answer":"2","options":{"A":"至少置甲種職業安全 衛生業務主管1人","B":"職業安全衛生業務 主管得由該公司經 營負責人擔任","C":"所置職業安全衛生 人員應報檢查機構 備查","D":"職業安全衛生人員 應為專職"}},{"id":643,"question":"為實施採購管理，事業單位辦理工程採購時，該工程經費中之何項 費用應占有一定的比例？","answer":"1","options":{"A":"安全衛生項目","B":"耗材","C":"出工數","D":"睦鄰支出"}},{ options":{"A":"得拒絕","B":"不得拒絕","C":"未有規定","D":"得免派員陪同檢查"}},{"id":657,"question":"對於勞工實施健康追蹤檢查費用，應由下列何者支付？","answer":"2","options":{"A":"勞工個人","B":"雇主","C":"勞動檢查機構","D":"縣市政府"}},{"id":658,"question":"下列何者非屬職業安全衛生管理辦法規定之自動檢查種類？","answer":"2","options":{"A":"機械設備之作業檢點","B":"設備之重新檢查","C":"機械之定期檢查","D":"設備之重點檢查"}},{"id":659,"question":"事業單位擴充產能時，下列何項較不可能引起意外災害？","answer":"4","options":{"A":"新進人員訓練不足所 致之危害","B":"有害物增加逸散之 危害","C":"製品堆置場所不足 所致之危害","D":"工時縮短所致之危 害"}},{"id":660,"question":"以下關於安全母索的設置，何者不正確？","answer":"2","options":{"A":"最小斷裂強度應在 2300公斤以上","B":"錨錠強度需在800 公斤以上","C":"爬昇位置之水平間 距在2公尺以下者 ，得2人共用一條 垂直安全母索","D":"垂直安全母索下端 應有防止安全帶鎖 扣自尾端脫落之設 施"}},{"id":661,"question":"依職業安全衛生法規定，雇主應每月填載職業災害統計，目前最常 用下列何種方式報請勞動檢查機構備查？","answer":"1","options":{"A":"上網線上登錄","B":"e-mail統計表電子 檔案","C":"填妥書面表格傳真","D":"填妥書面表格郵寄"}},{"id":662,"question":"下列何種情況較不易誘發靜電？","answer":"4","options":{"A":"油品由金屬管線噴出","B":"使用量尺量測油品 液位","C":"油品在管線中高速 流動","D":"純質油品靜態儲存 於儲槽中"}},{"id":663,"question":"下列何者最不可能是影響化學性危害的因素？","answer":"4","options":{"A":"毒性物質本身的毒性","B":"毒性物質的濃度","C":"暴露途徑","D":"環境照明"}},{"id":664,"question":"於易燃性、高爆炸性液體蒸汽之危險作業場所，以手工具進行管路 拆卸時，為避免工具碰撞產生火花而導致事故，該無火花手工具之 材料應為下列何者？","answer":"1","options":{"A":"銅合金","B":"不銹鋼","C":"低碳鋼","D":"鎳鉻鋼"}},{"id":665,"question":"百貨公司櫃台之勞工，易產生下列何種職場健康危害？","answer":"1","options":{"A":"易因久站，造成下肢 靜脈曲張","B":"因高學歷，產生暴 力傾向","C":"年輕男女一同工作 ，易造成感情糾紛","D":"易吃速食，產生營 養不良"}},{"id":666,"question":"職業災害統計中，對於永久全失能，以下列何種損失日數計算？","answer":"4","options":{"A":"1,000","B":"3,000","C":"5,000","D":"6,000"}},{"id":667,"question":"從事甲苯作業之勞工，應正確佩戴下列何種呼吸防護具較為適當？","answer":"4","options":{"A":"外科口罩","B":"一般棉紗口罩","C":"N95口罩","D":"防毒面具"}},{"id":668,"question":"有關常用之風險控制措施，下列何者有誤？","answer":"3","options":{"A":"消除或取代","B":"工程控制","C":"財務控制","D":"管理控制"}},{"id":669,"question":"為預防高處活線作業時，因感電而發生墜落，除了加強感電預防措 施外，最有效的方式為下列何者？","answer":"3","options":{"A":"使用合格的安全帶並 適當繫掛","B":"鋪設合格的安全網","C":"構築安全的工作平 台","D":"下方鋪設安全防護 墊"}},{"id":670,"question":"正己烷可能產生下列何種有害物？","answer":"2","options":{"A":"氣膠","B":"蒸氣","
